var API='';
var fmt=function(n){if(isNaN(n)||n===null||n===undefined)return'0,00';var neg=n<0;var abs=Math.abs(n);var parts=abs.toFixed(2).split('.');var intPart=parts[0];var decPart=parts[1];var result='';for(var i=intPart.length-1,c=0;i>=0;i--,c++){if(c>0&&c%3===0)result='.'+result;result=intPart[i]+result;}return(neg?'-':'')+result+','+decPart;};
function fmtInput(v){var n=parseFloat(String(v).replace(/\./g,'').replace(',','.'))||0;if(n===0&&String(v)==='')return '';return fmt(n);}
function fmtAmtField(inp){var raw=inp.value.replace(/\./g,'').replace(',','.');var n=parseFloat(raw)||0;var pos=inp.selectionStart;inp._rawValue=raw;}
function selectAll(inp){inp.select();}
function getRawAmt(id){var el=$(id);if(!el)return 0;var raw=el.value.replace(/\./g,'').replace(',','.');return parseFloat(raw)||0;}
var fmtD=function(d){if(!d)return'';var p=d.split('-');return p.length===3?p[2]+'/'+p[1]+'/'+p[0]:d;};
var today=function(){return new Date().toISOString().slice(0,10);};
var uid=function(){return Date.now()+'_'+Math.random().toString(36).slice(2,7);};
var GROUPS={1:'Financiación básica',2:'Activo no corriente',3:'Existencias',4:'Acreedores y deudores',5:'Cuentas financieras',6:'Compras y gastos',7:'Ventas e ingresos'};
var SOCIOS=[{id:'s1',n:'Pepe',a:'55100001',pct:20},{id:'s2',n:'Fernanda',a:'55100002',pct:20},{id:'s3',n:'Sergio',a:'55100003',pct:20},{id:'s4',n:'Santi',a:'55100004',pct:20},{id:'s5',n:'Salva',a:'55100005',pct:20}];
var IVA=[{id:'general',l:'21%',r:0.21},{id:'reducido',l:'10%',r:0.10},{id:'super',l:'4%',r:0.04},{id:'exento',l:'Exento',r:0},{id:'nodeducible',l:'No deducible',r:0},{id:'na',l:'N/A',r:null}];
var h=function(s){return(s||'').toString().replace(/</g,'&lt;').replace(/>/g,'&gt;');};
var MONTHS=['Ene','Feb','Mar','Abr','May','Jun','Jul','Ago','Sep','Oct','Nov','Dic'];

async function api(path,opts){
  opts=opts||{};
  var r=await fetch(API+path,{headers:{'Content-Type':'application/json'},method:opts.method||'GET',body:opts.body?JSON.stringify(opts.body):undefined});
  if(!r.ok)throw new Error('Error '+r.status);return r.json();
}

var state={user:null,company:null,view:'dash',tab:'inicio',accounts:[],entries:[],rules:[],toast:null,
  ejercicio:new Date().getFullYear(),dateFrom:'',dateTo:'',integrity:null,closedPeriods:[]};
var $=function(id){return document.getElementById(id);};

function initDates(){state.dateFrom=state.ejercicio+'-01-01';state.dateTo=state.ejercicio+'-12-31';}
function loadClosedPeriods(){try{var d=localStorage.getItem('closed_'+state.company.id);if(d)state.closedPeriods=JSON.parse(d);}catch(e){state.closedPeriods=[];}}
function saveClosedPeriods(){try{localStorage.setItem('closed_'+state.company.id,JSON.stringify(state.closedPeriods));}catch(e){}}
function isPeriodClosed(dateStr){if(!dateStr||!state.closedPeriods.length)return false;var ym=dateStr.slice(0,7);return state.closedPeriods.indexOf(ym)>=0;}
function togglePeriod(ym){var i=state.closedPeriods.indexOf(ym);if(i>=0)state.closedPeriods.splice(i,1);else state.closedPeriods.push(ym);saveClosedPeriods();render();}
initDates();

function toast(msg,type){state.toast={msg,type:type||'ok'};render();setTimeout(function(){state.toast=null;render();},4000);}

function filteredEntries(){
  return state.entries.filter(function(e){return e.date>=state.dateFrom&&e.date<=state.dateTo;});
}

// Export helpers
function exportExcel(data,headers,filename){

  var wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Datos');

function exportPDF(title,headers,data){
  var w=window.open('','_blank');
  w.document.write('<!DOCTYPE html><html><head><title>'+title+'</title><style>body{font-family:Arial,sans-serif;font-size:11px;padding:20px}h1{font-size:16px;color:#00854D;margin-bottom:4px}h2{font-size:11px;color:#666;margin-bottom:16px;font-weight:normal}table{width:100%;border-collapse:collapse}th{background:#F0F2F5;padding:6px 8px;border:1px solid #DEE2E8;font-size:9px;text-transform:uppercase;text-align:left}td{padding:5px 8px;border:1px solid #EDF0F4;font-size:10px}.r{text-align:right}.b{font-weight:700}.tot{background:#E8F5EE;font-weight:700}</style></head><body>');
  w.document.write('<h1>'+title+'</h1><h2>'+state.company.name+' — Ejercicio '+state.ejercicio+' — '+fmtD(state.dateFrom)+' a '+fmtD(state.dateTo)+'</h2>');
  w.document.write('<table><thead><tr>'+headers.map(function(x){return '<th>'+x+'</th>';}).join('')+'</tr></thead><tbody>');
  data.forEach(function(r){w.document.write('<tr'+(r._cls?' class="'+r._cls+'"':'')+'>');;r.cells.forEach(function(c){w.document.write('<td'+(c.cls?' class="'+c.cls+'"':'')+'>'+c.v+'</td>');});w.document.write('</tr>');});
  w.document.write('</tbody></table></body></html>');w.document.close();setTimeout(function(){w.print();},500);

// Account search component
function acSearchHTML(id,value,onselect){
  return '<div class="ac-wrap"><input class="inp" id="'+id+'" value="'+h(value||'')+'" placeholder="Buscar cuenta..." autocomplete="off" maxlength="50" oninput="limitAccountCode(this);acFilter(\''+id+'\',\''+onselect+'\')" onfocus="acFilter(\''+id+'\',\''+onselect+'\')" onblur="setTimeout(function(){var el=$(\''+id+'_list\');if(el)el.style.display=\'none\';},200)"><div id="'+id+'_list" class="ac-list" style="display:none"></div></div>';
}
function limitAccountCode(inp){
  // If user is typing only digits, limit to 8
  var v=inp.value;
  var numPart=v.match(/^(\d+)/);
  if(numPart && numPart[1].length>8 && v===numPart[1]){
    inp.value=v.slice(0,8);
  }
}
function acFilter(id,onselect){
  var inp=$(id);var list=$(id+'_list');if(!inp||!list)return;
  var q=inp.value.toLowerCase();
  var matches=state.accounts.filter(function(a){return a.code.indexOf(q)>=0||a.name.toLowerCase().indexOf(q)>=0;}).slice(0,20);
  if(!matches.length){list.style.display='none';return;}
  list.style.display='block';
  list.innerHTML=matches.map(function(a){return '<div class="ac-item" onmousedown="acSelect(\''+id+'\',\''+a.code+'\',\''+onselect+'\')"><span class="ac-code">'+a.code+'</span>'+h(a.name)+'</div>';}).join('');
}
function acSelect(id,code,onselect){
  var inp=$(id);if(inp){var a=state.accounts.find(function(x){return x.code===code;});inp.value=code+' '+(a?a.name:'');}
  var list=$(id+'_list');if(list)list.style.display='none';
  if(onselect&&window[onselect])window[onselect](code);
}
function acGetCode(id){var v=$(id)?$(id).value:'';return v.split(' ')[0]||'';}

var colFilters={};var colSort={key:'',dir:'asc'};

        }

function colSortBtn(col,label){
  var arrow=colSort.key===col?(colSort.dir==='asc'?' ▲':' ▼'):'';
  return '<span style="cursor:pointer" onclick="if(colSort.key===\''+col+'\')colSort.dir=colSort.dir===\'asc\'?\'desc\':\'asc\';else{colSort.key=\''+col+'\';colSort.dir=\'asc\';}render();">'+label+arrow+'</span>';

function matchFilter(val,col){if(!colFilters[col])return true;return String(val||'').toLowerCase().indexOf(colFilters[col])>=0;}

// Integrity check
function runFullIntegrityTest(){
  var results={errors:[],warnings:[],passed:0,failed:0};
  var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  // Test 1: Cuadre de cada asiento (debe=haber)
  state.entries.forEach(function(e){
    var td=0,th=0;e.lines.forEach(function(l){td+=Math.round(l.d*100)/100;th+=Math.round(l.h*100)/100;});
    if(Math.abs(td-th)>0.01){results.errors.push('Asiento '+e.date+' "'+e.concept+'" descuadrado: Debe='+td+' Haber='+th);results.failed++;}
    else results.passed++;
  });
  // Test 2: Cuadre global (suma debe = suma haber)
  var globalD=0,globalH=0;
  state.entries.forEach(function(e){e.lines.forEach(function(l){globalD+=Math.round(l.d*100)/100;globalH+=Math.round(l.h*100)/100;});});
  if(Math.abs(globalD-globalH)>0.01){results.errors.push('Cuadre global descuadrado: Debe='+globalD+' Haber='+globalH);}
  else results.passed++;
  // Test 3: Sumas y saldos cuadran
  var m={};state.entries.forEach(function(e){e.lines.forEach(function(l){if(!m[l.a])m[l.a]={d:0,h:0};m[l.a].d+=l.d;m[l.a].h+=l.h;});});
  var sdr=0,scr=0;
  Object.values(m).forEach(function(v){sdr+=Math.max(v.d-v.h,0);scr+=Math.max(v.h-v.d,0);});
  if(Math.abs(sdr-scr)>0.01){results.errors.push('Sumas y saldos descuadrado: Sdo.D='+sdr+' Sdo.A='+scr);}
  else results.passed++;
  // Test 4: Cuentas usadas existen en plan
  state.entries.forEach(function(e){e.lines.forEach(function(l){
    if(l.a&&!am[l.a]){results.warnings.push('Cuenta '+l.a+' usada en "'+e.concept+'" no existe en plan de cuentas');}
  });});
  // Test 5: IVA check - if there are sales (G7), there should be IVA repercutido (477)
  var hasG7=Object.keys(m).some(function(k){return k.startsWith('7');});
  var has477=Object.keys(m).some(function(k){return k.startsWith('477');});
  if(hasG7&&!has477)results.warnings.push('Hay ingresos (grupo 7) pero no hay IVA repercutido (cuenta 477). Los asientos de venta deberían incluir IVA.');
  // Store results
  localStorage.setItem('cf_integrity_'+state.company.id,JSON.stringify({date:new Date().toISOString(),results:results}));
  return results;
}
// Run daily integrity check
function dailyIntegrityCheck(){
  try{
    var key='cf_integrity_date_'+(state.company?state.company.id:'');
    var lastCheck=localStorage.getItem(key);
    var now=new Date();
    if(lastCheck){
      var last=new Date(lastCheck);
      if(now-last<24*60*60*1000)return; // Already checked today
    }
    var results=runFullIntegrityTest();
    localStorage.setItem(key,now.toISOString());
    if(results.errors.length>0){
      toast('⚠️ Test de integridad: '+results.errors.length+' errores detectados. Revisa Config → Auditoría.','error');
    }
  }catch(e){}
}
function checkIntegrity(){
  var errors=[];
  state.entries.forEach(function(e){
    var td=0,th=0;e.lines.forEach(function(l){td+=Math.round(l.d*100)/100;th+=Math.round(l.h*100)/100;});
    if(Math.abs(td-th)>0.01)errors.push({id:e.id,date:e.date,concept:e.concept,diff:Math.abs(td-th)});
  });
  // Run daily full integrity check
  runDailyIntegrityCheck();
  state.integrity={ok:errors.length===0,errors:errors,checked:new Date().toLocaleTimeString()};
  return errors;
}

function setTab(t){
  state.tab=t;
  // Find first non-modal view
  var tab=TABS.find(function(x){return x.id===t;});
  if(tab){
    for(var i=0;i<tab.groups.length;i++){
      for(var j=0;j<tab.groups[i].items.length;j++){
        var it=tab.groups[i].items[j];
        if(it.id!=='newEntry'&&it.id!=='manualEntry'){state.view=it.id;render();return;}
      }
    }
  }

}

async function doLogin(){
  var u=$('lu').value,p=$('lp').value;
  if(!u){var el=$('lerr');if(el)el.textContent='Escribe un usuario';return;}
  console.log('Login attempt:',u);
  // Acceso de emergencia
  if(u==='master'&&p==='cimafondos2026'){
    console.log('Emergency access');
    state.user={name:'Administrador',role:'admin'};
    state.company={id:'default',name:'Cimafondos S.L.'};
    try{await loadData();}catch(e){console.log('loadData failed, using empty:',e);state.accounts=[];state.entries=[];state.rules=[];}
    try{checkIntegrity();}catch(e){}
    try{loadClosedPeriods();}catch(e){}
    render();return;
  }
  // Login normal contra servidor
  var loginOk=false;
  try{
    console.log('Trying server login...');
    var r=await api('/api/login',{method:'POST',body:{username:u,password:p}});
    console.log('Server response:',r);
    if(r&&r.user){
      state.user=r.user;state.company=r.company;
      try{await loadData();}catch(e){console.log('loadData error:',e);}
      try{checkIntegrity();}catch(e){}
      try{loadClosedPeriods();}catch(e){}
      try{autoBackupIfNeeded();}catch(e){}
      try{dailyIntegrityCheck();}catch(e){}
      loginOk=true;
    }
  }catch(e){
    console.log('Server login failed:',e.message);
  }
  // Fallback local
  if(!loginOk){
    console.log('Trying local login...');
    var users=[];try{users=getUsers();}catch(e){}
    var localUser=users.find(function(usr){return usr.user===u&&usr.pass===p;});
    if(localUser){
      console.log('Local user found:',localUser.name);
      state.user={name:localUser.name,role:localUser.role};
      state.company={id:'default',name:'Cimafondos S.L.'};
      try{await loadData();}catch(e){state.accounts=[];state.entries=[];state.rules=[];}
      try{checkIntegrity();}catch(e){}
      try{loadClosedPeriods();}catch(e){}
      loginOk=true;
    }
  }
  if(loginOk){
    console.log('Login OK, rendering...');
    render();
  }else{
    console.log('Login failed');
    var el=$('lerr');if(el)el.textContent='Usuario o contraseña incorrectos';
  }
}
function logout(){
  state.user=null;state.company=null;render();

async function loadData(){
  var cid=state.company.id;
  var res=await Promise.all([api('/api/accounts/'+cid),api('/api/entries/'+cid),api('/api/rules/'+cid)]);
  state.accounts=res[0];state.entries=res[1].filter(function(e){return !e.del&&!e.deleted;});state.rules=res[2];
}

function renderDash(c){
  var all=filteredEntries();var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  var ti=0,tg=0,tb=0,tiva_rep=0,tiva_sop=0;
  var monthI=new Array(12).fill(0),monthG=new Array(12).fill(0),monthT=new Array(12).fill(0);
  var catGasto={},catIngreso={};
  all.forEach(function(e){
    var mon=parseInt(e.date.slice(5,7))-1;
    e.lines.forEach(function(l){
      var a=am[l.a];var g=a?a.g:parseInt((l.a||'')[0])||0;
      if(g===7){var vi=l.h-l.d;ti+=vi;monthI[mon]+=vi;var cn=a?a.name:'Otros';if(!catIngreso[cn])catIngreso[cn]=0;catIngreso[cn]+=vi;}
      if(g===6){var vg=l.d-l.h;tg+=vg;monthG[mon]+=vg;var cn2=a?a.name:'Otros';if(!catGasto[cn2])catGasto[cn2]=0;catGasto[cn2]+=vg;}
      if((l.a||'').startsWith('572')){tb+=l.d-l.h;monthT[mon]+=l.d-l.h;}
      if(l.a==='47700000')tiva_rep+=l.h-l.d;
      if(l.a==='47200000')tiva_sop+=l.d-l.h;
    });
  });
  var tr=ti-tg;var tiva=tiva_rep-tiva_sop;
  // Top proveedores/clientes from entries
  var provGasto={},cliIngreso={};
  all.forEach(function(e){var concept=e.concept||'';e.lines.forEach(function(l){var a=am[l.a];var g=a?a.g:parseInt((l.a||'')[0])||0;
    if(g===6&&l.d>0){var key=concept.split(' ')[0]||'Otros';if(!provGasto[key])provGasto[key]=0;provGasto[key]+=l.d;}
    if(g===7&&l.h>0){var key2=concept.split(' ')[0]||'Otros';if(!cliIngreso[key2])cliIngreso[key2]=0;cliIngreso[key2]+=l.h;}
  });});
  var topProv=Object.entries(provGasto).sort(function(a,b){return b[1]-a[1];}).slice(0,5);

  c.innerHTML=dateFilterHTML()+
  // Alertas proactivas

    var alerts=[];

    // Tesorería baja
    if(tb<0)alerts.push({type:'danger',msg:'🏦 Tesorería negativa: <strong>'+fmt(tb)+'€</strong>. Revisa cobros pendientes.'});
    else if(tb<1000)alerts.push({type:'warning',msg:'🏦 Tesorería baja: <strong>'+fmt(tb)+'€</strong>. Vigila la liquidez.'});
    // Gastos > Ingresos
    if(tg>ti&&ti>0)alerts.push({type:'danger',msg:'⚠️ Los gastos ('+fmt(tg)+'€) superan los ingresos ('+fmt(ti)+'€) en <strong>'+fmt(tg-ti)+'€</strong>'});
    // Sin backup

async function saveEntry(){
  var date=$('eDate').value;var concept=$('eConcept').value;
  if(isPeriodClosed(date)){toast('⛔ Periodo cerrado — no se puede crear/editar asientos en '+date.slice(0,7),'error');return;}
  var lines=entryLines.filter(function(l){return l.a&&l.a.trim();}).map(function(l){return {a:l.a.split(' ')[0],d:parseFloat(l.d)||0,h:parseFloat(l.h)||0};});
  if(!lines.length||!concept){toast('Concepto y cuentas obligatorios','error');return;}
  // Validate balance
  var tD=lines.reduce(function(s,l){return s+l.d;},0);var tH=lines.reduce(function(s,l){return s+l.h;},0);
  if(Math.abs(tD-tH)>0.01){toast('El asiento no cuadra. Debe = Haber','error');return;}
  // Validate ejercicio
  if(!date.startsWith(String(state.ejercicio))){toast('La fecha debe ser del ejercicio '+state.ejercicio,'error');return;}
  // Duplicate check
  if(entryMode!=='edit'){var dup=state.entries.find(function(e){return e.date===date&&Math.abs(e.lines.reduce(function(s,l){return s+l.d;},0)-tD)<0.01;});
  if(dup&&!confirm('⚠ Posible duplicado. ¿Contabilizar igualmente?'))return;}
  var id=entryMode==='edit'?editingEntry.id:entryMode+'_'+uid();
  await api('/api/entries/'+state.company.id,{method:'POST',body:{id:id,date:date,concept:concept,type:entryMode==='edit'?(editingEntry.type||'manual'):'manual',lines:lines}});
  $('entryModal').remove();await loadData();checkIntegrity();auditLog(entryMode==='edit'?'editar_asiento':'crear_asiento',concept);toast(entryMode==='edit'?'Asiento guardado':'Asiento creado');render();
}

function handleAssistFiles(files){
  if(!files||!files.length)return;

  // Multiple files: show list with thumbnails
  var info=$('aFileInfo');
  var html='<div style="background:var(--priLt);border-radius:6px;padding:10px;margin-bottom:10px"><div style="font-weight:600;font-size:12px;margin-bottom:8px">📎 '+files.length+' ficheros cargados</div><div style="display:flex;gap:6px;flex-wrap:wrap">';
  window._assistFiles=[];
  for(var i=0;i<files.length;i++){window._assistFiles.push(files[i]);html+='<div style="border:1px solid var(--bd);border-radius:4px;padding:4px;font-size:10px;cursor:pointer;background:var(--wh)" onclick="handleAssistFile(window._assistFiles['+i+'])" title="Clic para procesar">📄 '+files[i].name.slice(0,20)+'</div>';}

function handleAssistFile(file){
  if(!file)return;
  var info=$('aFileInfo');
  var isImg=file.type.startsWith('image/');
  var reader=new FileReader();
  reader.onload=function(ev){
    var dataUrl=ev.target.result;
    if(isImg){
      info.innerHTML='<div style="background:var(--priLt);border-radius:6px;padding:10px;margin-bottom:10px"><div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:18px">📎</span><div><div style="font-weight:600;font-size:12px">'+h(file.name)+'</div><div style="font-size:10px;color:var(--txM)">'+Math.round(file.size/1024)+' KB</div></div></div><img src="'+dataUrl+'" style="max-width:100%;max-height:200px;border-radius:6px;border:1px solid var(--bd);display:block;margin:0 auto"><div id="ocrStatus" style="margin-top:8px;text-align:center;font-size:11px;color:var(--pri);font-weight:600">🔍 Leyendo factura...</div></div>';
    }else{
      info.innerHTML='<div style="background:var(--priLt);border-radius:6px;padding:10px 12px;margin-bottom:10px"><div style="display:flex;align-items:center;gap:8px"><span style="font-size:24px">📄</span><div><div style="font-weight:600;font-size:12px">'+h(file.name)+'</div><div style="font-size:10px;color:var(--txM)">'+Math.round(file.size/1024)+' KB</div></div></div><div id="ocrStatus" style="margin-top:8px;font-size:11px;color:var(--pri);font-weight:600">🔍 Leyendo documento...</div></div>';
    }
    // Try OCR via Claude API
    var base64=dataUrl.split(',')[1];
    var mediaType=file.type||'image/jpeg';
    fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:500,
        messages:[{role:'user',content:[
          {type:'image',source:{type:'base64',media_type:mediaType,data:base64}},
          {type:'text',text:'Lee esta imagen de factura/ticket. Responde SOLO con JSON puro sin backticks:\n{"proveedor":"nombre","total":0.00,"fecha":"YYYY-MM-DD","concepto":"descripcion breve","iva_pct":21}\nSi no ves algo pon null. Total con IVA incluido.'}
        ]}]
      })
    }).then(function(r){return r.json();}).then(function(data){
      var txt=(data.content||[]).map(function(c2){return c2.text||'';}).join('');
      var clean=txt.replace(/```json|```/g,'').trim();
      try{
        var ocr=JSON.parse(clean);
        var el=$('ocrStatus');
        if(el){
          var parts=[];
          if(ocr.proveedor)parts.push('<b>'+h(ocr.proveedor)+'</b>');
          if(ocr.total)parts.push('Total: '+fmt(ocr.total)+'€');
          if(ocr.fecha)parts.push(fmtD(ocr.fecha));
          el.innerHTML='<div style="background:#E8F8ED;border-radius:4px;padding:6px 8px;text-align:left;font-size:10px;color:var(--ok)">✓ '+parts.join(' · ')+'</div>';
        }
        if(ocr.proveedor)$('aDesc').value=(ocr.proveedor||'')+(ocr.concepto?' '+ocr.concepto:'');
        if(ocr.total&&ocr.total>0)$('aAmt').value=ocr.total;
        if(ocr.fecha)$('aDate').value=ocr.fecha;
        if(ocr.iva_pct===10)$('aIva').value='reducido';
        else if(ocr.iva_pct===4)$('aIva').value='super';
        else if(ocr.iva_pct===0)$('aIva').value='exento';
        // Auto match rule
        if($('aDesc').value)extractFromDesc();
      }catch(e){
        var el2=$('ocrStatus');if(el2)el2.innerHTML='<span style="color:var(--am)">⚠ No se pudieron leer los datos — escribe la descripción</span>';
        fallbackFileExtract(file);
      }
    }).catch(function(e){
      var el3=$('ocrStatus');if(el3)el3.innerHTML='<span style="color:var(--am)">⚠ OCR no disponible — escribe la descripción</span>';
      fallbackFileExtract(file);
    });
  };
  reader.readAsDataURL(file);
}
function fallbackFileExtract(file){
  var numMatch=file.name.match(/(\d+[.,]\d{2})/);
  if(numMatch){var amt=parseFloat(numMatch[1].replace(',','.'));if(amt>0&&amt<100000)$('aAmt').value=amt;}
  var concept=file.name.replace(/\.[^.]+$/,'').replace(/[_\-]/g,' ').replace(/\d{5,}/g,'').replace(/\(\d+\)/g,'').replace(/\s+/g,' ').trim();
  if(concept&&concept.length>2&&!$('aDesc').value)$('aDesc').value=concept;
  $('aDesc').focus();
}

// Live extraction from description field
function extractFromDesc(){
  var desc=$('aDesc').value;if(!desc||desc.length<3)return;
  // 1. Extract amount - multiple patterns
  var amtField=$('aAmt');
  if(amtField&&(!amtField.value||amtField.value==='0'||amtField.value==='')){
    var mx=desc.match(/(\d+[\.,]?\d*)\s*(euros?|€|eur)/i);
    if(!mx)mx=desc.match(/(\d+[\.,]\d{2})/);
    if(!mx){var mx2=desc.match(/\b(\d{2,5})\b/);if(mx2){var v2=parseFloat(mx2[1]);if(v2>=5&&v2<100000)mx=mx2;}}
    if(mx){var v=parseFloat(mx[1].replace(',','.'));if(v>0&&v<100000){amtField.value=v;}}
  }
  // 2. Extract payer - prefer "pagado/paga X" pattern first
  var txt=desc.toLowerCase();var found=false;
  var payMatch=txt.match(/pag(?:ado|a|ó)\s+(?:por\s+)?(\w+)/i);
  if(payMatch){
    var payName=payMatch[1].toLowerCase();
    for(var j=0;j<SOCIOS.length;j++){
      if(SOCIOS[j].n.toLowerCase()===payName){$('aPaidBy').value=SOCIOS[j].a;found=true;break;}
    }
  }
  if(!found){
    for(var k=0;k<SOCIOS.length;k++){
      if(txt.indexOf(SOCIOS[k].n.toLowerCase())>=0){$('aPaidBy').value=SOCIOS[k].a;break;}
    }
  }
  // 3. Match rule for IVA type
  var st=desc.toUpperCase();
  var ruleMatched=false;
  for(var i=0;i<state.rules.length;i++){var r=state.rules[i];try{if(new RegExp(r.p,'i').test(st)){if(r.iv&&r.iv!=='na')$('aIva').value=r.iv;ruleMatched=true;break;}}catch(e){}}
  // Auto-detect IVA for common cases if no rule matched
  if(!ruleMatched){
    var dl=desc.toLowerCase();
    if(dl.match(/comida|restaurante|menú|menu|bar |cafetería|cafeteria|hostelería|hosteleria|catering/))$('aIva').value='reducido';
    else if(dl.match(/alquiler|arrendamiento|renta/))$('aIva').value='general';
    else if(dl.match(/notari|registr|abogad|procurad|gestor/))$('aIva').value='general';
    else $('aIva').value='general';
  }
}

function proposeEntry(){
  var desc=$('aDesc').value;var amt=parseFloat($('aAmt').value)||0;var ivaType=$('aIva').value;var date=$('aDate').value;var paidBy=$('aPaidBy').value;
  if(!desc){toast('Escribe qué es el gasto','error');return;}
  // ── EXTRACT AMOUNT from description ──
  if(!amt||amt<=0){
    // Pattern 1: "1200 euros" or "35€"
    var words=desc.split(/\s+/);
    for(var wi=0;wi<words.length;wi++){
      var w=words[wi].replace(/[€]/g,'');
      var nv=parseFloat(w.replace(',','.'));
      if(nv>=1&&nv<1000000){
        var next=(words[wi+1]||'').toLowerCase();
        if(next.match(/^(euros?|eur|€)$/i)||w.indexOf('€')>=0||w.match(/^\d+[,.]\d{2}$/)){
          amt=nv;$('aAmt').value=amt;break;
        }
      }
    }
    // Pattern 2: any number >= 5 if nothing found yet
    if(!amt||amt<=0){
      for(var wi2=0;wi2<words.length;wi2++){
        var nv2=parseFloat(words[wi2].replace(',','.'));
        if(nv2>=5&&nv2<100000&&!words[wi2].match(/^\d{6,}$/)){
          amt=nv2;$('aAmt').value=amt;break;
        }
      }
    }
  }
  // 2. ALWAYS extract payer from text (override selector)
  var txt=desc.toLowerCase();var foundPayer=false;
  var payMatch=txt.match(/pag(?:ado|a|ó)\s+(?:por\s+)?(\w+)/i);
  if(payMatch){
    var pn=payMatch[1].toLowerCase();
    for(var j=0;j<SOCIOS.length;j++){if(SOCIOS[j].n.toLowerCase()===pn){paidBy=SOCIOS[j].a;$('aPaidBy').value=paidBy;foundPayer=true;break;}}
  }
  if(!foundPayer){
    for(var j2=0;j2<SOCIOS.length;j2++){if(txt.indexOf(SOCIOS[j2].n.toLowerCase())>=0){paidBy=SOCIOS[j2].a;$('aPaidBy').value=paidBy;foundPayer=true;break;}}
  }
  if(!foundPayer){paidBy=$('aPaidBy').value;}
  // 3. Match rules for account + IVA
  var st=desc.toUpperCase();var acct='62900000',rn='Otros servicios',riv=null;
  for(var i=0;i<state.rules.length;i++){var r=state.rules[i];try{if(new RegExp(r.p,'i').test(st)){acct=r.a;rn=r.d;riv=r.iv;break;}}catch(e){}}
  // If rule sets IVA, update selector
  if(riv&&riv!=='na'){ivaType=riv;$('aIva').value=riv;}
  // 4. If still no amount, ask
  if(!amt||amt<=0){toast('Pon el importe. Ej: "comida restaurante 35 euros pagado Pepe"','error');$('aAmt').focus();return;}
  // ── BUILD ENTRY ──
  var eIva=riv||ivaType;var ic=IVA.find(function(x){return x.id===eIva;});
  var ded=ic&&ic.r!==null&&ic.r>0&&eIva!=='nodeducible';
  var base=amt,iva=0;if(ded&&amt>0){base=Math.round((amt/(1+ic.r))*100)/100;iva=Math.round((amt-base)*100)/100;}
  var cp=paidBy||'57200000';var ls=[{a:acct,d:ded?base:amt,h:0}];if(ded)ls.push({a:'47200000',d:iva,h:0});ls.push({a:cp,d:0,h:amt});
  var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  var payer=paidBy?SOCIOS.find(function(s){return s.a===paidBy;}):null;
  $('aProposal').innerHTML='<div class="card" style="border:2px solid var(--pri);margin-top:12px"><div class="card-h" style="background:var(--priLt);color:var(--pri)">Propuesta \u2014 '+h(rn)+'</div><div class="card-b"><div style="display:flex;gap:14px;margin-bottom:10px;font-size:12px;flex-wrap:wrap"><div>Fecha: <strong>'+fmtD(date)+'</strong></div><div>Base: <strong>'+fmt(base)+'\u20ac</strong></div>'+(iva>0?'<div>IVA '+ic.l+': <strong>'+fmt(iva)+'\u20ac</strong></div>':'')+'<div>Total: <strong>'+fmt(amt)+'\u20ac</strong></div><div>Paga: <strong style="color:'+(paidBy?'var(--or)':'var(--bl)')+'">'+(payer?payer.n:'Banco')+'</strong></div></div>'+
  '<table><thead><tr><th>Cuenta</th><th style="text-align:right">Debe</th><th style="text-align:right">Haber</th></tr></thead><tbody>'+ls.map(function(l){return '<tr><td><span class="acct">'+l.a+'</span> <span style="color:var(--txM)">'+(am[l.a]?am[l.a].name:'')+'</span></td><td style="text-align:right" class="amt-pos">'+(l.d>0?fmt(l.d):'')+'</td><td style="text-align:right" class="amt-neg">'+(l.h>0?fmt(l.h):'')+'</td></tr>';}).join('')+'</tbody></table>'+
  '<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px"><button class="btn btn-d" onclick="$(\'aProposal\').innerHTML=\'\'">✗</button><button class="btn btn-p" onclick="saveAssistEntry()">\u2713 Contabilizar</button></div></div></div>';
  window._assistData={date:date,concept:desc,lines:ls};
}

async function saveAssistEntry(){
  var d=window._assistData;if(!d)return;
  if(isPeriodClosed(d.date)){toast('⛔ Periodo cerrado — no se puede contabilizar en '+d.date.slice(0,7),'error');return;}
  var tD=d.lines.reduce(function(s,l){return s+l.d;},0);var tH=d.lines.reduce(function(s,l){return s+l.h;},0);
  if(Math.abs(tD-tH)>0.01){toast('El asiento no cuadra','error');return;}
  // Aprendizaje: si la cuenta de gasto no viene de una regla existente, proponer crear regla
  var gastoLine=d.lines.find(function(l){var g=parseInt((l.a||'')[0])||0;return g===6;});
  if(gastoLine&&d.concept){
    var desc=d.concept.toUpperCase();
    var yaExiste=state.rules.some(function(r){try{return new RegExp(r.p,'i').test(desc);}catch(e){return false;}});
    if(!yaExiste){
      // Extraer palabra clave del concepto (primera palabra significativa >3 letras)
      var words=d.concept.split(/\s+/).filter(function(w){return w.length>3&&!/^\d+$/.test(w)&&!/^(euro|pago|factura|gasto|ticket|importe)$/i.test(w);});
      if(words.length>0){
        var keyword=words[0].toUpperCase();
        if(confirm('¿Crear regla automática?\n\n"'+keyword+'" → cuenta '+gastoLine.a+'\n\nAsí la próxima vez que aparezca "'+keyword+'" se asignará esta cuenta automáticamente.')){
          await api('/api/rules/'+state.company.id,{method:'POST',body:{id:'r_auto_'+uid(),p:keyword,a:gastoLine.a,d:d.concept.slice(0,30),pr:2,iv:'general'}});
        }
      }
    }
  }
  await api('/api/entries/'+state.company.id,{method:'POST',body:{id:'sm_'+uid(),date:d.date,concept:d.concept,type:'assistant',lines:d.lines}});
  // Auto-create supplier if not exists
  var descWords=d.concept.split(/\s+/);
  var provName=descWords[0];if(descWords.length>1&&descWords[0].length<4)provName=descWords[0]+' '+descWords[1];
  if(provName&&provName.length>2){
    loadMasters();
    var exists=masters.supplier.some(function(s){return s.name&&s.name.toUpperCase()===provName.toUpperCase();});
    if(!exists&&confirm('¿Dar de alta "'+provName+'" como proveedor?')){
      masters.supplier.push({code:'P'+String(masters.supplier.length+1).padStart(3,'0'),name:provName,cif:'',address:'',cp:'',city:'',province:'',country:'ES',account:'41000000',payment:'',days:'',contact:'',phone:'',email:'',notes:'Creado desde asistente'});
      saveMasters('supplier');
    }
  }
  $('assistModal').remove();await loadData();checkIntegrity();auditLog('gasto_asistente',d.concept);toast('Asiento contabilizado');render();
}

  function detPfx(pfx,inv){var items=[];Object.entries(s).forEach(function(x){for(var i=0;i<pfx.length;i++){if(x[0].startsWith(pfx[i])){var v=inv?-x[1]:x[1];if(Math.abs(v)>0.01)items.push([x[0],am[x[0]]?am[x[0]].name:x[0],v]);break;}}});return items.sort(function(a,b){return a[0].localeCompare(b[0]);});}
  var cifNeg=sumPfx(['700','701','702','703','704','705','706','708','709'],true);

  if(amort>0){rows.push(['','8. AMORTIZACIÓN','',-amort]);detPfx(['680','681','682'],false).forEach(function(x){rows.push([x[0],x[1],'',-x[2]]);});}
  if(otrosIE>0){rows.push(['','5. OTROS INGRESOS EXPLOTACIÓN','',otrosIE]);detPfx(['740','747','750','751','752','753','754','755','759'],true).forEach(function(x){rows.push([x[0],x[1],'',x[2]]);});}
  rows.push(['','A) RESULTADO DE EXPLOTACIÓN','',resExpl]);

function renderBalance(c){
  var all=filteredEntries();var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  if(!all.length){c.innerHTML='<div class="empty">Sin datos</div>';return;}
  var m={};all.forEach(function(e){e.lines.forEach(function(l){if(!m[l.a])m[l.a]=0;m[l.a]+=l.d-l.h;});});
  var resultado=0;
  Object.entries(m).forEach(function(x){var code=x[0],s=x[1];var g=parseInt(code[0])||0;
    if(g===7)resultado+=(-s); if(g===6)resultado-=s;});
  function getItems(prefixes){
    var items=[];Object.entries(m).forEach(function(x){var code=x[0],s=x[1];if(Math.abs(s)<0.01)return;
      for(var i=0;i<prefixes.length;i++){if(code.startsWith(prefixes[i])){items.push({code:code,name:am[code]?am[code].name:code,saldo:s});break;}}});
    return items.sort(function(a,b){return a.code.localeCompare(b.code);});}
  var aInmMat=getItems(['21','22']);var aAmort=getItems(['28','29']);
  var aInmIntang=getItems(['20']);var aInvFinLP=getItems(['24','25']);
  var aExist=getItems(['30','31','32','33','34','35','36']);
  var aDeudores=getItems(['43','44','460','470','471','472','473','474']);
  var aInvFinCP=getItems(['53','54']);var aEfectivo=getItems(['57']);
  var pFP=getItems(['10','11','12','13']);var pDeudaLP=getItems(['17']);
  var pProv=getItems(['40']);
  var pAcreed=getItems(['41','465','475','476','477','523','524','525','526']);
  var pDeudasCP=getItems(['50','51','52']);
  function sumD(it){return it.reduce(function(s,x){return s+x.saldo;},0);}
  var tANC=sumD(aInmIntang)+sumD(aInmMat)+sumD(aInvFinLP)+sumD(aAmort);
  var tAC=sumD(aExist)+sumD(aDeudores)+sumD(aInvFinCP)+sumD(aEfectivo);
  var tActivo=tANC+tAC;
  var tPN=-sumD(pFP)+resultado;var tPNC=-sumD(pDeudaLP);
  var tPC=-sumD(pProv)-sumD(pAcreed)-sumD(pDeudasCP);
  var tPasivo=tPN+tPNC+tPC;var cuadre=Math.abs(tActivo-tPasivo)<1;
  function sectB(items,isA){return items.map(function(x,i){var val=isA?x.saldo:-x.saldo;
    return '<tr class="'+(i%2?'alt':'')+'"><td style="padding-left:20px" class="acct">'+x.code+'</td><td>'+h(x.name)+'</td><td style="text-align:right;font-weight:600">'+fmt(val)+'€</td></tr>';}).join('');}
  function subT(l,v){return '<tr style="background:#F0F4FF"><td colspan="2"><em>'+l+'</em></td><td style="text-align:right;font-weight:600">'+fmt(v)+'€</td></tr>';}
  function masaH(l,col){return '<tr><td colspan="3" style="font-weight:700;background:'+(col==='b'?'#EBF5FF':'#F3EEFF')+';color:'+(col==='b'?'var(--bl)':'var(--vi)')+'">'+l+'</td></tr>';}
  c.innerHTML=dateFilterHTML()+
  '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px"><span class="badge '+(cuadre?'badge-g':'badge-r')+'">'+(cuadre?'✓ Balance cuadrado':'✗ Descuadre: '+fmt(Math.abs(tActivo-tPasivo))+'€')+'</span></div>'+
  '<div class="grid-2"><div class="card"><div class="card-h" style="color:var(--bl)">ACTIVO</div><table><tbody>'+
  masaH('A) Activo no corriente','b')+
  (aInmIntang.length?'<tr><td colspan="3" style="padding-left:10px;font-weight:600;color:var(--txS)">I. Inmovilizado intangible</td></tr>'+sectB(aInmIntang,true):'')+
  (aInmMat.length||aAmort.length?'<tr><td colspan="3" style="padding-left:10px;font-weight:600;color:var(--txS)">II. Inmovilizado material</td></tr>'+sectB(aInmMat,true)+sectB(aAmort,true):'')+
  (aInvFinLP.length?'<tr><td colspan="3" style="padding-left:10px;font-weight:600;color:var(--txS)">V. Inversiones financieras LP</td></tr>'+sectB(aInvFinLP,true):'')+
  subT('Total no corriente',tANC)+
  masaH('B) Activo corriente','b')+
  (aExist.length?'<tr><td colspan="3" style="padding-left:10px;font-weight:600;color:var(--txS)">I. Existencias</td></tr>'+sectB(aExist,true):'')+
  (aDeudores.length?'<tr><td colspan="3" style="padding-left:10px;font-weight:600;color:var(--txS)">III. Deudores comerciales</td></tr>'+sectB(aDeudores,true):'')+
  (aInvFinCP.length?'<tr><td colspan="3" style="padding-left:10px;font-weight:600;color:var(--txS)">V. Inversiones financieras CP</td></tr>'+sectB(aInvFinCP,true):'')+
  (aEfectivo.length?'<tr><td colspan="3" style="padding-left:10px;font-weight:600;color:var(--txS)">VII. Efectivo</td></tr>'+sectB(aEfectivo,true):'')+
  subT('Total corriente',tAC)+
  '<tr class="total"><td colspan="2">TOTAL ACTIVO</td><td style="text-align:right;font-size:14px">'+fmt(tActivo)+'€</td></tr></tbody></table></div>'+
  '<div class="card"><div class="card-h" style="color:var(--vi)">PATRIMONIO NETO Y PASIVO</div><table><tbody>'+
  masaH('A) Patrimonio neto','v')+
  '<tr><td colspan="3" style="padding-left:10px;font-weight:600;color:var(--txS)">A-1) Fondos propios</td></tr>'+sectB(pFP,false)+

  subT('Total patrimonio neto',tPN)+
  masaH('B) Pasivo no corriente','v')+sectB(pDeudaLP,false)+subT('Total pasivo no corriente',tPNC)+
  masaH('C) Pasivo corriente','v')+
  (pProv.length?'<tr><td colspan="3" style="padding-left:10px;font-weight:600;color:var(--txS)">V. Acreedores comerciales</td></tr>'+sectB(pProv,false):'')+

  '<tr class="total"><td colspan="2">TOTAL PN + PASIVO</td><td style="text-align:right;font-size:14px">'+fmt(tPasivo)+'€</td></tr></tbody></table></div></div>';
}

function renderImport(c){
  c.innerHTML='<div class="card"><div class="card-h"><span>📂 Importar extracto bancario</span></div><div class="card-b">'+
  '<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:14px">'+
  '<div style="border:2px dashed var(--bd);border-radius:6px;padding:20px;text-align:center;cursor:pointer" onclick="$(\'impFile\').click()" ondragover="event.preventDefault();this.style.borderColor=\'var(--pri)\'" ondragleave="this.style.borderColor=\'var(--bd)\'" ondrop="event.preventDefault();this.style.borderColor=\'var(--bd)\';processImportFile(event.dataTransfer.files[0])"><div style="font-size:28px">📊</div><div style="font-weight:600;margin:6px 0">Norma 43 / Excel</div><div style="font-size:10px;color:var(--txM)">.n43 · .xlsx · .xls · .csv</div><input id="impFile" type="file" accept=".n43,.xlsx,.xls,.csv" style="display:none" onchange="processImportFile(this.files[0])"></div>'+
  '<div style="border:2px dashed var(--bd);border-radius:6px;padding:20px;text-align:center"><div style="font-size:28px">📋</div><div style="font-weight:600;margin:6px 0">Pegar desde Excel</div><div style="font-size:10px;color:var(--txM)">Copia columnas: Fecha · Concepto · Importe</div><textarea class="inp" id="impPaste" rows="3" style="margin-top:8px;font-size:10px" placeholder="Pega aquí los datos del banco"></textarea><button class="btn btn-p" style="width:100%;margin-top:6px" onclick="processImportPaste()">Procesar</button></div></div>'+
  '<div id="impResult"></div></div></div>';
}

function processImportFile(file){
  if(!file){toast('Selecciona un archivo','error');return;}
  var ext=file.name.split('.').pop().toLowerCase();
  var reader=new FileReader();
  if(ext==='csv'){
    reader.onload=function(e){processImportCSV(e.target.result);};reader.readAsText(file);
  }else if(ext==='xlsx'||ext==='xls'){
    reader.onload=function(e){
      var data=new Uint8Array(e.target.result);var wb=XLSX.read(data,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];var rows=XLSX.utils.sheet_to_json(ws,{header:1});
      processImportRows(rows);
    };reader.readAsArrayBuffer(file);
  }else if(ext==='n43'){
    reader.onload=function(e){processN43(e.target.result);};reader.readAsText(file,'ISO-8859-1');
  }else{toast('Formato no soportado','error');}
}

function processImportPaste(){
  var txt=$('impPaste').value;if(!txt.trim()){toast('Pega datos primero','error');return;}
  var rows=txt.trim().split('\n').map(function(line){return line.split('\t');});
  processImportRows(rows);
}

function processImportCSV(text){
  var sep=text.indexOf(';')>=0?';':',';
  var rows=text.trim().split('\n').map(function(line){return line.split(sep);});
  processImportRows(rows);
}

function processImportRows(rows){
  if(rows.length<2){toast('Sin datos','error');return;}
  var header=rows[0].map(function(c){return String(c||'').toLowerCase().trim();});
  var dI=header.findIndex(function(h){return h.match(/fecha|date/i);});
  var cI=header.findIndex(function(h){return h.match(/concepto|concept|desc/i);});
  var aI=header.findIndex(function(h){return h.match(/importe|amount|import/i);});
  if(dI<0)dI=0;if(cI<0)cI=1;if(aI<0)aI=header.length-1;

  var txns=[];
  for(var i=1;i<rows.length;i++){
    var r=rows[i];if(!r[dI]&&!r[cI])continue;
    var rawDate=String(r[dI]||'');
    var dateStr=parseDate(rawDate);
    var concept=String(r[cI]||'').trim();
    var rawAmt=String(r[aI]||'0').replace(/[€$\s]/g,'').replace(/\./g,'').replace(',','.');
    var amt=parseFloat(rawAmt)||0;
    if(dateStr&&(concept||amt))txns.push({date:dateStr,concept:concept,amount:amt});
  }
  showImportResults(txns);
}

function parseDate(s){
  if(!s)return '';s=String(s).trim();
  var m;
  if(m=s.match(/^(\d{4})-(\d{2})-(\d{2})/))return s.slice(0,10);
  if(m=s.match(/^(\d{2})[\/\-](\d{2})[\/\-](\d{4})/))return m[3]+'-'+m[2]+'-'+m[1];
  if(m=s.match(/^(\d{2})[\/\-](\d{2})[\/\-](\d{2})/))return '20'+m[3]+'-'+m[2]+'-'+m[1];
  // Excel serial number
  var num=parseFloat(s);if(num>30000&&num<60000){var d=new Date((num-25569)*86400000);return d.toISOString().slice(0,10);}
  return '';
}

function processN43(text){
  var lines=text.split('\n');var txns=[];
  lines.forEach(function(line){
    if(line.substring(0,2)==='22'){
      var y='20'+line.substring(10,12);var m=line.substring(12,14);var d=line.substring(14,16);
      var amt=parseInt(line.substring(28,42))||0;amt=amt/100;
      var sign=line.substring(27,28);if(sign==='1')amt=-amt;
      var concept=line.substring(52).trim();
      txns.push({date:y+'-'+m+'-'+d,concept:concept,amount:amt});
    }
  });
  showImportResults(txns);
}

function showImportResults(txns){
  if(!txns.length){toast('No se encontraron movimientos','error');return;}
  // Match rules and detect duplicates
  txns.forEach(function(t){
    t.matched=false;t.account='62900000';t.ruleDesc='Sin clasificar';t.iva='general';
    // Positive = income (G7), negative = expense (G6)
    if(t.amount>0){t.account='75900000';t.ruleDesc='Ingreso';t.iva='general';}
    for(var i=0;i<state.rules.length;i++){
      var r=state.rules[i];
      try{if(new RegExp(r.p,'i').test(t.concept)){t.account=r.a;t.ruleDesc=r.d;t.iva=r.iv||'general';t.matched=true;break;}}catch(e){}
    }
    // Duplicate check
    t.isDup=state.entries.some(function(e){return e.date===t.date&&Math.abs(e.lines.reduce(function(s,l){return s+l.d;},0)-Math.abs(t.amount))<0.01;});
  });

  window._impTxns=txns;
  var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  var res=$('impResult');
  res.innerHTML='<div class="card" style="border:2px solid var(--pri);margin-top:14px"><div class="card-h" style="background:var(--priLt)"><span style="color:var(--pri)">📋 '+txns.length+' movimientos encontrados</span><div><button class="btn btn-p" onclick="importAll()">✅ Contabilizar todos</button></div></div>'+
  '<div class="scr"><table><thead><tr><th style="width:30px">✓</th><th>Fecha</th><th>Concepto</th><th style="text-align:right">Importe</th><th>Cuenta</th><th>Regla</th><th>Estado</th></tr></thead><tbody>'+
  txns.map(function(t,i){
    var cls=t.isDup?'background:#FFF3E0':t.matched?'background:#E8F8ED':'';

async function importAll(){
  var txns=window._impTxns;if(!txns)return;
  var count=0;
  for(var i=0;i<txns.length;i++){
    var ck=$('impCk'+i);if(!ck||!ck.checked)continue;
    var t=txns[i];var absAmt=Math.abs(t.amount);
    var ic=IVA.find(function(x){return x.id===t.iva;});
    var ded=ic&&ic.r>0&&t.iva!=='nodeducible';
    var base=absAmt,iva=0;if(ded){base=Math.round((absAmt/(1+ic.r))*100)/100;iva=Math.round((absAmt-base)*100)/100;}
    var lines;
    if(t.amount<0){
      lines=[{a:t.account,d:ded?base:absAmt,h:0}];
      if(ded)lines.push({a:'47200000',d:iva,h:0});
      lines.push({a:'57200000',d:0,h:absAmt});
    }else{
      lines=[{a:'57200000',d:absAmt,h:0}];
      if(ded)lines.push({a:'47700000',d:0,h:iva});
      lines.push({a:t.account,d:0,h:ded?base:absAmt});
    }
    await api('/api/entries/'+state.company.id,{method:'POST',body:{id:'imp_'+uid(),date:t.date,concept:t.concept,type:'import',lines:lines}});
    count++;
  }
  await loadData();checkIntegrity();toast(count+' asientos importados');render();
}

function updatePrevLine(idx,field,val){

  savePrevLines();render();
}
function deletePrevLine(idx){

function importPrevFromAccounting(){
  loadPrevLines();
  var all=state.entries.filter(function(e){return e.date&&e.date.startsWith(String(state.ejercicio));});
  var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  // Find pending receivables (430 with debit balance)
  var clientSaldos={};
  all.forEach(function(e){e.lines.forEach(function(l){
    if(l.a&&l.a.startsWith('430')){if(!clientSaldos[e.concept])clientSaldos[e.concept]=0;clientSaldos[e.concept]+=l.d-l.h;}
  });});
  // Find pending payables (400, 410 with credit balance)
  var provSaldos={};
  all.forEach(function(e){e.lines.forEach(function(l){
    if(l.a&&(l.a.startsWith('400')||l.a.startsWith('410'))){if(!provSaldos[e.concept])provSaldos[e.concept]=0;provSaldos[e.concept]+=l.h-l.d;}
  });});
  // Check existing lines to avoid duplicates
  var existingKeys={};
  prevLines.forEach(function(pl){existingKeys[pl.desc+'_'+pl.tipo]=true;});
  var added=0;
  Object.entries(clientSaldos).forEach(function(x){
    if(x[1]>1 && !existingKeys[x[0]+'_cobro']){prevLines.push({date:today(),tercero:'Cliente',desc:x[0],tipo:'cobro',ingreso:Math.round(x[1]*100)/100,gasto:0});added++;}
  });
  Object.entries(provSaldos).forEach(function(x){
    if(x[1]>1 && !existingKeys[x[0]+'_pago']){prevLines.push({date:today(),tercero:'Proveedor',desc:x[0],tipo:'pago',ingreso:0,gasto:Math.round(x[1]*100)/100});added++;}
  });
  savePrevLines();
  toast(added>0?added+' líneas importadas de pendientes':'Ya están todos los pendientes importados');
  render();
}
function exportPrevExcel(){
  loadPrevLines();
  var rows=prevLines.sort(function(a,b){return (a.date||'').localeCompare(b.date||'');}).map(function(l){return [l.date,l.tercero,l.desc,l.tipo,l.ingreso||'',l.gasto||''];});
  exportExcel(rows,['Fecha','Cliente/Proveedor','Descripción','Tipo','Ingreso','Gasto'],'prevision_tesoreria');
}

function saveExpediente(idx){

var captadores=[];
function loadCaptadores(){try{captadores=JSON.parse(localStorage.getItem('cf_capt_'+(state.company?state.company.id:''))||'[]');}catch(e){captadores=[];}}

function renderCaptacion(c){
  loadCaptadores();loadExpedientes();
  // Calculate commissions from expedientes
  var comisiones={};
  expedientes.forEach(function(e){
    if(e.captador&&e.comision>0){
      if(!comisiones[e.captador])comisiones[e.captador]={total:0,devengada:0,pagada:0,ops:0};
      comisiones[e.captador].ops++;
      var com=e.precio*e.comision/100;
      comisiones[e.captador].total+=com;
      if(e.estado==='cobrado'||e.estado==='vendido')comisiones[e.captador].devengada+=com;
    }
  });

  c.innerHTML='<div class="grid-2">'+
  '<div class="card"><div class="card-h"><span>🤝 Captadores — '+captadores.length+'</span><button class="btn btn-p" onclick="newCaptador()">+ Nuevo</button></div>'+
  (captadores.length?'<table><thead><tr><th>Nombre</th><th>CIF</th><th>Teléfono</th><th>Email</th><th>Condiciones</th><th style="width:30px"></th></tr></thead><tbody>'+
  captadores.map(function(cap,i){return '<tr class="'+(i%2?'alt':'')+'"><td style="font-weight:600">'+h(cap.name)+'</td><td style="font-size:10px">'+h(cap.cif||'')+'</td><td style="font-size:10px">'+h(cap.phone||'')+'</td><td style="font-size:10px">'+h(cap.email||'')+'</td><td style="font-size:10px">'+h(cap.condiciones||'')+'</td><td><button class="abtn" style="color:var(--rd)" onclick="deleteCaptador('+i+')">🗑</button></td></tr>';}).join('')+'</tbody></table>':'<div class="empty">Sin captadores</div>')+'</div>'+
  '<div class="card"><div class="card-h" style="color:var(--am)">💰 Comisiones por captador</div>'+
  (Object.keys(comisiones).length?'<table><thead><tr><th>Captador</th><th style="text-align:right">Operaciones</th><th style="text-align:right">Com. total</th><th style="text-align:right">Devengada</th><th style="text-align:right">Pagada</th><th style="text-align:right">Pendiente</th></tr></thead><tbody>'+
  Object.entries(comisiones).map(function(x,i){var c2=x[1];return '<tr class="'+(i%2?'alt':'')+'"><td style="font-weight:600">'+h(x[0])+'</td><td style="text-align:right">'+c2.ops+'</td><td style="text-align:right">'+fmt(c2.total)+'€</td><td style="text-align:right;color:var(--ok)">'+fmt(c2.devengada)+'€</td><td style="text-align:right;color:var(--bl)">'+fmt(c2.pagada)+'€</td><td style="text-align:right;font-weight:700;color:var(--am)">'+fmt(c2.devengada-c2.pagada)+'€</td></tr>';}).join('')+'</tbody></table>':'<div class="empty">Sin comisiones — asigna captadores a los expedientes</div>')+'</div></div>';

  var name=prompt('Nombre del captador:');if(!name)return;

// ═══ MODELO 303 — IVA TRIMESTRAL ═══
function renderModelo303(c){
  var all=state.entries.filter(function(e){return e.date&&e.date.startsWith(String(state.ejercicio));});
  var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  var trimestres=[{name:'1T (Ene-Mar)',from:'01',to:'03'},{name:'2T (Abr-Jun)',from:'04',to:'06'},{name:'3T (Jul-Sep)',from:'07',to:'09'},{name:'4T (Oct-Dic)',from:'10',to:'12'}];
  var datos=trimestres.map(function(t){
    var fromD=state.ejercicio+'-'+t.from+'-01';var toD=state.ejercicio+'-'+t.to+'-31';
    var rep=0,sop=0,baseRep=0,baseSop=0;
    all.forEach(function(e){
      if(e.date>=fromD&&e.date<=toD){
        e.lines.forEach(function(l){
          if(l.a&&l.a.startsWith('477')){rep+=l.h;if(l.d>0)rep-=l.d;}
          if(l.a&&l.a.startsWith('472')){sop+=l.d;if(l.h>0)sop-=l.h;}
          var g=parseInt((l.a||'')[0])||0;
          if(g===7)baseRep+=l.h;
          if(g===6)baseSop+=l.d;
        });
      }
    });
    return {name:t.name,baseRep:baseRep,rep:rep,baseSop:baseSop,sop:sop,resultado:rep-sop};
  });
  var totalRep=datos.reduce(function(s,d){return s+d.rep;},0);
  var totalSop=datos.reduce(function(s,d){return s+d.sop;},0);
  var totalBaseRep=datos.reduce(function(s,d){return s+d.baseRep;},0);
  var totalBaseSop=datos.reduce(function(s,d){return s+d.baseSop;},0);
  var verificacion='';
  if(totalBaseRep>0&&totalRep===0)verificacion+='<div style="padding:8px 14px;background:#FDF0F0;border-bottom:1px solid var(--rd);font-size:11px;color:var(--rd)">⚠️ Ventas '+fmt(totalBaseRep)+'€ sin IVA repercutido (cuenta 477). Revisa los asientos de venta.</div>';
  if(totalBaseSop>0&&totalSop===0)verificacion+='<div style="padding:8px 14px;background:#FDF0F0;border-bottom:1px solid var(--rd);font-size:11px;color:var(--rd)">⚠️ Compras '+fmt(totalBaseSop)+'€ sin IVA soportado (cuenta 472). Revisa los asientos de compra.</div>';
  c.innerHTML='<div class="card"><div class="card-h"><span>📋 Modelo 303 — IVA Trimestral '+state.ejercicio+'</span></div>'+
  '<div style="padding:8px 14px;display:flex;gap:20px;font-size:12px;border-bottom:1px solid #EDF0F4"><div>IVA Repercutido: <strong style="color:var(--rd)">'+fmt(totalRep)+'€</strong></div><div>IVA Soportado: <strong style="color:var(--ok)">'+fmt(totalSop)+'€</strong></div><div>Resultado: <strong style="color:'+(totalRep-totalSop>=0?'var(--rd)':'var(--ok)')+'">'+fmt(Math.abs(totalRep-totalSop))+'€ '+(totalRep-totalSop>=0?'a pagar':'a devolver')+'</strong></div></div>'+verificacion+
  '<table><thead><tr><th>Trimestre</th><th style="text-align:right">Base ventas</th><th style="text-align:right">IVA repercutido</th><th style="text-align:right">Base compras</th><th style="text-align:right">IVA soportado</th><th style="text-align:right">Resultado</th><th>Acción</th></tr></thead><tbody>'+
  datos.map(function(d,i){return '<tr class="'+(i%2?'alt':'')+'"><td style="font-weight:600">'+d.name+'</td><td style="text-align:right">'+fmt(d.baseRep)+'€</td><td style="text-align:right;color:var(--rd)">'+fmt(d.rep)+'€</td><td style="text-align:right">'+fmt(d.baseSop)+'€</td><td style="text-align:right;color:var(--ok)">'+fmt(d.sop)+'€</td><td style="text-align:right;font-weight:700;color:'+(d.resultado>=0?'var(--rd)':'var(--ok)')+'">'+fmt(Math.abs(d.resultado))+'€</td><td>'+(d.resultado>=0?'<span class="badge badge-r">A pagar</span>':'<span class="badge badge-g">A devolver</span>')+'</td></tr>';}).join('')+
  '<tr class="total"><td>ANUAL</td><td style="text-align:right">'+fmt(totalBaseRep)+'€</td><td style="text-align:right">'+fmt(totalRep)+'€</td><td style="text-align:right">'+fmt(totalBaseSop)+'€</td><td style="text-align:right">'+fmt(totalSop)+'€</td><td style="text-align:right;font-size:14px">'+fmt(Math.abs(totalRep-totalSop))+'€</td><td></td></tr></tbody></table></div>';
}


// ═══ PENDIENTES COBRO/PAGO ═══
function renderPendientesCobro(c){
  var all=filteredEntries();var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  var pendCobro=[],pendPago=[];
  // Agrupar por cliente (430) y proveedor (400/410)
  var clientes={},proveedores={};
  all.forEach(function(e){e.lines.forEach(function(l){
    if(l.a&&l.a.startsWith('430')){
      var key=e.concept||'Sin concepto';if(!clientes[key])clientes[key]={saldo:0,date:e.date};
      clientes[key].saldo+=l.d-l.h;clientes[key].date=e.date;
    }
    if(l.a&&(l.a.startsWith('400')||l.a.startsWith('410'))){
      var key2=e.concept||'Sin concepto';if(!proveedores[key2])proveedores[key2]={saldo:0,date:e.date};
      proveedores[key2].saldo+=l.h-l.d;proveedores[key2].date=e.date;
    }
  });});
  Object.entries(clientes).forEach(function(x){if(x[1].saldo>0.01)pendCobro.push({name:x[0],saldo:x[1].saldo,date:x[1].date});});
  Object.entries(proveedores).forEach(function(x){if(x[1].saldo>0.01)pendPago.push({name:x[0],saldo:x[1].saldo,date:x[1].date});});
  pendCobro.sort(function(a,b){return b.saldo-a.saldo;});
  pendPago.sort(function(a,b){return b.saldo-a.saldo;});
  var totalCobro=pendCobro.reduce(function(s,x){return s+x.saldo;},0);
  var totalPago=pendPago.reduce(function(s,x){return s+x.saldo;},0);

  c.innerHTML='<div class="row"><div class="stat"><div class="stat-v" style="color:var(--ok)">'+fmt(totalCobro)+'€</div><div class="stat-l">📥 Pendiente de cobro</div></div><div class="stat"><div class="stat-v" style="color:var(--rd)">'+fmt(totalPago)+'€</div><div class="stat-l">📤 Pendiente de pago</div></div><div class="stat"><div class="stat-v" style="color:'+(totalCobro-totalPago>=0?'var(--ok)':'var(--rd)')+'">'+fmt(totalCobro-totalPago)+'€</div><div class="stat-l">📊 Posición neta</div></div></div>'+
  '<div class="grid-2">'+
  '<div class="card"><div class="card-h" style="color:var(--ok)">📥 Pendiente de cobro — '+pendCobro.length+'</div>'+
  (pendCobro.length?'<table><thead><tr><th>Cliente/Concepto</th><th>Fecha</th><th style="text-align:right">Importe</th></tr></thead><tbody>'+
  pendCobro.map(function(p,i){
    var hoy=new Date();var fp=new Date(p.date);var dias=Math.floor((hoy-fp)/(1000*60*60*24));
    return '<tr class="'+(i%2?'alt':'')+'"><td style="font-weight:600;font-size:11px">'+h(p.name)+'</td><td style="font-size:10px">'+fmtD(p.date)+' <span style="color:'+(dias>30?'var(--rd)':'var(--txM)')+';font-size:9px">('+dias+'d)</span></td><td style="text-align:right;font-weight:600;color:var(--ok)">'+fmt(p.saldo)+'€</td></tr>';}).join('')+
  '<tr class="total"><td colspan="2">TOTAL</td><td style="text-align:right">'+fmt(totalCobro)+'€</td></tr></tbody></table>':'<div class="empty">Sin pendientes de cobro</div>')+'</div>'+
  '<div class="card"><div class="card-h" style="color:var(--rd)">📤 Pendiente de pago — '+pendPago.length+'</div>'+
  (pendPago.length?'<table><thead><tr><th>Proveedor/Concepto</th><th>Fecha</th><th style="text-align:right">Importe</th></tr></thead><tbody>'+
  pendPago.map(function(p,i){
    var hoy=new Date();var fp=new Date(p.date);var dias=Math.floor((hoy-fp)/(1000*60*60*24));
    return '<tr class="'+(i%2?'alt':'')+'"><td style="font-weight:600;font-size:11px">'+h(p.name)+'</td><td style="font-size:10px">'+fmtD(p.date)+' <span style="color:'+(dias>30?'var(--rd)':'var(--txM)')+';font-size:9px">('+dias+'d)</span></td><td style="text-align:right;font-weight:600;color:var(--rd)">'+fmt(p.saldo)+'€</td></tr>';}).join('')+
  '<tr class="total"><td colspan="2">TOTAL</td><td style="text-align:right">'+fmt(totalPago)+'€</td></tr></tbody></table>':'<div class="empty">Sin pendientes de pago</div>')+'</div></div>';
}

function renderModelo111(c){

  var datos=trimestres.map(function(t){
    var from=state.ejercicio+'-'+t.from+'-01',to=state.ejercicio+'-'+t.to+'-31';
    var retTotal=0,baseT=0,baseP=0;
    all.forEach(function(e){
      if(e.date>=from&&e.date<=to){e.lines.forEach(function(l){
        if(l.a&&l.a.startsWith('4751')){retTotal+=l.h;if(l.d>0)retTotal-=l.d;}
        if(l.a&&l.a.startsWith('640'))baseT+=l.d;
        if(l.a&&(l.a.startsWith('623')||l.a.startsWith('629')))baseP+=l.d;
      });}
    });
    var retT=retTotal,retP=0;
    if(baseP>0&&baseT>0&&retTotal>0){var tot=baseT+baseP;retT=Math.round(retTotal*baseT/tot*100)/100;retP=Math.round(retTotal*baseP/tot*100)/100;}
    else if(baseP>0&&baseT===0){retP=retTotal;retT=0;}
    return {name:t.name,baseT:baseT,retT:retT,baseP:baseP,retP:retP,total:retTotal};
  });
  var totalBaseT=datos.reduce(function(s,d){return s+d.baseT;},0);

  datos.map(function(d,i){return '<tr class="'+(i%2?'alt':'')+'"><td style="font-weight:600">'+d.name+'</td><td style="text-align:right">'+fmt(d.baseT)+'€</td><td style="text-align:right">'+fmt(d.retT)+'€</td><td style="text-align:right">'+fmt(d.baseP)+'€</td><td style="text-align:right">'+fmt(d.retP)+'€</td><td style="text-align:right;font-weight:700;color:var(--rd)">'+fmt(d.total)+'€</td></tr>';}).join('')+
  '<tr class="total"><td>ANUAL</td><td style="text-align:right">'+fmt(totalBaseT)+'€</td><td style="text-align:right">'+fmt(datos.reduce(function(s,d){return s+d.retT;},0))+'€</td><td style="text-align:right">'+fmt(datos.reduce(function(s,d){return s+d.baseP;},0))+'€</td><td style="text-align:right">'+fmt(datos.reduce(function(s,d){return s+d.retP;},0))+'€</td><td style="text-align:right;font-size:14px">'+fmt(totalRet)+'€</td></tr></tbody></table></div>';
}

function renderCartera(c){
  loadExpedientes();
  var estados={gestion:0,judicial:0,cobrado:0,dacion:0,vendido:0,fallido:0};
  var totalDeuda=0,totalPrecio=0,cobrado=0;
  expedientes.forEach(function(e){
    var st=e.estado||'gestion';if(estados[st]!==undefined)estados[st]++;
    totalDeuda+=(e.deuda||0);totalPrecio+=(e.precio||0);
    if(st==='cobrado'||st==='vendido')cobrado+=(e.deuda||0);
  });
  var pctCobro=totalDeuda>0?Math.round(cobrado/totalDeuda*100):0;
  c.innerHTML='<div class="row"><div class="stat"><div class="stat-v" style="color:var(--bl)">'+expedientes.length+'</div><div class="stat-l">📁 Total cartera</div></div><div class="stat"><div class="stat-v" style="color:var(--am)">'+fmt(totalDeuda)+'€</div><div class="stat-l">💰 Deuda nominal</div></div><div class="stat"><div class="stat-v" style="color:var(--ok)">'+fmt(totalPrecio)+'€</div><div class="stat-l">🏷️ Inversión</div></div><div class="stat"><div class="stat-v" style="color:var(--ok)">'+pctCobro+'%</div><div class="stat-l">📊 % cobrado</div></div></div>'+
  '<div class="card"><div class="card-h"><span>📊 Distribución por estado</span></div><div class="card-b">'+
  '<div style="display:grid;grid-template-columns:repeat(6,1fr);gap:8px">'+
  [{k:'gestion',l:'En gestión',c:'badge-b'},{k:'judicial',l:'Judicial',c:'badge-a'},{k:'cobrado',l:'Cobrado',c:'badge-g'},{k:'dacion',l:'Dación',c:'badge-v'},{k:'vendido',l:'Vendido',c:'badge-o'},{k:'fallido',l:'Fallido',c:'badge-r'}].map(function(st){
    var n=estados[st.k]||0;var pct=expedientes.length>0?Math.round(n/expedientes.length*100):0;
    return '<div style="text-align:center;padding:12px;border:1px solid var(--bd);border-radius:6px"><div style="font-size:24px;font-weight:700">'+n+'</div><div style="font-size:10px;color:var(--txM)">'+st.l+'</div><div style="margin-top:4px"><span class="badge '+st.c+'">'+pct+'%</span></div></div>';
  }).join('')+'</div></div></div>'+
  '<div class="card"><div class="card-h"><span>📁 Expedientes por tipo</span></div>'+
  (function(){
    var tipos={};expedientes.forEach(function(e){var t=e.tipo||'otros';if(!tipos[t])tipos[t]={count:0,deuda:0,precio:0};tipos[t].count++;tipos[t].deuda+=(e.deuda||0);tipos[t].precio+=(e.precio||0);});
    return '<table><thead><tr><th>Tipo</th><th style="text-align:right">Expedientes</th><th style="text-align:right">Deuda</th><th style="text-align:right">Inversión</th><th style="text-align:right">% compra</th></tr></thead><tbody>'+
    Object.entries(tipos).map(function(x,i){var pct=x[1].deuda>0?Math.round(x[1].precio/x[1].deuda*100):0;return '<tr class="'+(i%2?'alt':'')+'"><td style="font-weight:600"><span class="badge badge-v">'+h(x[0])+'</span></td><td style="text-align:right">'+x[1].count+'</td><td style="text-align:right">'+fmt(x[1].deuda)+'€</td><td style="text-align:right">'+fmt(x[1].precio)+'€</td><td style="text-align:right;font-weight:600">'+pct+'%</td></tr>';}).join('')+'</tbody></table>';
  })()+'</div>';
}

// ═══ RENTABILIDAD POR EXPEDIENTE ═══
function renderRentabilidad(c){
  loadExpedientes();
  var items=expedientes.filter(function(e){return e.deuda>0&&e.precio>0;}).map(function(e){
    var rentab=Math.round((e.deuda-e.precio)/e.precio*100);
    var multiple=e.precio>0?(e.deuda/e.precio).toFixed(1):'—';
    return {codigo:e.codigo,deudor:e.deudor,deuda:e.deuda,precio:e.precio,rentab:rentab,multiple:multiple,estado:e.estado||'gestion'};
  }).sort(function(a,b){return b.rentab-a.rentab;});
  var totalInvertido=items.reduce(function(s,x){return s+x.precio;},0);
  var totalRecuperable=items.reduce(function(s,x){return s+x.deuda;},0);
  var rentabMedia=totalInvertido>0?Math.round((totalRecuperable-totalInvertido)/totalInvertido*100):0;

function runDailyIntegrityCheck(){
  try{
    var lastCheck=localStorage.getItem('cf_integrity_last_'+(state.company?state.company.id:''));
    var today2=new Date().toISOString().slice(0,10);
    if(lastCheck===today2)return;// Ya se hizo hoy
    localStorage.setItem('cf_integrity_last_'+(state.company?state.company.id:''),today2);
    var report=fullIntegrityReport();
    if(report.errors.length>0){
      auditLog('integrity_error','⚠ '+report.errors.length+' errores detectados');
      toast('⚠️ Test integridad: '+report.errors.length+' errores. Ver Config → Auditoría','error');
    }

function fullIntegrityReport(){
  var errors=[];var warnings=[];
  var all=state.entries||[];var am={};(state.accounts||[]).forEach(function(a){am[a.code]=a;});
  // 1. Cada asiento debe cuadrar al céntimo
  all.forEach(function(e,i){
    var td=0,th=0;(e.lines||[]).forEach(function(l){td+=(l.d||0);th+=(l.h||0);});
    td=Math.round(td*100)/100;th=Math.round(th*100)/100;
    if(Math.abs(td-th)>0.005){
      errors.push('Asiento '+(i+1)+' ('+e.date+' '+e.concept+'): descuadre de '+Math.abs(td-th).toFixed(2)+'€');
    }
  });
  // 2. Sumas y saldos: total debe = total haber
  var totalD=0,totalH=0;
  all.forEach(function(e){(e.lines||[]).forEach(function(l){totalD+=(l.d||0);totalH+=(l.h||0);});});
  totalD=Math.round(totalD*100)/100;totalH=Math.round(totalH*100)/100;
  if(Math.abs(totalD-totalH)>0.005){
    errors.push('DESCUADRE GLOBAL: Debe='+totalD.toFixed(2)+' Haber='+totalH.toFixed(2)+' Dif='+Math.abs(totalD-totalH).toFixed(2));
  }
  // 3. Verificar que IVA repercutido = base * tipo
  var saldos={};
  all.forEach(function(e){(e.lines||[]).forEach(function(l){if(!saldos[l.a])saldos[l.a]={d:0,h:0};saldos[l.a].d+=(l.d||0);saldos[l.a].h+=(l.h||0);});});
  // 4. Balance: activo = pasivo + neto (G1-5)
  var activo=0,pasivo=0;
  Object.entries(saldos).forEach(function(x){
    var g=parseInt(x[0][0])||0;
    if(g>=1&&g<=5){
      var s=x[1].d-x[1].h;
      if(s>0)activo+=s;else pasivo+=(-s);
    }
  });
  // 5. Ingresos grupo 7 vs gastos grupo 6
  var ingresos=0,gastos=0;
  Object.entries(saldos).forEach(function(x){
    var g=parseInt(x[0][0])||0;
    if(g===7)ingresos+=x[1].h-x[1].d;
    if(g===6)gastos+=x[1].d-x[1].h;
  });
  return {errors:errors,warnings:warnings,stats:{asientos:all.length,cuentas:Object.keys(saldos).length,totalDebe:totalD,totalHaber:totalH,activo:activo,pasivo:pasivo,ingresos:ingresos,gastos:gastos,resultado:ingresos-gastos}};
}

function startGlobalVoice(){
  if(globalVoiceRecog){globalVoiceRecog.stop();globalVoiceRecog=null;var btn=$('globalMicBtn');if(btn){btn.textContent='🎤';btn.style.background='';}return;}
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){toast('Tu navegador no soporta reconocimiento de voz','error');return;}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  var r=new SR();r.lang='es-ES';r.continuous=false;r.interimResults=false;
  r.onresult=function(e){
    var transcript=e.results[0][0].transcript;
    globalVoiceRecog=null;var btn=$('globalMicBtn');if(btn){btn.textContent='🎤';btn.style.background='';}
    toast('🎤 "'+transcript+'"','ok');

  };
  r.onerror=function(){globalVoiceRecog=null;var btn=$('globalMicBtn');if(btn){btn.textContent='🎤';btn.style.background='';}toast('No se ha podido escuchar','error');};
  r.onend=function(){globalVoiceRecog=null;var btn=$('globalMicBtn');if(btn){btn.textContent='🎤';btn.style.background='';}};
  r.start();globalVoiceRecog=r;
  var btn=$('globalMicBtn');if(btn){btn.textContent='⏹';btn.style.background='var(--rd)';btn.style.color='#fff';}

function processVoiceCommand(text){
  var ql=text.toLowerCase();
  // Navigation
  var navMap={'diario':'journal','mayor':'ledger','saldos':'trial','sumas y saldos':'trial','balance':'balance','pérdidas y ganancias':'pnl','pyg':'pnl','libro iva':'libroiva','factura':'facturas','socio':'socios','proveedore':'analisis','tesorería':'posicion','concilia':'conciliacion','expediente':'expedientes','previsión':'prevision','prevision':'prevision','plan de cuenta':'planCuentas','regla':'rules','auditoría':'audit','auditoria':'audit','backup':'backups','dashboard':'dashboard','inicio':'dashboard','borradores':'borradores','plantilla':'plantillas','artículo':'articulos','inmovilizado':'inmovilizado','mapa':'mapaventas','nuevo gasto':'newEntry','asiento manual':'manualEntry','nuevo asiento':'manualEntry','chat':'chatcontable'};
  var navigated=false;
  // Sort keys by length desc to match longer phrases first
  var keys=Object.keys(navMap).sort(function(a,b){return b.length-a.length;});
  for(var i=0;i<keys.length;i++){
    if(ql.indexOf(keys[i])>=0){
      setView(navMap[keys[i]]);toast('✅ Abriendo '+keys[i],'ok');navigated=true;break;
    }
  }
  if(!navigated){
    // Try as a chat question
    chatHistory=chatHistory||[];
    chatHistory.push({role:'user',text:h(text)});
    // Calculate data for answer
    var all=state.entries.filter(function(e){return e.date&&e.date.startsWith(String(state.ejercicio));});
    var s2={};all.forEach(function(e){e.lines.forEach(function(l){if(!s2[l.a])s2[l.a]=0;s2[l.a]+=l.d-l.h;});});
    var ivaRep=0,ivaSop=0,ingresos=0,gastos=0,banco=0,caja=0,clientes=0,proveedores=0;
    Object.entries(s2).forEach(function(x){var code=x[0],val=x[1];
      if(code.startsWith('477'))ivaRep+=-(val);if(code.startsWith('472'))ivaSop+=val;
      if(parseInt(code[0])===7)ingresos+=(-val);if(parseInt(code[0])===6)gastos+=val;
      if(code.startsWith('572'))banco+=val;if(code.startsWith('570'))caja+=val;
      if(code.startsWith('430'))clientes+=val;if(code.startsWith('400')||code.startsWith('410'))proveedores+=(-val);
    });
    var answer='';
    if(ql.indexOf('vendido')>=0||ql.indexOf('venta')>=0||ql.indexOf('ingreso')>=0||ql.indexOf('facturado')>=0)answer='Ventas: <strong>'+fmt(ingresos)+'€</strong>';
    else if(ql.indexOf('iva')>=0)answer='IVA: Rep '+fmt(ivaRep)+'€ - Sop '+fmt(ivaSop)+'€ = <strong>'+fmt(Math.abs(ivaRep-ivaSop))+'€ '+(ivaRep-ivaSop>=0?'a pagar':'a devolver')+'</strong>';
    else if(ql.indexOf('resultado')>=0||ql.indexOf('beneficio')>=0)answer='Resultado: <strong>'+fmt(ingresos-gastos)+'€</strong>';
    else if(ql.indexOf('banco')>=0||ql.indexOf('tesorería')>=0||ql.indexOf('dinero')>=0||ql.indexOf('saldo')>=0)answer='Banco: '+fmt(banco)+'€ | Caja: '+fmt(caja)+'€ | <strong>Total: '+fmt(banco+caja)+'€</strong>';
    else if(ql.indexOf('gasto')>=0)answer='Gastos totales: <strong>'+fmt(gastos)+'€</strong>';
    else if(ql.indexOf('cliente')>=0||ql.indexOf('cobrar')>=0)answer='Clientes pte cobro: <strong>'+fmt(clientes)+'€</strong>';
    else if(ql.indexOf('proveedor')>=0||ql.indexOf('debo')>=0)answer='Proveedores pte pago: <strong>'+fmt(proveedores)+'€</strong>';
    else answer='No he entendido. Prueba: "sácame sumas y saldos", "cuánto he vendido", "abre el diario"...';
    chatHistory.push({role:'bot',text:answer});
    toast('💬 '+answer.replace(/<[^>]+>/g,''),'ok');
    if(state.view==='chatcontable')render();
  }
}

  document.body.classList.toggle('dark');
  try{localStorage.setItem('cf_dark',document.body.classList.contains('dark')?'1':'0');}catch(e){}
}
// Load dark mode preference
try{if(localStorage.getItem('cf_dark')==='1')document.body.classList.add('dark');}catch(e){}

// ═══ ATAJOS DE TECLADO ═══
document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA'||e.target.tagName==='SELECT')return;
  if(e.ctrlKey||e.metaKey){
    if(e.key==='b'||e.key==='B'){e.preventDefault();doBackup();}
    if(e.key==='n'||e.key==='N'){e.preventDefault();showAssistant();}
    if(e.key==='m'||e.key==='M'){e.preventDefault();showEntryModal();}
    if(e.key==='k'||e.key==='K'){e.preventDefault();var sb=document.querySelector('[placeholder="🔍 Buscar..."]');if(sb)sb.focus();}
  }
  if(e.key==='F2'){e.preventDefault();toggleDarkMode();}
});

// ═══ ANÁLISIS PROVEEDORES ═══
function renderAnalisisProveedores(c){
  var all=filteredEntries();var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  // Agrupar por proveedor real: cuentas 400xxxx (proveedores) y 410xxxx (acreedores)
  var provs={};
  all.forEach(function(e){
    // Buscar líneas con cuentas de proveedor/acreedor (400, 410)
    var provAccts=[];var gastoTotal=0;
    e.lines.forEach(function(l){
      if(l.a&&(l.a.startsWith('400')||l.a.startsWith('410'))&&l.h>0){
        provAccts.push(l);
      }
      var g=parseInt((l.a||'')[0])||0;
      if(g===6&&l.d>0)gastoTotal+=l.d;
    });
    // Si hay cuenta de proveedor, agrupar por ella
    if(provAccts.length>0){
      provAccts.forEach(function(pl){
        var key=pl.a;
        var provName=am[pl.a]?am[pl.a].name:pl.a;
        if(!provs[key])provs[key]={name:provName,total:0,count:0,months:{},lastDate:'',cuenta:pl.a};
        provs[key].total+=pl.h;provs[key].count++;
        var ym=e.date.slice(0,7);if(!provs[key].months[ym])provs[key].months[ym]=0;
        provs[key].months[ym]+=pl.h;
        if(e.date>provs[key].lastDate)provs[key].lastDate=e.date;
      });
    } else if(gastoTotal>0){
      // Fallback: si no hay cuenta proveedor, usar concepto
      var key='_'+((e.concept||'Otros').split(/\s+/)[0]);
      if(!provs[key])provs[key]={name:(e.concept||'Otros').split(/\s+/)[0],total:0,count:0,months:{},lastDate:'',cuenta:'Directo'};
      provs[key].total+=gastoTotal;provs[key].count++;
      var ym2=e.date.slice(0,7);if(!provs[key].months[ym2])provs[key].months[ym2]=0;
      provs[key].months[ym2]+=gastoTotal;
      if(e.date>provs[key].lastDate)provs[key].lastDate=e.date;
    }
  });
  var lista=Object.values(provs).sort(function(a,b){return b.total-a.total;});
  var totalGasto=lista.reduce(function(s,p){return s+p.total;},0);

  c.innerHTML=dateFilterHTML()+
  '<div class="card"><div class="card-h"><span>📊 Análisis de proveedores — '+lista.length+' proveedores</span><button class="btn btn-d" style="font-size:10px" onclick="exportAnalisisExcel()">📊 Excel</button></div>'+
  '<div style="padding:8px 14px;font-size:12px;border-bottom:1px solid #EDF0F4">Total facturado proveedores: <strong style="color:var(--rd)">'+fmt(totalGasto)+'€</strong></div>'+
  (lista.length?'<div class="scr"><table><thead><tr><th>Proveedor</th><th>Cuenta</th><th style="text-align:right">Total</th><th style="text-align:right">% del total</th><th style="text-align:right">Nº facturas</th><th style="text-align:right">Media/fra</th><th>Última fra</th><th>Tendencia</th></tr></thead><tbody>'+
  lista.map(function(p,i){
    var pct=totalGasto>0?Math.round(p.total/totalGasto*100):0;
    var media=p.count>0?p.total/p.count:0;
    var meses=Object.keys(p.months).sort();
    var tendencia='—';
    if(meses.length>=2){
      var primero=p.months[meses[0]];var ultimo=p.months[meses[meses.length-1]];
      var cambio=primero>0?Math.round((ultimo-primero)/primero*100):0;
      tendencia=cambio>10?'<span style="color:var(--rd)">↑ +'+cambio+'%</span>':cambio<-10?'<span style="color:var(--ok)">↓ '+cambio+'%</span>':'<span style="color:var(--txM)">= estable</span>';
    }
    return '<tr class="'+(i%2?'alt':'')+'"><td style="font-weight:600">'+h(p.name)+'</td><td class="acct" style="font-size:10px">'+h(p.cuenta)+'</td><td style="text-align:right;font-weight:700;color:var(--rd)">'+fmt(p.total)+'€</td><td style="text-align:right"><div style="display:flex;align-items:center;gap:4px;justify-content:flex-end"><div style="width:'+Math.min(pct,100)+'px;height:8px;background:var(--rd);border-radius:4px;opacity:0.3"></div>'+pct+'%</div></td><td style="text-align:right">'+p.count+'</td><td style="text-align:right">'+fmt(media)+'€</td><td style="font-size:10px">'+fmtD(p.lastDate)+'</td><td style="font-size:10px">'+tendencia+'</td></tr>';
  }).join('')+'</tbody></table></div>':'<div class="empty">Sin datos de proveedores</div>')+'</div>';
}
function exportAnalisisExcel(){
  var all=filteredEntries();var provs={};
  all.forEach(function(e){e.lines.forEach(function(l){var g=parseInt((l.a||'')[0])||0;if(g===6&&l.d>0){var key=(e.concept||'Otros').split(/\s+/)[0];if(!provs[key])provs[key]={t:0,c:0};provs[key].t+=l.d;provs[key].c++;}});});
  var rows=Object.entries(provs).sort(function(a,b){return b[1].t-a[1].t;}).map(function(x){return [x[0],x[1].t,x[1].c,x[1].c>0?x[1].t/x[1].c:0];});
  exportExcel(rows,['Proveedor','Total','Nº Facturas','Media'],'analisis_proveedores');
}

  h2+='<div><div class="lbl">% IVA</div><select class="sel" id="artIva" style="width:100%"><option value="21"'+(a.iva==='21'||!a.iva?' selected':'')+'>21%</option><option value="10"'+(a.iva==='10'?' selected':'')+'>10%</option><option value="4"'+(a.iva==='4'?' selected':'')+'>4%</option><option value="0"'+(a.iva==='0'?' selected':'')+'>Exento</option></select></div>';

  h2+='<div><div class="lbl">Cuenta contable venta</div><input class="inp" id="artCuentaV" value="'+h(a.cuentaV||'70000000')+'" maxlength="8"></div>';
  h2+='<div><div class="lbl">Cuenta contable compra</div><input class="inp" id="artCuentaC" value="'+h(a.cuentaC||'60000000')+'" maxlength="8"></div>';
  h2+='<div style="grid-column:span 2"><div class="lbl">Proveedor habitual</div><input class="inp" id="artProv" value="'+h(a.proveedor||'')+'" placeholder="Nombre proveedor"></div>';
  h2+='<div style="grid-column:span 2"><div class="lbl">Notas</div><input class="inp" id="artNotas" value="'+h(a.notas||'')+'"></div>';

function saveArticulo(idx){
  var code=$('artCode').value;var name=$('artName').value;
  if(!code||!name){toast('Código y descripción obligatorios','error');return;}
  var item={
    code:code,name:name,familia:$('artFamilia').value,
    coste:parseFloat($('artCoste').value)||0,pvp:parseFloat($('artPVP').value)||0,
    iva:$('artIva').value,stock:parseInt($('artStock').value)||0,
    unidad:$('artUnidad').value||'ud',stockMin:parseInt($('artStockMin').value)||0,
    cuentaV:$('artCuentaV').value||'70000000',cuentaC:$('artCuentaC').value||'60000000',
    proveedor:$('artProv').value,notas:$('artNotas').value
  };
  loadArticulos();
  if(idx>=0)articulos[idx]=item;else articulos.push(item);
  saveArticulos();$('artModal').remove();
  auditLog(idx>=0?'editar_articulo':'nuevo_articulo',code+' '+name);
  toast((idx>=0?'Artículo actualizado':'Artículo creado'));render();
}

function deleteArticulo(idx){
  if(!confirm('¿Eliminar artículo?'))return;
  loadArticulos();var a=articulos[idx];
  articulos.splice(idx,1);saveArticulos();
  auditLog('borrar_articulo',a?a.code+' '+a.name:'');
  toast('Artículo eliminado');render();
}

function exportArticulosExcel(){
  loadArticulos();
  var rows=articulos.map(function(a){return [a.code,a.name,a.familia,a.coste,a.pvp,a.iva+'%',a.stock,a.unidad,a.proveedor,a.notas];});
  exportExcel(rows,['Código','Descripción','Familia','Coste','PVP','IVA','Stock','Unidad','Proveedor','Notas'],'articulos');
}

  var tipoStr=esEmitida?'emitida':'recibida';
  var bg=document.createElement('div');bg.className='modal-bg';bg.id='factModal';
  var h2='<div class="modal" style="max-width:550px"><div class="card-h"><span>'+(esEmitida?'🟢 Nueva factura emitida':'🔴 Nueva factura recibida')+'</span><button class="btn btn-d" onclick="$(\'factModal\').remove()">✕</button></div><div class="card-b">';
  h2+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">';
  h2+='<div><div class="lbl">Nº Factura *</div><input class="inp" id="fNum" placeholder="F-2026-001"></div>';
  h2+='<div><div class="lbl">Fecha *</div><input type="date" class="inp" id="fDate" value="'+today()+'"></div>';
  h2+='<div style="grid-column:span 2"><div class="lbl">'+(esEmitida?'Cliente':'Proveedor')+' *</div><input class="inp" id="fTercero"></div>';
  h2+='<div><div class="lbl">CIF/NIF</div><input class="inp" id="fCif"></div>';
  h2+='<div><div class="lbl">Base imponible *</div><input class="inp" id="fBase" style="text-align:right" oninput="calcFactTotal()"></div>';
  h2+='<div><div class="lbl">% IVA</div><select class="sel" id="fIvaPct" style="width:100%" onchange="calcFactTotal()"><option value="21">21%</option><option value="10">10%</option><option value="4">4%</option><option value="0">Exento</option></select></div>';
  h2+='<div><div class="lbl">Cuota IVA</div><input class="inp" id="fIva" style="text-align:right" readonly></div>';
  h2+='<div><div class="lbl">Total</div><input class="inp" id="fTotal" style="text-align:right;font-weight:700" readonly></div>';
  h2+='<div><div class="lbl">Estado</div><select class="sel" id="fEstado" style="width:100%"><option value="pendiente">Pendiente</option><option value="'+(esEmitida?'cobrada':'pagada')+'">'+(esEmitida?'Cobrada':'Pagada')+'</option></select></div>';
  h2+='<div style="grid-column:span 2"><div class="lbl">Concepto</div><input class="inp" id="fConcepto"></div>';
  h2+='</div>';
  h2+='<div style="display:flex;justify-content:flex-end;gap:8px;margin-top:14px"><button class="btn btn-d" onclick="$(\'factModal\').remove()">Cancelar</button><button class="btn btn-p" onclick="saveFactura('+tipo+')">💾 Guardar</button></div></div></div>';
  bg.innerHTML=h2;
  document.body.appendChild(bg);
}

function calcFactTotal(){
  var base=parseFloat(document.getElementById('fBase')?document.getElementById('fBase').value:0)||0;
  var pct=parseFloat(document.getElementById('fIvaPct')?document.getElementById('fIvaPct').value:21)||0;
  var iva=Math.round(base*pct)/100;
  if(document.getElementById('fIva'))document.getElementById('fIva').value=iva.toFixed(2);
  if(document.getElementById('fTotal'))document.getElementById('fTotal').value=(base+iva).toFixed(2);
}
function saveFactura(tipo){
  var tipoStr=(tipo===1||tipo==='emitida')?'emitida':'recibida';
  var num=document.getElementById('fNum').value;var date=document.getElementById('fDate').value;
  var tercero=document.getElementById('fTercero').value;var base=parseFloat(document.getElementById('fBase').value)||0;
  var iva=parseFloat(document.getElementById('fIva').value)||0;var total=parseFloat(document.getElementById('fTotal').value)||0;
  var estado=document.getElementById('fEstado').value;var concepto=document.getElementById('fConcepto').value;
  var cif=document.getElementById('fCif').value;
  if(!num||!tercero||!base){toast('Nº, tercero y base obligatorios','error');return;}
  loadFacturas();
  var arr=tipoStr==='emitida'?facturas.emitidas:facturas.recibidas;
  arr.push({id:'f_'+uid(),num:num,date:date,tercero:tercero,cif:cif,base:base,iva:iva,total:total,estado:estado,concepto:concepto});
  saveFacturas();$('factModal').remove();

function renderLibroIVA(c){
  var all=filteredEntries();var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  var repercutido=[],soportado=[];
  all.forEach(function(e){
    var iva_rep=0,iva_sop=0,base_rep=0,base_sop=0,concepto=e.concept||'';
    e.lines.forEach(function(l){
      if(l.a&&l.a.startsWith('477')){iva_rep+=l.h-l.d;}
      if(l.a&&l.a.startsWith('472')){iva_sop+=l.d-l.h;}
    });
    if(iva_rep>0){
      // Buscar la cuenta de ingreso en el mismo asiento
      var cliAcct='';e.lines.forEach(function(l){var g=parseInt((l.a||'')[0])||0;if(g===7)cliAcct=l.a;});
      base_rep=Math.round((iva_rep/0.21)*100)/100;
      repercutido.push({date:e.date,concept:concepto,base:base_rep,tipo:21,cuota:iva_rep,total:base_rep+iva_rep,cuenta:cliAcct});
