function renderCierre(c){
  var ej=state.ejercicio;
  var all=state.entries.filter(function(e){return e.date&&e.date.startsWith(String(ej));});
  var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  // Calculate result: G7 (credit) - G6 (debit)
  var saldos={};
  all.forEach(function(e){e.lines.forEach(function(l){if(!saldos[l.a])saldos[l.a]=0;saldos[l.a]+=l.d-l.h;});});
  var totalG6=0,totalG7=0;
  var cuentasG6=[],cuentasG7=[];
  Object.entries(saldos).forEach(function(x){
    var code=x[0],s=x[1];var g=parseInt(code[0])||0;
    if(g===6&&Math.abs(s)>0.01){totalG6+=s;cuentasG6.push({code:code,name:am[code]?am[code].name:code,saldo:s});}
    if(g===7&&Math.abs(s)>0.01){totalG7+=(-s);cuentasG7.push({code:code,name:am[code]?am[code].name:code,saldo:s});}
  });
  var resultado=totalG7-totalG6;
  // Check if cierre already done
  var cierreHecho=all.some(function(e){return e.concept&&e.concept.indexOf('Regularización')>=0&&e.type==='cierre';});

  c.innerHTML='<div class="card"><div class="card-h"><span>Cierre del ejercicio '+ej+'</span></div><div class="card-b">'+
  '<div style="font-size:12px;color:var(--txM);margin-bottom:14px">El cierre de ejercicio genera 3 asientos automáticos:<br>1. <strong>Regularización</strong> — traspasa saldos G6 y G7 a la cuenta 12900000 (Resultado)<br>2. <strong>Cierre</strong> — deja todas las cuentas G1-G5 a cero<br>3. <strong>Apertura</strong> — abre el ejercicio siguiente con los saldos de cierre</div>'+
  (cierreHecho?'<div style="background:#E8F8ED;border:2px solid var(--ok);border-radius:6px;padding:12px;margin-bottom:14px;color:var(--ok);font-weight:600">✓ El cierre del ejercicio '+ej+' ya se ha realizado</div>':'')+
  '<div class="grid-2"><div class="card"><div class="card-h" style="color:var(--ok)">Ingresos (G7) — '+cuentasG7.length+' cuentas</div><table><tbody>'+
  cuentasG7.sort(function(a,b){return a.code.localeCompare(b.code);}).map(function(x,i){return '<tr class="'+(i%2?'alt':'')+'"><td >'+acctLink(x.code,'')+'</td><td>'+h(x.name)+'</td><td style="text-align:right;color:var(--ok)">'+fmt(Math.abs(x.saldo))+'€</td></tr>';}).join('')+
  '<tr class="total"><td colspan="2">Total ingresos</td><td style="text-align:right">'+fmt(totalG7)+'€</td></tr></tbody></table></div>'+
  '<div class="card"><div class="card-h" style="color:var(--rd)">Gastos (G6) — '+cuentasG6.length+' cuentas</div><table><tbody>'+
  cuentasG6.sort(function(a,b){return a.code.localeCompare(b.code);}).map(function(x,i){return '<tr class="'+(i%2?'alt':'')+'"><td >'+acctLink(x.code,'')+'</td><td>'+h(x.name)+'</td><td style="text-align:right;color:var(--rd)">'+fmt(Math.abs(x.saldo))+'€</td></tr>';}).join('')+
  '<tr class="total"><td colspan="2">Total gastos</td><td style="text-align:right">'+fmt(totalG6)+'€</td></tr></tbody></table></div></div>'+
  '<div class="card" style="border:2px solid '+(resultado>=0?'var(--ok)':'var(--rd)')+'"><div class="card-b" style="text-align:center;padding:20px"><div style="font-size:11px;color:var(--txM)">Resultado del ejercicio '+ej+'</div><div style="font-size:28px;font-weight:700;color:'+(resultado>=0?'var(--ok)':'var(--rd)')+'">'+fmt(resultado)+'€</div><div style="font-size:11px;color:var(--txM);margin-top:4px">'+(resultado>=0?'Beneficio':'Pérdida')+'</div></div></div>'+
  (cierreHecho?'':'<div style="display:flex;gap:8px;justify-content:center;margin-top:8px"><button class="btn btn-p" style="padding:12px 24px;font-size:13px" onclick="ejecutarCierre()">📋 Ejecutar cierre del ejercicio '+ej+'</button></div>')+
  '<div style="font-size:10px;color:var(--txM);text-align:center;margin-top:8px">⚠️ Una vez ejecutado, se cierran todos los meses del ejercicio '+ej+'</div></div></div>';
}

async function ejecutarCierre(){
  if(!confirm('¿Ejecutar el cierre del ejercicio '+state.ejercicio+'?\n\nSe generarán los asientos de regularización, cierre y apertura.'))return;
  var ej=state.ejercicio;var cid=state.company.id;
  var all=state.entries.filter(function(e){return e.date&&e.date.startsWith(String(ej));});
  var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  var saldos={};
  all.forEach(function(e){e.lines.forEach(function(l){if(!saldos[l.a])saldos[l.a]=0;saldos[l.a]+=l.d-l.h;});});

  // 1. REGULARIZACIÓN: G6→129, G7→129
  var regLines=[];
  Object.entries(saldos).forEach(function(x){
    var code=x[0],s=x[1];var g=parseInt(code[0])||0;
    if(g===6&&Math.abs(s)>0.01){regLines.push({a:code,d:0,h:s});}// Abonar gastos (invertir saldo deudor)
    if(g===7&&Math.abs(s)>0.01){regLines.push({a:code,d:-s,h:0});}// Cargar ingresos (invertir saldo acreedor)
  });
  var resultado=0;Object.entries(saldos).forEach(function(x){var g=parseInt(x[0][0])||0;if(g===7)resultado+=(-x[1]);if(g===6)resultado-=x[1];});
  if(resultado>=0)regLines.push({a:'12900000',d:0,h:resultado});
  else regLines.push({a:'12900000',d:Math.abs(resultado),h:0});

  await api('/api/entries/'+cid,{method:'POST',body:{id:'cierre_reg_'+ej,date:ej+'-12-31',concept:'Regularización ejercicio '+ej,type:'cierre',lines:regLines}});

  // 2. CIERRE: todas las cuentas G1-G5 a cero
  // Recalcular saldos incluyendo regularización
  regLines.forEach(function(l){if(!saldos[l.a])saldos[l.a]=0;saldos[l.a]+=l.d-l.h;});
  var cierreLines=[];
  Object.entries(saldos).forEach(function(x){
    var code=x[0],s=x[1];var g=parseInt(code[0])||0;
    if(g>=1&&g<=5&&Math.abs(s)>0.01){
      if(s>0)cierreLines.push({a:code,d:0,h:s});// Saldo deudor → abonar
      else cierreLines.push({a:code,d:Math.abs(s),h:0});// Saldo acreedor → cargar
    }
  });
  if(cierreLines.length){
    await api('/api/entries/'+cid,{method:'POST',body:{id:'cierre_cie_'+ej,date:ej+'-12-31',concept:'Asiento de cierre ejercicio '+ej,type:'cierre',lines:cierreLines}});
  }

  // 3. APERTURA: abrir ejercicio siguiente con saldos invertidos
  var sigEj=ej+1;
  var aperturaLines=cierreLines.map(function(l){return {a:l.a,d:l.h,h:l.d};});// Invertir debe/haber
  if(aperturaLines.length){
    await api('/api/entries/'+cid,{method:'POST',body:{id:'cierre_ape_'+sigEj,date:sigEj+'-01-01',concept:'Asiento de apertura ejercicio '+sigEj,type:'apertura',lines:aperturaLines}});
  }

  // Cerrar todos los meses del ejercicio
  var MESES=12;for(var i=1;i<=MESES;i++){var ym=ej+'-'+String(i).padStart(2,'0');if(state.closedPeriods.indexOf(ym)<0)state.closedPeriods.push(ym);}
  saveClosedPeriods();

  await loadData();checkIntegrity();
  auditLog('cierre_ejercicio','Ejercicio '+ej);
  toast('✓ Cierre ejercicio '+ej+' completado. Apertura '+sigEj+' generada.');
  render();
}

async function descargarBackupServidor(name){
  try{
    var token=sessionStorage.getItem('cf_token');
    var r=await fetch(API+'/api/backups/download/'+encodeURIComponent(name),{headers:{'Authorization':'Bearer '+token}});
    if(!r.ok)throw new Error('Error '+r.status);
    var blob=await r.blob();var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download=name;document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
    toast('Copia descargada');
  }catch(e){toast('Error: '+e.message,'error');}
}
async function restoreBackup(idx){
  var hist=getBackupHistory();var bk=hist[idx];if(!bk||!bk.data)return;
  if(!confirm('¿Restaurar backup del '+new Date(bk.ts).toLocaleString('es-ES')+'?\n\nSe guardarán los datos actuales antes de restaurar.'))return;
  // Archive current data first
  saveBackupVersion();
  logBackup('pre_restore','Archivado antes de restaurar');
  // Restore
  var d=bk.data;
  if(d.accounts){for(var i=0;i<d.accounts.length;i++){await api('/api/accounts/'+state.company.id,{method:'POST',body:d.accounts[i]});}}
  if(d.entries){for(var j=0;j<d.entries.length;j++){await api('/api/entries/'+state.company.id,{method:'POST',body:d.entries[j]});}}
  if(d.rules){for(var k=0;k<d.rules.length;k++){await api('/api/rules/'+state.company.id,{method:'POST',body:d.rules[k]});}}
  if(d.masters){masters=d.masters;saveMasters('client');saveMasters('supplier');saveMasters('bank');}
  logBackup('restaurar','Restaurado backup del '+new Date(bk.ts).toLocaleString('es-ES'));
  auditLog('restaurar_backup','Desde '+new Date(bk.ts).toLocaleString('es-ES'));
  await loadData();checkIntegrity();toast('✓ Backup restaurado');render();
}
function downloadBackupVersion(idx){
  var hist=getBackupHistory();var bk=hist[idx];if(!bk||!bk.data)return;
  var blob=new Blob([JSON.stringify(bk.data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');a.href=url;a.download='backup_version_'+bk.ts.slice(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);URL.revokeObjectURL(url);
}

    var entry=allEntries.find(function(e){return e.id===id;});
    if(entry){
      await api('/api/entries/'+state.company.id,{method:'POST',body:{id:entry.id,date:entry.date,concept:entry.concept,type:entry.type||'manual',lines:(entry.lines||[]).map(function(l){return {a:l.a,d:l.d||0,h:l.h||0};})}});

// Auto-backup silencioso (guarda en localStorage sin descargar fichero)
function autoBackupIfNeeded(){
  try{
    if(!state.company||!state.entries)return;
    var key='backup_auto_'+state.company.id;
    var lastDate=localStorage.getItem(key+'_date');
    if(lastDate){
      var diff=(new Date()-new Date(lastDate))/(1000*60*60);
      if(diff<2)return;
    }
    autoBackup();
  }catch(e){}
}
function autoBackup(){
  try{
    if(!state.company||!state.entries||!state.entries.length)return;
    // Solo hacer backup si han pasado al menos 2 horas desde el último
    var key='backup_auto_'+state.company.id;
    var lastDate=localStorage.getItem(key+'_date');
    if(lastDate){
      var diff=(new Date()-new Date(lastDate))/(1000*60*60);
      if(diff<2)return;// Menos de 2 horas, no hacer backup
    }
    var data={accounts:state.accounts,entries:state.entries,rules:state.rules,masters:masters,date:new Date().toISOString(),company:state.company,user:state.user?state.user.name:'?'};
    localStorage.setItem(key,JSON.stringify(data));
    localStorage.setItem(key+'_date',new Date().toISOString());
    state.lastBackup=new Date().toISOString();
    saveBackupVersion();
    logBackup('auto','Backup automático al entrar');
  }catch(e){}
}
function getLastBackupInfo(){
  if(!state.company)return null;
  var d=localStorage.getItem('backup_auto_'+state.company.id+'_date');
  if(!d)return {text:'⚠ Sin backup',ok:false};
  var dt=new Date(d);var now=new Date();var diff=Math.floor((now-dt)/(1000*60*60));
  if(diff<1)return {text:'hace unos minutos',ok:true};
  if(diff<24)return {text:'hace '+diff+'h',ok:true};
  var days=Math.floor(diff/24);
  return {text:'⚠ hace '+days+' días',ok:false};
}
