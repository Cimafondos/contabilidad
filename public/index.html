function processImportFile(file){
  if(!file){toast('Selecciona un archivo','error');return;}
  var ext=file.name.split('.').pop().toLowerCase();
  var reader=new FileReader();
  if(ext==='csv'){
    reader.onload=function(e){processImportCSV(e.target.result);};reader.readAsText(file);
  }else if(ext==='xlsx'||ext==='xls'){
    reader.onload=function(e){
      var data=new Uint8Array(e.target.result);var wb=XLSX.read(data,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];var rows=XLSX.utils.sheet_to_json(ws,{header:1});
      processImportRows(rows);
    };reader.readAsArrayBuffer(file);
  }else if(ext==='n43'){
    reader.onload=function(e){processN43(e.target.result);};reader.readAsText(file,'ISO-8859-1');
  }else{toast('Formato no soportado','error');}
}

function processImportPaste(){
  var txt=$('impPaste').value;if(!txt.trim()){toast('Pega datos primero','error');return;}
  var rows=txt.trim().split('\n').map(function(line){return line.split('\t');});
  processImportRows(rows);
}

function processImportCSV(text){
  var sep=text.indexOf(';')>=0?';':',';
  var rows=text.trim().split('\n').map(function(line){return line.split(sep);});
  processImportRows(rows);
}

function processImportRows(rows){
  if(rows.length<2){toast('Sin datos','error');return;}
  var header=rows[0].map(function(c){return String(c||'').toLowerCase().trim();});
  var dI=header.findIndex(function(h){return h.match(/fecha|date/i);});
  var cI=header.findIndex(function(h){return h.match(/concepto|concept|desc/i);});
  var aI=header.findIndex(function(h){return h.match(/importe|amount|import/i);});
  if(dI<0)dI=0;if(cI<0)cI=1;if(aI<0)aI=header.length-1;

  var txns=[];
  for(var i=1;i<rows.length;i++){
    var r=rows[i];if(!r[dI]&&!r[cI])continue;
    var rawDate=String(r[dI]||'');
    var dateStr=parseDate(rawDate);
    var concept=String(r[cI]||'').trim();
    var rawAmt=String(r[aI]||'0').replace(/[€$\s]/g,'').replace(/\./g,'').replace(',','.');
    var amt=parseFloat(rawAmt)||0;
    if(dateStr&&(concept||amt))txns.push({date:dateStr,concept:concept,amount:amt});
  }
  showImportResults(txns);
}

// ═══ IMPORTAR FACTURAS DESDE GESTOR DOCUMENTAL ═══
function importFacturasExcel(file,tipo){
  if(!file){toast('Selecciona un archivo','error');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:'array'});
      // Read Resumen IVA sheet if exists (for cuadre test)
      var resumenIVA=null;
      if(wb.SheetNames.indexOf('Resumen IVA')>=0){
        var rsWs=wb.Sheets['Resumen IVA'];
        var rsRows=XLSX.utils.sheet_to_json(rsWs,{header:1,raw:true});
        resumenIVA={};
        rsRows.forEach(function(r){
          var label=String(r[0]||'').trim().toLowerCase();
          // Use 'total' column (last column with data)
          var totalVal=0;
          for(var ci=r.length-1;ci>=1;ci--){
            var cv=r[ci];
            if(cv!==null&&cv!==undefined&&cv!==''&&cv!==0){
              if(typeof cv==='number'){totalVal=cv;}
              else{totalVal=parseFloat(String(cv).replace(/\./g,'').replace(',','.'))||0;}
              break;
            }
          }
          if(label.indexOf('base 21')>=0)resumenIVA.base21=totalVal;
          if(label.indexOf('base 10')>=0)resumenIVA.base10=totalVal;
          if(label.indexOf('base 4')>=0&&label.indexOf('base 40')<0)resumenIVA.base4=totalVal;
          if(label.indexOf('base 0')>=0)resumenIVA.base0=totalVal;
          if(label.indexOf('iva 21')>=0)resumenIVA.iva21=totalVal;
          if(label.indexOf('iva 10')>=0)resumenIVA.iva10=totalVal;
          if(label.indexOf('iva 4')>=0&&label.indexOf('iva 10')<0)resumenIVA.iva4=totalVal;
          if(label==='total bases'||label.indexOf('total bases')>=0)resumenIVA.totalBases=totalVal;
          if(label==='total iva'||label.indexOf('total iva')>=0)resumenIVA.totalIVA=totalVal;
          if(label.indexOf('total gral')>=0)resumenIVA.totalFacturado=totalVal;
          if(label.indexOf('recargo')>=0)resumenIVA.recargos=totalVal;
          if(label.indexOf('retenc')>=0)resumenIVA.retenciones=totalVal;
        });
        console.log('Resumen IVA del gestor:',resumenIVA);
      }
      // Find the data sheet (not 'Resumen IVA')
      var sheetName=wb.SheetNames.find(function(s){return s!=='Resumen IVA';})||wb.SheetNames[0];
      var ws=wb.Sheets[sheetName];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:true});
      if(rows.length<2){toast('Sin datos en la hoja '+sheetName,'error');return;}
      processFacturasRows(rows,tipo,resumenIVA);
    }catch(err){toast('Error leyendo archivo: '+err.message,'error');}
  };
  reader.readAsArrayBuffer(file);
}

async function processFacturasRows(rows,tipo,resumenIVA){
  var header=rows[0].map(function(c){return String(c||'').trim();});
  // Map columns
  var colMap={};
  header.forEach(function(h,i){
    var hl=h.toLowerCase();
    if(hl.indexOf('nº factura')>=0||hl.indexOf('n factura')>=0||hl==='nº factura'||hl.indexOf('numero factura')>=0||hl.indexOf('núm')>=0)colMap.numFact=i;
    if(hl.indexOf('fecha contable')>=0||hl.indexOf('fecha factura')>=0||(hl==='fecha'&&!colMap.fecha))colMap.fecha=i;
    if(hl.indexOf('fecha vencimiento')>=0)colMap.vencimiento=i;
    if(hl.indexOf('proveedor')>=0||hl.indexOf('cliente')>=0||hl.indexOf('emisor')>=0||hl.indexOf('receptor')>=0)colMap.tercero=i;
    if(hl==='cif')colMap.cif=i;
    if(hl.indexOf('concepto')>=0)colMap.concepto=i;
    if(hl.indexOf('tipo documento')>=0)colMap.tipoDoc=i;
    if(hl==='empresa factura')colMap.empresa=i;
    if(hl.indexOf('base 21')>=0)colMap.base21=i;
    if(hl.indexOf('iva 21')>=0)colMap.iva21=i;
    if(hl.indexOf('base 10')>=0)colMap.base10=i;
    if(hl.indexOf('iva 10')>=0)colMap.iva10=i;
    if(hl.indexOf('base 4')>=0)colMap.base4=i;
    if(hl.indexOf('iva 4')>=0)colMap.iva4=i;
    if(hl.indexOf('base 0')>=0)colMap.base0=i;
    if(hl.indexOf('iva 0')>=0&&hl.indexOf('iva 10')<0)colMap.iva0=i;
    if(hl.indexOf('retenc')>=0||hl.indexOf('retención')>=0)colMap.retencion=i;
    if(hl.indexOf('r. equiv')>=0||hl.indexOf('recargo')>=0)colMap.recargo=i;
    if(hl==='total')colMap.total=i;
  });
  console.log('Column map:',colMap);

  // Parse each row into a factura
  var facturas=[];
  for(var i=1;i<rows.length;i++){
    var r=rows[i];
    if(!r)continue;
    var numFact=colMap.numFact!==undefined?String(r[colMap.numFact]||'').trim():'AUTO_'+i;
    if(!numFact||numFact==='TOTALES:'||numFact.indexOf('TOTAL')>=0)continue;
    // Skip empty rows
    var hasData=false;for(var ci=0;ci<r.length;ci++){if(r[ci]!==null&&r[ci]!==undefined&&r[ci]!==''){hasData=true;break;}}
    if(!hasData)continue;

    var fechaRaw=String(r[colMap.fecha]||'');
    var fecha=fechaRaw.slice(0,10); // ISO format from gestor
    if(!fecha.match(/^\d{4}-/))fecha=parseDate(fechaRaw);

    var terceroName=String(r[colMap.tercero]||'').trim();
    var cif=String(r[colMap.cif]||'').trim();
    var concepto=String(r[colMap.concepto]||'').trim();
    var tipoDoc=String(r[colMap.tipoDoc]||'').trim();
    var empresaOrigen=String(r[colMap.empresa]||'').trim();

    // Parse amounts - handle string numbers with comma/dot
    function parseAmt(v){
      if(v===null||v===undefined||v==='')return 0;
      var s=String(v).replace(/\s/g,'');
      // Handle "15.500,00" format (Spanish) and "15500.00" format
      if(s.indexOf(',')>=0&&s.indexOf('.')>=0){
        if(s.lastIndexOf(',')>s.lastIndexOf('.'))s=s.replace(/\./g,'').replace(',','.');
        else s=s.replace(/,/g,'');
      }else if(s.indexOf(',')>=0){s=s.replace(',','.');}
      return parseFloat(s)||0;
    }

    var fact={
      numFact:numFact, fecha:fecha, tercero:terceroName, cif:cif,
      concepto:concepto, tipoDoc:tipoDoc, empresa:empresaOrigen,
      vencimiento:colMap.vencimiento!==undefined?parseDate(r[colMap.vencimiento]):'',
      base21:parseAmt(r[colMap.base21]), iva21:parseAmt(r[colMap.iva21]),
      base10:parseAmt(r[colMap.base10]), iva10:parseAmt(r[colMap.iva10]),
      base4:parseAmt(r[colMap.base4]), iva4:parseAmt(r[colMap.iva4]),
      base0:parseAmt(r[colMap.base0]),
      iva0:parseAmt(r[colMap.iva0]),
      retencion:parseAmt(r[colMap.retencion]),
      recargo:parseAmt(r[colMap.recargo]),
      total:parseAmt(r[colMap.total]),
      tipo:tipo==='auto'?(tipoDoc.indexOf('EMITIDA')>=0||tipoDoc.indexOf('VENTA')>=0?'emitida':'recibida'):tipo,
      isAbono:tipoDoc.indexOf('ABONO')>=0
    };
    facturas.push(fact);
  }

  // ═══ ANTI-DUPLICADOS ═══
  // Capa 1: Verificar contra TODOS los asientos del servidor (incluidos borrados)
  var existingNums={};
  try{
    var allEntries=await api('/api/entries/'+state.company.id+'?deleted=1');
    if(allEntries&&allEntries.length){
      allEntries.forEach(function(e){
        if(e.concept){
          var m=e.concept.match(/\[([^\]]+)\]/);
          if(m){existingNums[m[1]]=true;existingNums[m[1].toUpperCase()]=true;}
        }
      });
    }
  }catch(e){
    state.entries.forEach(function(e){
      if(e.concept){var m=e.concept.match(/\[([^\]]+)\]/);if(m){existingNums[m[1]]=true;existingNums[m[1].toUpperCase()]=true;}}
    });
  }

  // Capa 2: Deduplicar dentro del propio lote de importación (por nº factura)
  var seenInBatch={};
  
  var nuevas=[],duplicadas=[];
  facturas.forEach(function(f){
    var numUpper=(f.numFact||'').toUpperCase();
    var key=numUpper+'_'+f.cif;
    
    var isDup=false;
    var reason='';
    // Check Capa 1: servidor (nº factura exacto)
    if(existingNums[f.numFact]||existingNums[numUpper]){isDup=true;reason='ya contabilizada';}
    // Check Capa 2: mismo lote (nº factura exacto)
    if(!isDup&&(seenInBatch[f.numFact]||seenInBatch[numUpper])){isDup=true;reason='duplicada en lote';}
    
    if(isDup){
      f._dupReason=reason;
      duplicadas.push(f);
    }else{
      nuevas.push(f);
      seenInBatch[f.numFact]=true;
      seenInBatch[numUpper]=true;
    }
  });

  // Show results
  showFacturasImportResult(nuevas,duplicadas,tipo,resumenIVA);
}

function showFacturasImportResult(nuevas,duplicadas,tipo,resumenIVA){
  window._lastResumenIVA=resumenIVA; // Save for post-contabilization test
  var res=$('impResult');if(!res)return;
  var totalNuevas=nuevas.reduce(function(s,f){return s+f.total;},0);

  // ═══ TEST DE CUADRE CON GESTOR ═══
  var cuadreHTML='';
  if(resumenIVA&&(resumenIVA.totalIVA||resumenIVA.totalFacturado)){
    var allFacturas=nuevas.concat(duplicadas); // Test against ALL facturas from file
    var sumIva21=0,sumIva10=0,sumIva4=0,sumBase21=0,sumBase10=0,sumBase4=0,sumBase0=0,sumTotal=0,sumRecargo=0,sumRetencion=0;
    allFacturas.forEach(function(f){
      sumIva21+=f.iva21;sumIva10+=f.iva10;sumIva4+=f.iva4;
      sumBase21+=f.base21;sumBase10+=f.base10;sumBase4+=f.base4;sumBase0+=(f.base0||0);
      sumTotal+=f.total;
      var rec=0;if(f.recargo&&f.recargo!==0){rec=f.recargo;}else{
        var bEx=Math.abs(f.base21)+Math.abs(f.base10)+Math.abs(f.base4)+Math.abs(f.base0||0);
        var iEx=Math.abs(f.iva21)+Math.abs(f.iva10)+Math.abs(f.iva4);
        var dRec=Math.abs(f.total)-bEx-iEx+(f.retencion?Math.abs(f.retencion):0)+(f.iva0&&f.iva0<0?Math.abs(f.iva0):0);
        if(dRec>0.01)rec=Math.round(dRec*100)/100;
      }
      sumRecargo+=rec;
      var ret=f.retencion||0;if(f.iva0&&f.iva0<0)ret=Math.abs(f.iva0);
      sumRetencion+=ret;
    });
    var sumIvaTotal=sumIva21+sumIva10+sumIva4;
    var sumBasesTotal=sumBase21+sumBase10+sumBase4+sumBase0;
    
    var checks=[];
    function chk(name,prog,gestor,tolerance){
      var diff=Math.abs(prog-gestor);
      var ok=diff<=(tolerance||0.05);
      checks.push({name:name,prog:prog,gestor:gestor,diff:diff,ok:ok});
    }
    if(resumenIVA.totalIVA)chk('Total IVA',sumIvaTotal,resumenIVA.totalIVA);
    if(resumenIVA.totalFacturado)chk('Total Facturado',sumTotal,resumenIVA.totalFacturado);
    if(resumenIVA.totalBases)chk('Total Bases',sumBasesTotal,resumenIVA.totalBases);
    if(resumenIVA.iva21)chk('IVA 21%',sumIva21,resumenIVA.iva21);
    if(resumenIVA.iva10)chk('IVA 10%',sumIva10,resumenIVA.iva10);
    if(resumenIVA.iva4)chk('IVA 4%',sumIva4,resumenIVA.iva4);
    if(resumenIVA.base21)chk('Base 21%',sumBase21,resumenIVA.base21);
    if(resumenIVA.base10)chk('Base 10%',sumBase10,resumenIVA.base10);
    if(resumenIVA.base4)chk('Base 4%',sumBase4,resumenIVA.base4);
    if(resumenIVA.recargos)chk('Recargos',sumRecargo,resumenIVA.recargos,0.10);
    if(resumenIVA.retenciones)chk('Retenciones',sumRetencion,resumenIVA.retenciones,0.10);
    
    var allOk=checks.every(function(c){return c.ok;});
    var failCount=checks.filter(function(c){return !c.ok;}).length;
    
    cuadreHTML='<div style="margin-bottom:12px;border:2px solid '+(allOk?'var(--ok)':'var(--rd)')+';border-radius:8px;overflow:hidden">'+
    '<div style="padding:8px 14px;background:'+(allOk?'#E8F8ED':'#FDF0F0')+';font-weight:600;font-size:12px;color:'+(allOk?'var(--ok)':'var(--rd)')+'">'+(allOk?'✅ Test de cuadre con gestor: TODO OK':'❌ Test de cuadre con gestor: '+failCount+' diferencias')+'</div>'+
    '<table style="font-size:11px"><thead><tr><th>Check</th><th style="text-align:right">Programa</th><th style="text-align:right">Gestor</th><th style="text-align:right">Diff</th><th>Estado</th></tr></thead><tbody>'+
    checks.map(function(c,i){return '<tr class="'+(i%2?'alt':'')+'"><td style="font-weight:600">'+c.name+'</td><td style="text-align:right">'+fmt(c.prog)+'€</td><td style="text-align:right">'+fmt(c.gestor)+'€</td><td style="text-align:right;color:'+(c.ok?'var(--txM)':'var(--rd)')+'">'+fmt(c.diff)+'€</td><td>'+(c.ok?'<span class="badge badge-g">✓</span>':'<span class="badge badge-r">✗</span>')+'</td></tr>';}).join('')+
    '</tbody></table></div>';
  }

  res.innerHTML='<div class="card" style="border:2px solid var(--pri)"><div class="card-h" style="background:var(--priLt)"><span style="color:var(--pri)">📋 Resultado importación — '+(tipo==='recibida'?'Facturas recibidas':'Facturas emitidas')+'</span></div><div class="card-b">'+
  '<div class="row"><div class="stat"><div class="stat-v" style="color:var(--ok)">'+nuevas.length+'</div><div class="stat-l">Nuevas para importar</div></div><div class="stat"><div class="stat-v" style="color:var(--txM)">'+duplicadas.length+'</div><div class="stat-l">Duplicadas (saltadas)</div></div><div class="stat"><div class="stat-v" style="color:var(--bl)">'+fmt(totalNuevas)+'€</div><div class="stat-l">Importe total</div></div></div>'+
  cuadreHTML+
  (nuevas.length?'<div class="scr" style="max-height:300px"><table><thead><tr><th>Nº Factura</th><th>Fecha</th><th>'+(tipo==='recibida'?'Proveedor':'Cliente')+'</th><th>CIF</th><th style="text-align:right">Base</th><th style="text-align:right">IVA</th><th style="text-align:right">Total</th><th>Tipo</th></tr></thead><tbody>'+
  nuevas.map(function(f,i){
    var totalIva=f.iva21+f.iva10+f.iva4;
    var recargoP=0;
    if(f.recargo&&f.recargo!==0)recargoP=f.recargo;
    else if(f.iva0&&f.iva0>0)recargoP=f.iva0;
    var retP=f.retencion||0;
    if(f.iva0&&f.iva0<0)retP=Math.abs(f.iva0);
    var realBase=Math.abs(f.total)-Math.abs(totalIva)-Math.abs(recargoP)+Math.abs(retP);
    return '<tr class="'+(i%2?'alt':'')+'" style="'+(f.isAbono?'color:var(--rd)':'')+'"><td style="font-weight:600;font-size:10px">'+h(f.numFact)+'</td><td style="font-size:10px">'+fmtD(f.fecha)+'</td><td style="font-size:11px">'+h(f.tercero)+'</td><td style="font-size:9px;color:var(--txM)">'+h(f.cif)+'</td><td style="text-align:right">'+fmt(realBase)+'€</td><td style="text-align:right">'+fmt(totalIva)+'€</td><td style="text-align:right;font-weight:700">'+fmt(f.total)+'€</td><td style="font-size:9px"><span class="badge '+(f.isAbono?'badge-r':'badge-g')+'">'+(f.isAbono?'Abono':'Factura')+'</span></td></tr>';
  }).join('')+'</tbody></table></div>'+
  '<div style="display:flex;gap:8px;margin-top:12px;justify-content:flex-end"><button class="btn btn-d" onclick="clearImpResult()">Cancelar</button><button class="btn btn-p" style="font-size:13px;padding:8px 20px" onclick="contabilizarFacturas()">✓ Contabilizar '+nuevas.length+' facturas</button></div>':'<div class="empty">No hay facturas nuevas para importar</div><div style="display:flex;justify-content:flex-end;margin-top:12px"><button class="btn btn-d" onclick="clearImpResult()">Cerrar</button></div>')+
  (duplicadas.length?'<div style="margin-top:8px;padding:8px;background:#FFF8E1;border-radius:6px;font-size:11px;color:var(--am)">⚠ '+duplicadas.length+' facturas ya contabilizadas: '+duplicadas.map(function(f){return f.numFact;}).join(', ')+'</div>':'')+
  '</div></div>';

  // Store for contabilizar
  window._facturasToImport=nuevas;
  window._facturasType=tipo;
  window._facturasSkipped=duplicadas.length;
}

function clearImpResult(){var el=$('impResult');if(el)el.innerHTML='';}
async function contabilizarFacturas(){
  var facturas=window._facturasToImport;
  var tipo=window._facturasType;
  if(!facturas||!facturas.length){toast('No hay facturas','error');return;}

  // DIAGNOSTIC: verify IVA totals before contabilizing
  var diagIva=0,diagNoIva=[],diagDetails=[];
  facturas.forEach(function(f){
    var iva=f.iva21+f.iva10+f.iva4;
    diagIva+=iva;
    diagDetails.push(f.numFact+': iva21='+f.iva21+' iva10='+f.iva10+' iva4='+f.iva4+' total_iva='+iva.toFixed(2));
    if(Math.abs(iva)<0.01&&Math.abs(f.total)>1)diagNoIva.push(f.numFact+' (total='+f.total+', iva21='+f.iva21+', iva10='+f.iva10+')');
  });
  console.log('PRE-CONTABILIZACIÓN: '+facturas.length+' facturas, IVA total='+diagIva.toFixed(2)+', sin IVA: '+diagNoIva.join(', '));
  console.log('DETALLE IVA POR FACTURA:', diagDetails);
  if(diagNoIva.length>5){
    console.warn('ALERTA: '+diagNoIva.length+' facturas sin IVA detectadas');
  }

  // Show progress overlay
  var overlay=document.createElement('div');
  overlay.id='impProgress';
  overlay.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999';
  overlay.innerHTML='<div style="background:#fff;border-radius:12px;padding:30px 50px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.2)"><div style="font-size:28px;margin-bottom:10px">⏳</div><div style="font-size:16px;font-weight:700;margin-bottom:6px" id="impProgressTitle">Contabilizando facturas...</div><div style="font-size:13px;color:var(--txM)" id="impProgressDetail">Preparando...</div><div style="margin-top:12px;background:#E8E8E8;border-radius:6px;height:8px;overflow:hidden"><div id="impProgressBar" style="background:var(--pri);height:100%;width:0%;transition:width 0.3s;border-radius:6px"></div></div></div>';
  document.body.appendChild(overlay);

  function updateProgress(current,total,detail){
    var pct=Math.round(current/total*100);
    var bar=$('impProgressBar');if(bar)bar.style.width=pct+'%';
    var det=$('impProgressDetail');if(det)det.textContent=current+'/'+total+' — '+detail;
  }

  var created=0,provsCreated=0,clientsCreated=0;
  loadMasters();
  
  // Ensure recargo equivalencia account exists
  var has47200001=state.accounts.some(function(a){return a.code==='47200001';});
  if(!has47200001){
    try{await api('/api/accounts/'+state.company.id,{method:'POST',body:{code:'47200001',name:'HP Recargo equivalencia soportado',g:4,t:'A'}});}catch(e){}
    state.accounts.push({code:'47200001',name:'HP Recargo equivalencia soportado',g:4,t:'A'});
  }

  for(var fi=0;fi<facturas.length;fi++){
    var f=facturas[fi];
    updateProgress(fi+1,facturas.length,(f.isAbono?'Abono ':'Fra. ')+f.tercero);
    await new Promise(function(r){setTimeout(r,10)}); // Let UI update
    var lines=[];

    // Base 0% from gestor documental is NEVER a real additional base.
    // It's either a retention indicator or an informational duplicate.
    // We ignore it completely and trust the Total from Excel.
    var realRetencion=f.retencion||0;
    if(f.iva0&&f.iva0<0){
      // IVA 0% negative = this is IRPF retention amount
      realRetencion=Math.abs(f.iva0);
    }

    var totalIva=f.iva21+f.iva10+f.iva4;

    if(tipo==='recibida'){
      // FACTURA RECIBIDA: Gasto(D) + IVA soportado(D) + Proveedor(H) - Retención
      var cuentaGasto='60000000'; // Por defecto compras
      // If it's services, use 62X
      if(f.concepto&&f.concepto.toLowerCase().indexOf('asesor')>=0)cuentaGasto='62300000';

      // Calculate recargo: try explicit columns first, then derive from totals
      var recargoTotal=0;
      if(f.recargo&&f.recargo!==0){
        recargoTotal=f.recargo;
      }else{
        // Derive recargo from total: recargo = total - bases(21+10+4+0) - iva(21+10+4) + retención
        var basesExcel=Math.abs(f.base21)+Math.abs(f.base10)+Math.abs(f.base4)+Math.abs(f.base0||0);
        var ivaExcel=Math.abs(f.iva21)+Math.abs(f.iva10)+Math.abs(f.iva4);
        var derivedRecargo=Math.abs(f.total)-basesExcel-ivaExcel+Math.abs(realRetencion);
        if(derivedRecargo>0.01){
          recargoTotal=Math.round(derivedRecargo*100)/100;
        }
      }
      
      // Use REAL bases from Excel per IVA type instead of a single derived base
      var totalFactura=Math.abs(f.total);
      
      // Derive the real base from Total to ensure perfect balance
      var realBase=totalFactura-Math.abs(totalIva)-Math.abs(recargoTotal)+Math.abs(realRetencion);
      
      // Gasto = single derived base (guarantees balance with total)
      if(f.isAbono){
        lines.push({a:cuentaGasto,d:0,h:Math.abs(realBase)});
      }else{
        lines.push({a:cuentaGasto,d:Math.abs(realBase),h:0});
      }

      // IVA soportado — all types go to 47200000
      if(f.iva21!==0)lines.push({a:'47200000',d:Math.max(f.iva21,0),h:Math.max(-f.iva21,0)});
      if(f.iva10!==0)lines.push({a:'47200000',d:Math.max(f.iva10,0),h:Math.max(-f.iva10,0)});
      if(f.iva4!==0)lines.push({a:'47200000',d:Math.max(f.iva4,0),h:Math.max(-f.iva4,0)});
      // DIAGNOSTIC: check IVA lines exist
      var ivaLines47=lines.filter(function(l){return l.a==='47200000';});
      if(ivaLines47.length===0&&Math.abs(f.iva21+f.iva10+f.iva4)>0.01){
        console.error('FALTA IVA en '+f.numFact+': iva21='+f.iva21+' iva10='+f.iva10+' iva4='+f.iva4);
      }

      // Retención IRPF
      if(realRetencion!==0)lines.push({a:'47510000',d:0,h:Math.abs(realRetencion)});

      // Recargo equivalencia soportado = mayor gasto (NO es IVA deducible en régimen general)
      // Va a la misma cuenta de gasto, no a la 472
      if(recargoTotal!==0){
        if(f.isAbono){
          lines.push({a:cuentaGasto,d:0,h:Math.abs(recargoTotal)});
        }else{
          lines.push({a:cuentaGasto,d:Math.abs(recargoTotal),h:0});
        }
      }

      // Find or create supplier with individual account
      var provRecord=masters.supplier.find(function(s){return s.cif===f.cif||(s.name&&s.name===f.tercero);});
      if(!provRecord&&f.tercero){
        var provCode='P'+String(masters.supplier.length+1).padStart(3,'0');
        var formaPago='';
        if(f.concepto){
          var fpMatch=f.concepto.match(/Forma de pago:\s*([^|]+)/i);
          if(fpMatch)formaPago=fpMatch[1].trim();
        }
        var diasPago='';
        if(f.fecha&&f.vencimiento){
          var d1=new Date(f.fecha),d2=new Date(f.vencimiento);
          if(!isNaN(d1)&&!isNaN(d2)){diasPago=String(Math.round((d2-d1)/(1000*60*60*24)));}
        }
        var provAccount='4000'+String(masters.supplier.length+1).padStart(4,'0');
        provRecord={code:provCode,name:f.tercero,cif:f.cif,address:'',cp:'',city:'',province:'',country:'ES',account:provAccount,payment:formaPago,days:diasPago,contact:'',phone:'',email:'',notes:'Auto-importado desde gestor documental'};
        masters.supplier.push(provRecord);
        saveMasters('supplier');
        if(!state.accounts.some(function(a){return a.code===provAccount;})){
          try{api('/api/accounts/'+state.company.id,{method:'POST',body:{code:provAccount,name:f.tercero,g:4,t:'A'}});}catch(e){}
          state.accounts.push({code:provAccount,name:f.tercero,g:4,t:'A'});
        }
        provsCreated++;
      }else if(provRecord&&(provRecord.account==='40000000'||!provRecord.account)){
        // Upgrade existing supplier from generic to individual account
        var newProvAccount='4000'+String(masters.supplier.indexOf(provRecord)+1).padStart(4,'0');
        provRecord.account=newProvAccount;
        saveMasters('supplier');
        if(!state.accounts.some(function(a){return a.code===newProvAccount;})){
          try{api('/api/accounts/'+state.company.id,{method:'POST',body:{code:newProvAccount,name:provRecord.name,g:4,t:'A'}});}catch(e){}
          state.accounts.push({code:newProvAccount,name:provRecord.name,g:4,t:'A'});
        }
      }
      var cuentaProv=provRecord?provRecord.account:'40000000';

      // Proveedor (haber = lo que debemos) — Total from Excel, using individual account
      if(f.isAbono){
        lines.push({a:cuentaProv,d:totalFactura,h:0});
      }else{
        lines.push({a:cuentaProv,d:0,h:totalFactura});
      }

    }else{
      // FACTURA EMITIDA: Cliente(D) + Ingreso(H) + IVA repercutido(H)
      var totalIvaEm=f.iva21+f.iva10+f.iva4;
      var totalFacturaEm=Math.abs(f.total);
      var realBaseEm=totalFacturaEm-Math.abs(totalIvaEm);
      
      // Ingreso
      lines.push({a:'70000000',d:0,h:Math.abs(realBaseEm)});

      // IVA repercutido
      if(f.iva21!==0)lines.push({a:'47700000',d:Math.max(-f.iva21,0),h:Math.max(f.iva21,0)});
      if(f.iva10!==0)lines.push({a:'47700000',d:Math.max(-f.iva10,0),h:Math.max(f.iva10,0)});
      if(f.iva4!==0)lines.push({a:'47700000',d:Math.max(-f.iva4,0),h:Math.max(f.iva4,0)});

      // Find or create client with individual account
      var clientName=f.empresa||f.tercero;
      var clientCif=f.cif;
      var cliRecord=masters.client.find(function(c2){return c2.cif===clientCif||(c2.name&&c2.name===clientName);});
      if(!cliRecord&&clientName){
        var cliCode='C'+String(masters.client.length+1).padStart(3,'0');
        var cliAccount='4300'+String(masters.client.length+1).padStart(4,'0');
        cliRecord={code:cliCode,name:clientName,cif:clientCif,address:'',cp:'',city:'',province:'',country:'ES',account:cliAccount,payment:'',days:'',contact:'',phone:'',email:'',notes:'Auto-importado desde gestor documental'};
        masters.client.push(cliRecord);
        saveMasters('client');
        if(!state.accounts.some(function(a){return a.code===cliAccount;})){
          try{api('/api/accounts/'+state.company.id,{method:'POST',body:{code:cliAccount,name:clientName,g:4,t:'A'}});}catch(e){}
          state.accounts.push({code:cliAccount,name:clientName,g:4,t:'A'});
        }
        clientsCreated++;
      }else if(cliRecord&&(cliRecord.account==='43000000'||!cliRecord.account)){
        var newCliAccount='4300'+String(masters.client.indexOf(cliRecord)+1).padStart(4,'0');
        cliRecord.account=newCliAccount;
        saveMasters('client');
        if(!state.accounts.some(function(a){return a.code===newCliAccount;})){
          try{api('/api/accounts/'+state.company.id,{method:'POST',body:{code:newCliAccount,name:cliRecord.name,g:4,t:'A'}});}catch(e){}
          state.accounts.push({code:newCliAccount,name:cliRecord.name,g:4,t:'A'});
        }
      }
      var cuentaCli=cliRecord?cliRecord.account:'43000000';

      // Cliente (debe = lo que nos deben) — using individual account
      lines.push({a:cuentaCli,d:totalFacturaEm,h:0});
    }

    // Consolidate lines with same account
    var consolidated={};
    lines.forEach(function(l){
      if(!consolidated[l.a])consolidated[l.a]={a:l.a,d:0,h:0};
      consolidated[l.a].d+=l.d;
      consolidated[l.a].h+=l.h;
    });
    var finalLines=Object.values(consolidated).filter(function(l){return l.d>0.001||l.h>0.001;});

    // Verify IVA in final lines
    var ivaInFinal=finalLines.filter(function(l){return l.a==='47200000';});
    var ivaDebe=0,ivaHaber=0;
    ivaInFinal.forEach(function(l){ivaDebe+=l.d;ivaHaber+=l.h;});
    if(Math.abs(f.iva21+f.iva10+f.iva4)>0.01&&ivaInFinal.length===0){
      console.error('ERROR: IVA PERDIDO en '+f.numFact+': iva21='+f.iva21+' iva10='+f.iva10+' iva4='+f.iva4+' pero 0 líneas 47200000 en finalLines');
    }

    // Round to 2 decimals
    finalLines.forEach(function(l){l.d=Math.round(l.d*100)/100;l.h=Math.round(l.h*100)/100;});

    // Verify balance
    var tD=finalLines.reduce(function(s,l){return s+l.d;},0);
    var tH=finalLines.reduce(function(s,l){return s+l.h;},0);
    if(Math.abs(tD-tH)>0.02){
      console.log('Descuadre en factura '+f.numFact+': D='+tD+' H='+tH+' diff='+(tD-tH));
      // Auto-fix rounding: adjust largest line
      var diff=Math.round((tD-tH)*100)/100;
      if(Math.abs(diff)<=0.02){
        var maxLine=finalLines.reduce(function(a,b){return (a.d+a.h)>(b.d+b.h)?a:b;});
        if(diff>0)maxLine.h+=diff; else maxLine.d+=(-diff);
      }
    }

    var conceptStr=(f.isAbono?'Abono ':'Fra. ')+h(f.tercero)+' ['+f.numFact+']';
    await api('/api/entries/'+state.company.id,{method:'POST',body:{
      id:(tipo==='recibida'?'fr_':'fe_')+uid(),
      date:f.fecha,
      concept:conceptStr,
      type:'import_factura',
      lines:finalLines
    }});
    created++;
  }

  await loadData();checkIntegrity();
  // Remove progress overlay
  var ov=$('impProgress');if(ov)ov.remove();
  auditLog('importar_facturas',tipo+': '+created+' facturas');
  
  // ═══ TEST POST-CONTABILIZACIÓN ═══
  // Verify totals match the gestor if we have resumenIVA
  var postTestMsg='';
  if(window._lastResumenIVA){
    var ri=window._lastResumenIVA;
    var postIvaSop=0,postIvaRep=0;
    state.entries.forEach(function(e){
      e.lines.forEach(function(l){
        if(l.a==='47200000')postIvaSop+=l.d-l.h;
        if(l.a&&l.a.startsWith('477'))postIvaRep+=l.h-l.d;
      });
    });
    postIvaSop=Math.round(postIvaSop*100)/100;
    if(ri.totalIVA&&Math.abs(postIvaSop-ri.totalIVA)>0.05){
      postTestMsg='\n\n⚠️ ALERTA: IVA Soportado post-contabilización ('+fmt(postIvaSop)+'€) NO cuadra con gestor ('+fmt(ri.totalIVA)+'€). Diferencia: '+fmt(Math.abs(postIvaSop-ri.totalIVA))+'€. Revisa antes de continuar.';
    }
    var numAsientos=state.entries.length;
    if(ri.totalIVA&&Math.abs(postIvaSop-ri.totalIVA)<0.05){
      postTestMsg='\n\n✅ IVA verificado post-contabilización: '+fmt(postIvaSop)+'€ = gestor '+fmt(ri.totalIVA)+'€';
    }
  }
  
  var msg='✓ '+created+' facturas contabilizadas';
  if(provsCreated>0)msg+=' · '+provsCreated+' proveedores nuevos';
  if(clientsCreated>0)msg+=' · '+clientsCreated+' clientes nuevos';
  if(window._facturasSkipped&&window._facturasSkipped>0)msg+=' · '+window._facturasSkipped+' duplicadas saltadas';
  if(postTestMsg)msg+=postTestMsg;
  toast(msg,postTestMsg&&postTestMsg.indexOf('ALERTA')>=0?'error':'ok');
  render();
}

function parseDate(s){
  if(!s)return '';s=String(s).trim();
  var m;
  if(m=s.match(/^(\d{4})-(\d{2})-(\d{2})/))return s.slice(0,10);
  if(m=s.match(/^(\d{2})[\/\-](\d{2})[\/\-](\d{4})/))return m[3]+'-'+m[2]+'-'+m[1];
  if(m=s.match(/^(\d{2})[\/\-](\d{2})[\/\-](\d{2})/))return '20'+m[3]+'-'+m[2]+'-'+m[1];
  // Excel serial number
  var num=parseFloat(s);if(num>30000&&num<60000){var d=new Date((num-25569)*86400000);return d.toISOString().slice(0,10);}
  return '';
}

function processN43(text){
  var lines=text.split('\n');var txns=[];
  lines.forEach(function(line){
    if(line.substring(0,2)==='22'){
      var y='20'+line.substring(10,12);var m=line.substring(12,14);var d=line.substring(14,16);
      var amt=parseInt(line.substring(28,42))||0;amt=amt/100;
      var sign=line.substring(27,28);if(sign==='1')amt=-amt;
      var concept=line.substring(52).trim();
      txns.push({date:y+'-'+m+'-'+d,concept:concept,amount:amt});
    }
  });
  showImportResults(txns);
}

function showImportResults(txns){
  if(!txns.length){toast('No se encontraron movimientos','error');return;}
  // Match rules and detect duplicates
  txns.forEach(function(t){
    t.matched=false;t.account='62900000';t.ruleDesc='Sin clasificar';t.iva='general';
    // Positive = income (G7), negative = expense (G6)
    if(t.amount>0){t.account='75900000';t.ruleDesc='Ingreso';t.iva='general';}
    for(var i=0;i<state.rules.length;i++){
      var r=state.rules[i];
      try{if(new RegExp(r.p,'i').test(t.concept)){t.account=r.a;t.ruleDesc=r.d;t.iva=r.iv||'general';t.matched=true;break;}}catch(e){}
    }
    // Duplicate check
    t.isDup=state.entries.some(function(e){return e.date===t.date&&Math.abs(e.lines.reduce(function(s,l){return s+l.d;},0)-Math.abs(t.amount))<0.01;});
  });

  window._impTxns=txns;
  var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  var res=$('impResult');
  res.innerHTML='<div class="card" style="border:2px solid var(--pri);margin-top:14px"><div class="card-h" style="background:var(--priLt)"><span style="color:var(--pri)">📋 '+txns.length+' movimientos encontrados</span><div><button class="btn btn-d" onclick="clearImpResult()" style="margin-right:6px">✕ Cancelar</button><button class="btn btn-p" onclick="importAll()">✅ Contabilizar todos</button></div></div>'+
  '<div class="scr"><table><thead><tr><th style="width:30px">✓</th><th>Fecha</th><th>Concepto</th><th style="text-align:right">Importe</th><th>Cuenta</th><th>Regla</th><th>Estado</th></tr></thead><tbody>'+
  txns.map(function(t,i){
    var cls=t.isDup?'background:#FFF3E0':t.matched?'background:#E8F8ED':'';
    return '<tr style="'+cls+'"><td><input type="checkbox" id="impCk'+i+'" '+(t.isDup?'':'checked')+'></td><td style="font-size:10px">'+fmtD(t.date)+'</td><td style="font-size:10px">'+h(t.concept.substring(0,50))+'</td><td style="text-align:right;font-weight:600" class="'+(t.amount>=0?'amt-pos':'amt-neg')+'">'+fmt(t.amount)+'€</td><td >'+acctLink(t.account,'')+' <span style="color:var(--txM);font-size:9px">'+(am[t.account]?am[t.account].name:'')+'</span></td><td style="font-size:10px">'+h(t.ruleDesc)+'</td><td>'+(t.isDup?'<span class="badge badge-a">⚠ Duplicado</span>':t.matched?'<span class="badge badge-g">✓ Regla</span>':'<span class="badge badge-b">Auto</span>')+'</td></tr>';
  }).join('')+'</tbody></table></div></div>';
}

async function importAll(){
  var txns=window._impTxns;if(!txns)return;
  var count=0;
  for(var i=0;i<txns.length;i++){
    var ck=$('impCk'+i);if(!ck||!ck.checked)continue;
    var t=txns[i];var absAmt=Math.abs(t.amount);
    var ic=IVA.find(function(x){return x.id===t.iva;});
    var ded=ic&&ic.r>0&&t.iva!=='nodeducible';
    var base=absAmt,iva=0;if(ded){base=Math.round((absAmt/(1+ic.r))*100)/100;iva=Math.round((absAmt-base)*100)/100;}
    var lines;
    if(t.amount<0){
      lines=[{a:t.account,d:ded?base:absAmt,h:0}];
      if(ded)lines.push({a:'47200000',d:iva,h:0});
      lines.push({a:'57200000',d:0,h:absAmt});
    }else{
      lines=[{a:'57200000',d:absAmt,h:0}];
      if(ded)lines.push({a:'47700000',d:0,h:iva});
      lines.push({a:t.account,d:0,h:ded?base:absAmt});
    }
    await api('/api/entries/'+state.company.id,{method:'POST',body:{id:'imp_'+uid(),date:t.date,concept:t.concept,type:'import',lines:lines}});
    count++;
  }
  await loadData();checkIntegrity();toast(count+' asientos importados');render();
}

function processAsientosFile(file){
  if(!file){toast('Selecciona un archivo','error');return;}
  var ext=file.name.split('.').pop().toLowerCase();
  var reader=new FileReader();
  if(ext==='csv'){
    reader.onload=function(e){
      var sep=e.target.result.indexOf(';')>=0?';':',';
      var rows=e.target.result.trim().split('\n').map(function(l){return l.split(sep);});
      processAsientosRows(rows);
    };reader.readAsText(file);
  }else{
    reader.onload=function(e){
      var data=new Uint8Array(e.target.result);var wb=XLSX.read(data,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      // Read raw cell values directly to avoid formatting issues
      var range=XLSX.utils.decode_range(ws['!ref']);
      var rows=[];
      for(var R=range.s.r;R<=range.e.r;R++){
        var row=[];
        for(var C=range.s.c;C<=range.e.c;C++){
          var cell=ws[XLSX.utils.encode_cell({r:R,c:C})];
          row.push(cell?cell.v:undefined);
        }
        rows.push(row);
      }
      processAsientosRows(rows);
    };reader.readAsArrayBuffer(file);
  }
}

function processAsientosPaste(){
  var txt=$('impPasteAsientos').value;if(!txt.trim()){toast('Pega datos primero','error');return;}
  var rows=txt.trim().split('\n').map(function(line){return line.split('\t');});
  processAsientosRows(rows);
}

function parseAsientoAmount(val){
  if(typeof val==='number')return val;
  var s=String(val||'').replace(/[€$\s]/g,'');
  if(!s)return 0;
  if(s.indexOf(',')>=0&&s.indexOf('.')<s.indexOf(','))s=s.replace(/\./g,'').replace(',','.');
  return parseFloat(s)||0;
}

function processAsientosRows(rows){
  if(rows.length<2){toast('Sin datos','error');return;}
  var headerIdx=0;
  for(var hi=0;hi<Math.min(rows.length,5);hi++){
    var joined=(rows[hi]||[]).join(' ').toLowerCase();
    if(joined.indexOf('cuenta')>=0||joined.indexOf('debe')>=0||joined.indexOf('haber')>=0){headerIdx=hi;break;}
  }
  var header=rows[headerIdx].map(function(c){return String(c||'').toLowerCase().trim();});
  var nI=-1,dI=-1,cI=-1,descI=-1,debeI=-1,haberI=-1;
  for(var ci=0;ci<header.length;ci++){
    var hc=header[ci];
    if(nI<0&&(hc.match(/asiento|nº|num|entry/)))nI=ci;
    if(dI<0&&(hc.match(/fecha|date/)))dI=ci;
    if(cI<0&&(hc.match(/cuenta|account|code/)))cI=ci;
    if(descI<0&&(hc.match(/desc|concepto|concept|detalle/)))descI=ci;
    if(debeI<0&&(hc.match(/^debe$|^debit$|^cargo$/)))debeI=ci;
    if(haberI<0&&(hc.match(/^haber$|^credit$|^abono$/)))haberI=ci;
  }
  if(nI<0)nI=0;if(dI<0)dI=1;if(cI<0)cI=2;if(descI<0)descI=3;
  if(debeI<0)debeI=4;if(haberI<0)haberI=5;

  var asientosMap={};var order=[];
  for(var i=headerIdx+1;i<rows.length;i++){
    var r=rows[i];if(!r||r.length<3)continue;
    var numAsi=String(r[nI]||'').trim();
    var fechaRaw=String(r[dI]||'').trim();
    var cuenta=String(r[cI]||'').trim();
    var desc=String(r[descI]||'').trim();
    var debe=parseAsientoAmount(r[debeI]);
    var haber=parseAsientoAmount(r[haberI]);
    if(!cuenta&&!debe&&!haber)continue;
    if(!numAsi&&order.length>0)numAsi=order[order.length-1];
    var dateStr=parseDate(fechaRaw);
    if(!dateStr&&asientosMap[numAsi])dateStr=asientosMap[numAsi].date;
    if(!asientosMap[numAsi]){asientosMap[numAsi]={num:numAsi,date:dateStr,lines:[],descs:[]};order.push(numAsi);}
    if(dateStr&&!asientosMap[numAsi].date)asientosMap[numAsi].date=dateStr;
    asientosMap[numAsi].lines.push({a:cuenta,d:debe,h:haber});
    if(desc)asientosMap[numAsi].descs.push(desc);
  }

  var asientos=order.map(function(k){
    var a=asientosMap[k];
    var totalD=0,totalH=0;
    a.lines.forEach(function(l){totalD+=l.d;totalH+=l.h;});
    var cuadra=Math.abs(totalD-totalH)<0.01;
    return {num:a.num,date:a.date||today(),concept:a.descs[0]||'Asiento importado',lines:a.lines,totalD:totalD,totalH:totalH,cuadra:cuadra,descs:a.descs};
  });

  var cuentasNeeded={};
  asientos.forEach(function(a){a.lines.forEach(function(l){if(l.a&&!cuentasNeeded[l.a])cuentasNeeded[l.a]={code:l.a,desc:''};});});
  asientos.forEach(function(a){a.lines.forEach(function(l){if(l.a){var d=a.descs.find(function(dd){return dd;});if(d&&!cuentasNeeded[l.a].desc)cuentasNeeded[l.a].desc=d;}});});

  var existingAccts={};
  state.accounts.forEach(function(ac){existingAccts[ac.code]=ac;});
  var newAccts=[];
  Object.values(cuentasNeeded).forEach(function(cn){if(!existingAccts[cn.code])newAccts.push(cn);});

  window._impAsientos=asientos;
  window._impNewAccts=newAccts;

  var nOk=asientos.filter(function(a){return a.cuadra;}).length;
  var nErr=asientos.length-nOk;
  var totalD=0,totalH=0;
  asientos.forEach(function(a){totalD+=a.totalD;totalH+=a.totalH;});

  var res=$('impAsientosResult');
  res.innerHTML='<div class="card" style="border:2px solid #7B1FA2;margin-top:14px"><div class="card-h" style="background:#F3E5F5"><span style="color:#7B1FA2">📒 '+asientos.length+' asientos · '+asientos.reduce(function(s,a){return s+a.lines.length;},0)+' apuntes</span><div>'+
  (nErr?'<span class="badge badge-a" style="margin-right:8px">⚠ '+nErr+' descuadrados</span>':'')+
  '<button class="btn btn-d" onclick="$(\'impAsientosResult\').innerHTML=\'\'" style="margin-right:6px">✕ Cancelar</button>'+
  '<button class="btn" style="background:#7B1FA2;color:#fff" onclick="importAsientosAll()">✅ Contabilizar '+nOk+' asientos</button></div></div>'+
  '<div style="padding:10px;font-size:11px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px">'+
  '<div><strong>Total Debe:</strong> '+fmt(totalD)+'€</div>'+
  '<div><strong>Total Haber:</strong> '+fmt(totalH)+'€</div>'+
  '<div><strong>Diferencia:</strong> <span style="color:'+(Math.abs(totalD-totalH)<0.01?'var(--ok)':'var(--err)')+'">'+fmt(totalD-totalH)+'€</span></div>'+
  '<div><strong>Cuentas nuevas:</strong> <span style="color:'+(newAccts.length?'#7B1FA2':'var(--ok)')+'">'+newAccts.length+'</span></div></div>'+
  (newAccts.length?'<div style="padding:0 10px 10px;font-size:10px;color:var(--txM)">Se crearán automáticamente: '+newAccts.map(function(a){return a.code;}).join(', ')+'</div>':'')+
  '<div class="scr" style="max-height:400px"><table><thead><tr><th>Nº</th><th>Fecha</th><th>Concepto</th><th>Líneas</th><th style="text-align:right">Debe</th><th style="text-align:right">Haber</th><th>Estado</th></tr></thead><tbody>'+
  asientos.map(function(a){
    var cls=a.cuadra?'':'background:#FFEBEE';
    return '<tr style="'+cls+'"><td>'+h(a.num)+'</td><td style="font-size:10px">'+fmtD(a.date)+'</td><td style="font-size:10px">'+h(a.concept.substring(0,40))+'</td><td style="text-align:center">'+a.lines.length+'</td><td style="text-align:right">'+fmt(a.totalD)+'€</td><td style="text-align:right">'+fmt(a.totalH)+'€</td><td>'+(a.cuadra?'<span class="badge badge-g">✓ Cuadra</span>':'<span class="badge badge-a">⚠ '+fmt(a.totalD-a.totalH)+'€</span>')+'</td></tr>';
  }).join('')+'</tbody></table></div></div>';
}

async function importAsientosAll(){
  var asientos=window._impAsientos;if(!asientos)return;
  var newAccts=window._impNewAccts||[];
  var cid=state.company.id;
  
  // Show progress modal
  var total=asientos.filter(function(a){return a.cuadra;}).length+newAccts.length;
  var done=0;
  var modal=document.createElement('div');
  modal.id='modalOverlay';modal.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999';
  modal.innerHTML='<div style="background:#fff;border-radius:12px;padding:30px;text-align:center;min-width:400px"><div style="font-size:32px">⏳</div><div style="font-weight:700;font-size:16px;margin:12px 0" id="progTitle">Contabilizando asientos...</div><div style="font-size:12px;color:var(--txM);margin:8px 0" id="progDetail">Preparando...</div><div style="background:#E0E0E0;border-radius:6px;height:8px;margin:16px 0;overflow:hidden"><div id="progBar" style="height:100%;background:var(--pri);border-radius:6px;width:0%;transition:width 0.3s"></div></div><div style="font-size:11px;color:var(--txM)" id="progCount">0 / '+total+'</div></div>';
  document.body.appendChild(modal);
  function updateProg(msg){done++;$('progBar').style.width=Math.round(done/total*100)+'%';$('progDetail').textContent=msg;$('progCount').textContent=done+' / '+total;}
  
  // 1. Create missing accounts
  for(var j=0;j<newAccts.length;j++){
    var na=newAccts[j];
    var g=parseInt(na.code[0])||0;
    var name=na.desc||'Cuenta '+na.code;
    var t='gasto';
    if(g<=2||g===3||g===5)t='activo';
    if(g===4){var c3=na.code.substring(0,3);if(c3==='400')t='proveedor';else if(c3==='430')t='cliente';else t='gasto';}
    if(g===7)t='ingreso';
    // Validate account code before creating
    if(!/^\d{1,8}$/.test(na.code)){
      console.warn('Cuenta inválida ignorada:', na.code);
      continue;
    }
    try{await api('/api/accounts/'+cid,{method:'POST',body:{code:na.code,name:name,g:g,t:t}});}catch(e){}
    updateProg('Cuenta '+na.code);
  }
  
  // 2. Import entries (only balanced ones)
  $('progTitle').textContent='Contabilizando asientos...';
  var count=0,skipped=0;
  for(var i=0;i<asientos.length;i++){
    var a=asientos[i];
    if(!a.cuadra){skipped++;continue;}
    var concept=a.descs.join(' / ').substring(0,120)||'Asiento '+a.num;
    await api('/api/entries/'+cid,{method:'POST',body:{id:'asi_'+uid(),date:a.date,concept:concept,type:'import_asiento',lines:a.lines}});
    count++;
    updateProg('Asiento '+a.num+' — '+concept.substring(0,40));
  }
  
  document.body.removeChild(modal);
  await loadData();checkIntegrity();
  toast(count+' asientos contabilizados'+(skipped?' ('+skipped+' descuadrados omitidos)':''));
  render();
}

function renderPosicion(c){
  var all=filteredEntries();var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  // Agrupar saldos por cuenta bancaria (572.xxx) y caja (570.xxx)
  var cuentas={};
  all.forEach(function(e){e.lines.forEach(function(l){
    if(l.a&&(l.a.startsWith('572')||l.a.startsWith('570'))){
      if(!cuentas[l.a])cuentas[l.a]={code:l.a,name:am[l.a]?am[l.a].name:l.a,debe:0,haber:0};
      cuentas[l.a].debe+=l.d;cuentas[l.a].haber+=l.h;
    }
  });});
  var items=Object.values(cuentas).map(function(x){x.saldo=x.debe-x.haber;return x;}).sort(function(a,b){return a.code.localeCompare(b.code);});
  var totalSaldo=items.reduce(function(s,x){return s+x.saldo;},0);

var prevLines=[];
function loadPrevLines(){try{prevLines=JSON.parse(localStorage.getItem('cf_prev_'+(state.company?state.company.id:''))||'[]');}catch(e){prevLines=[];}}
function savePrevLines(){try{localStorage.setItem('cf_prev_'+(state.company?state.company.id:''),JSON.stringify(prevLines));}catch(e){}}

  loadPrevLines();

  var all=state.entries.filter(function(e){return e.date&&e.date.startsWith(String(state.ejercicio));});
  var am={};state.accounts.forEach(function(a){am[a.code]=a;});

  var saldoActual=0;
  all.forEach(function(e){e.lines.forEach(function(l){if(l.a&&(l.a.startsWith('572')||l.a.startsWith('570')))saldoActual+=l.d-l.h;});});

  // Calculate running balance
  var sorted=prevLines.slice().sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});

  c.innerHTML='<div class="card"><div class="card-h"><span>📊 Previsión de tesorería</span><div style="display:flex;gap:4px"><button class="btn btn-p" onclick="addPrevLine()">+ Línea</button><button class="btn btn-d" style="font-size:10px" onclick="importPrevFromAccounting()">📥 Importar pendientes</button><button class="btn btn-d" style="font-size:10px" onclick="exportPrevExcel()">📊 Excel</button></div></div>'+

function importPrevFromAccounting(){
  loadPrevLines();
  var all=state.entries.filter(function(e){return e.date&&e.date.startsWith(String(state.ejercicio));});
  var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  // Find pending receivables (430 with debit balance)
  var clientSaldos={};
  all.forEach(function(e){e.lines.forEach(function(l){
    if(l.a&&l.a.startsWith('430')){if(!clientSaldos[e.concept])clientSaldos[e.concept]=0;clientSaldos[e.concept]+=l.d-l.h;}
  });});
  // Find pending payables (400, 410 with credit balance)
  var provSaldos={};
  all.forEach(function(e){e.lines.forEach(function(l){
    if(l.a&&(l.a.startsWith('400')||l.a.startsWith('410'))){if(!provSaldos[e.concept])provSaldos[e.concept]=0;provSaldos[e.concept]+=l.h-l.d;}
  });});
  // Check existing lines to avoid duplicates
  var existingKeys={};
  prevLines.forEach(function(pl){existingKeys[pl.desc+'_'+pl.tipo]=true;});
  var added=0;
  Object.entries(clientSaldos).forEach(function(x){
    if(x[1]>1 && !existingKeys[x[0]+'_cobro']){prevLines.push({date:today(),tercero:'Cliente',desc:x[0],tipo:'cobro',ingreso:Math.round(x[1]*100)/100,gasto:0});added++;}
  });
  Object.entries(provSaldos).forEach(function(x){
    if(x[1]>1 && !existingKeys[x[0]+'_pago']){prevLines.push({date:today(),tercero:'Proveedor',desc:x[0],tipo:'pago',ingreso:0,gasto:Math.round(x[1]*100)/100});added++;}
  });
  savePrevLines();
  toast(added>0?added+' líneas importadas de pendientes':'Ya están todos los pendientes importados');
  render();
}

function renderModelo303(c){
  var all=state.entries.filter(function(e){return e.date&&e.date.startsWith(String(state.ejercicio));});
  var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  var trimestres=[{name:'1T (Ene-Mar)',from:'01',to:'03'},{name:'2T (Abr-Jun)',from:'04',to:'06'},{name:'3T (Jul-Sep)',from:'07',to:'09'},{name:'4T (Oct-Dic)',from:'10',to:'12'}];
  var datos=trimestres.map(function(t){
    var fromD=state.ejercicio+'-'+t.from+'-01';var toD=state.ejercicio+'-'+t.to+'-31';
    var rep=0,sop=0,baseRep=0,baseSop=0;
    // Desglose by rate
    var rates={21:{baseR:0,cuotaR:0,baseS:0,cuotaS:0},10:{baseR:0,cuotaR:0,baseS:0,cuotaS:0},4:{baseR:0,cuotaR:0,baseS:0,cuotaS:0}};
    all.forEach(function(e){
      if(e.date>=fromD&&e.date<=toD){
        var eIvaRep=0,eIvaSop=0,eBaseG6=0,eBaseG7=0;
        e.lines.forEach(function(l){
          var acct=l.a||l.account||'';
          var debe=parseFloat(l.d||l.debe||0)||0;
          var haber=parseFloat(l.h||l.haber||0)||0;
          if(acct.startsWith('477')){rep+=haber-debe;eIvaRep+=haber-debe;}
          if(acct==='47200000'){sop+=debe-haber;eIvaSop+=debe-haber;}
          var g=parseInt(acct[0])||0;
          if(g===7){baseRep+=haber-debe;eBaseG7+=haber-debe;}
          if(g===6){baseSop+=debe-haber;eBaseG6+=debe-haber;}
        });
        // Classify by IVA rate — handle multiple IVA lines per entry
        var ivaSopLines=[];var ivaRepLines=[];
        e.lines.forEach(function(l){
          var acct=l.a||l.account||'';
          var debe=parseFloat(l.d||l.debe||0)||0;
          var haber=parseFloat(l.h||l.haber||0)||0;
          if(acct.startsWith('477'))ivaRepLines.push(haber-debe);
          if(acct==='47200000')ivaSopLines.push(debe-haber);
        });
        if(ivaRepLines.length===1&&eIvaRep>0.001){
          var rr=detectIvaRate(eBaseG7,eIvaRep);var rk=rates[rr]?rr:21;rates[rk].baseR+=eBaseG7;rates[rk].cuotaR+=eIvaRep;
        }else if(ivaRepLines.length>1){
          ivaRepLines.forEach(function(cuota){if(Math.abs(cuota)<0.001)return;var rate=detectIvaRateFromCuota(cuota,eBaseG7,eIvaRep);var base=rate>0?cuota/rate:0;var rk=rates[Math.round(rate*100)]?Math.round(rate*100):21;rates[rk].baseR+=base;rates[rk].cuotaR+=cuota;});
        }
        if(ivaSopLines.length===1&&eIvaSop>0.001){
          var rs=detectIvaRate(eBaseG6,eIvaSop);var rk2=rates[rs]?rs:21;rates[rk2].baseS+=eBaseG6;rates[rk2].cuotaS+=eIvaSop;
        }else if(ivaSopLines.length>1){
          ivaSopLines.forEach(function(cuota){if(Math.abs(cuota)<0.001)return;var rate=detectIvaRateFromCuota(cuota,eBaseG6,eIvaSop);var base=rate>0?cuota/rate:0;var rk2=rates[Math.round(rate*100)]?Math.round(rate*100):21;rates[rk2].baseS+=base;rates[rk2].cuotaS+=cuota;});
        }
      }
    });
    return {name:t.name,baseRep:baseRep,rep:rep,baseSop:baseSop,sop:sop,resultado:rep-sop,rates:rates};
  });
  var totalRep=datos.reduce(function(s,d){return s+d.rep;},0);
  var totalSop=datos.reduce(function(s,d){return s+d.sop;},0);
  var totalBaseRep=datos.reduce(function(s,d){return s+d.baseRep;},0);
  var totalBaseSop=datos.reduce(function(s,d){return s+d.baseSop;},0);
  // Aggregate rates across all quarters
  var totalRates={21:{baseR:0,cuotaR:0,baseS:0,cuotaS:0},10:{baseR:0,cuotaR:0,baseS:0,cuotaS:0},4:{baseR:0,cuotaR:0,baseS:0,cuotaS:0}};

// ═══ MODELO 390 — RESUMEN ANUAL IVA ═══
function renderModelo390(c){
  var all=state.entries.filter(function(e){return e.date&&e.date.startsWith(String(state.ejercicio));});
  var baseRep=0,baseSop=0,rep=0,sop=0;
  var rates={21:{baseR:0,cuotaR:0,baseS:0,cuotaS:0},10:{baseR:0,cuotaR:0,baseS:0,cuotaS:0},4:{baseR:0,cuotaR:0,baseS:0,cuotaS:0}};
  all.forEach(function(e){
    var eIvaRep=0,eIvaSop=0,eBaseG6=0,eBaseG7=0;
    e.lines.forEach(function(l){
      var acct=l.a||'';
      var debe=parseFloat(l.d||0)||0;
      var haber=parseFloat(l.h||0)||0;
      if(acct.startsWith('477')){rep+=haber-debe;eIvaRep+=haber-debe;}
      if(acct==='47200000'){sop+=debe-haber;eIvaSop+=debe-haber;}
      var g=parseInt(acct[0])||0;
      if(g===7){baseRep+=haber-debe;eBaseG7+=haber-debe;}
      if(g===6){baseSop+=debe-haber;eBaseG6+=debe-haber;}
    });
    if(eIvaRep>0.001){
      var ivaRepLns=[];e.lines.forEach(function(l){if((l.a||'').startsWith('477'))ivaRepLns.push((parseFloat(l.h||0)||0)-(parseFloat(l.d||0)||0));});
      if(ivaRepLns.length<=1){var rr=detectIvaRate(eBaseG7,eIvaRep);var rk=rates[rr]?rr:21;rates[rk].baseR+=eBaseG7;rates[rk].cuotaR+=eIvaRep;}
      else{ivaRepLns.forEach(function(cuota){if(Math.abs(cuota)<0.001)return;var rate=detectIvaRateFromCuota(cuota,eBaseG7,eIvaRep);var base=rate>0?cuota/rate:0;var rk=rates[Math.round(rate*100)]?Math.round(rate*100):21;rates[rk].baseR+=base;rates[rk].cuotaR+=cuota;});}
    }
    if(eIvaSop>0.001){
      var ivaSopLns=[];e.lines.forEach(function(l){if((l.a||'')==='47200000')ivaSopLns.push((parseFloat(l.d||0)||0)-(parseFloat(l.h||0)||0));});
      if(ivaSopLns.length<=1){var rs=detectIvaRate(eBaseG6,eIvaSop);var rk2=rates[rs]?rs:21;rates[rk2].baseS+=eBaseG6;rates[rk2].cuotaS+=eIvaSop;}
      else{ivaSopLns.forEach(function(cuota){if(Math.abs(cuota)<0.001)return;var rate=detectIvaRateFromCuota(cuota,eBaseG6,eIvaSop);var base=rate>0?cuota/rate:0;var rk2=rates[Math.round(rate*100)]?Math.round(rate*100):21;rates[rk2].baseS+=base;rates[rk2].cuotaS+=cuota;});}
    }
  });
  // Rate rows for devengado
  var devRows='';
  [21,10,4].forEach(function(r){var d=rates[r];if(Math.abs(d.baseR)>0.01||Math.abs(d.cuotaR)>0.01){devRows+='<tr><td style="padding-left:20px">Régimen general '+r+'%</td><td style="text-align:right">'+fmt(d.baseR)+'€</td><td style="text-align:right">'+fmt(d.cuotaR)+'€</td></tr>';}});
  var dedRows='';
  [21,10,4].forEach(function(r){var d=rates[r];if(Math.abs(d.baseS)>0.01||Math.abs(d.cuotaS)>0.01){dedRows+='<tr><td style="padding-left:20px">Cuotas soportadas '+r+'%</td><td style="text-align:right">'+fmt(d.baseS)+'€</td><td style="text-align:right">'+fmt(d.cuotaS)+'€</td></tr>';}});
  c.innerHTML='<div class="card"><div class="card-h"><span>Modelo 390 — Resumen anual IVA '+state.ejercicio+'</span><div style="display:flex;gap:6px"><button class="btn btn-d" onclick="exportModelo390()">↓ Excel</button></div></div>'+
  '<table><thead><tr><th>Concepto</th><th style="text-align:right">Base imponible</th><th style="text-align:right">Cuota IVA</th></tr></thead><tbody>'+
  '<tr><td colspan="3" style="font-weight:700;background:#E8F8ED;color:var(--ok)">IVA DEVENGADO (Repercutido)</td></tr>'+
  devRows+
  '<tr class="total"><td>Total IVA devengado</td><td style="text-align:right">'+fmt(baseRep)+'€</td><td style="text-align:right">'+fmt(rep)+'€</td></tr>'+
  '<tr><td colspan="3" style="font-weight:700;background:#FDF0F0;color:var(--rd)">IVA DEDUCIBLE (Soportado)</td></tr>'+
  dedRows+
  '<tr class="total"><td>Total IVA deducible</td><td style="text-align:right">'+fmt(baseSop)+'€</td><td style="text-align:right">'+fmt(sop)+'€</td></tr>'+
  '<tr style="background:var(--priLt)"><td style="font-weight:700;font-size:14px">RESULTADO</td><td></td><td style="text-align:right;font-weight:700;font-size:14px;color:'+(rep-sop>=0?'var(--rd)':'var(--ok)')+'">'+fmt(Math.abs(rep-sop))+'€ '+(rep-sop>=0?'A INGRESAR':'A DEVOLVER')+'</td></tr>'+
  '</tbody></table></div>';
}

// ═══ MODELO 347 — TERCEROS (clientes y proveedores) ═══
var m347Minimo=3005.06;
function renderModelo347(c){
  var all=state.entries.filter(function(e){return e.date&&e.date.startsWith(String(state.ejercicio));});
  var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  loadMasters();
  
  // Build terceros from entry concepts (Fra. NOMBRE [NUM]) and maestros
  var terceros={};
  all.forEach(function(e){
    var trimIdx=Math.floor((parseInt(e.date.slice(5,7))-1)/3);
    // Extract tercero name from concept
    var concepto=e.concept||'';
    var terceroName='';var terceroCif='';var tipo='';
    var mFra=concepto.match(/^(?:Fra\.|Abono)\s+(.+?)\s*\[/);
    if(mFra)terceroName=mFra[1].trim();
    
    // Find total from proveedor/cliente line (400/430)
    var totalIvaIncl=0;
    var isCompra=false,isVenta=false;
    e.lines.forEach(function(l){
      if(!l.a)return;
      if(l.a.startsWith('400')||l.a.startsWith('410')){
        totalIvaIncl+=l.h-l.d; // haber = factura, debe = abono
        isCompra=true;
      }
      if(l.a.startsWith('430')||l.a.startsWith('431')){
        totalIvaIncl+=l.d-l.h; // debe = factura, haber = cobro
        isVenta=true;
      }
    });
    
    if(!terceroName&&totalIvaIncl===0)return;
    
    // Try to find CIF from maestros
    if(!terceroCif){
      var prov=masters.supplier.find(function(s){return s.name===terceroName;});
      if(prov)terceroCif=prov.cif||'';
      if(!terceroCif){
        var cli=masters.client.find(function(s){return s.name===terceroName;});
        if(cli)terceroCif=cli.cif||'';
      }
    }
    
    var key=terceroName||concepto;
    if(!terceros[key])terceros[key]={nombre:terceroName||concepto,cif:terceroCif,compras:0,ventas:0,trim:[0,0,0,0]};
    if(terceroCif&&!terceros[key].cif)terceros[key].cif=terceroCif;
    if(isCompra){terceros[key].compras+=totalIvaIncl;terceros[key].trim[trimIdx]+=totalIvaIncl;}
    if(isVenta){terceros[key].ventas+=totalIvaIncl;terceros[key].trim[trimIdx]+=totalIvaIncl;}
  });
  
  var lista=Object.values(terceros).filter(function(x){var t=x.compras+x.ventas;return t>m347Minimo;}).sort(function(a,b){return (b.compras+b.ventas)-(a.compras+a.ventas);});
  var totalCompras=lista.reduce(function(s,x){return s+x.compras;},0);
  var totalVentas=lista.reduce(function(s,x){return s+x.ventas;},0);

function newTarea(){
  loadExpedientes();

  var fecha=prompt('Fecha límite (YYYY-MM-DD):',today());
  var prioridad=prompt('Prioridad (alta/media/baja):','media');

  loadTareas();

    }
  });
  if(!navigated){
  if(ql.indexOf('iva')>=0&&(ql.indexOf('pagar')>=0||ql.indexOf('cuanto')>=0||ql.indexOf('cuánto')>=0||ql.indexOf('liquidar')>=0||ql.indexOf('devolver')>=0)){
    var liq=ivaRep-ivaSop;answer='<strong>Liquidación IVA '+state.ejercicio+':</strong><br>IVA Repercutido: '+fmt(ivaRep)+'€<br>IVA Soportado: '+fmt(ivaSop)+'€<br><strong>Resultado: '+fmt(Math.abs(liq))+'€ '+(liq>=0?'a pagar':'a devolver')+'</strong>';

async function loadUserChat(username,el){
  window._soporteCurrentUser=username;
  // Update sidebar selection
  document.querySelectorAll('.soporte-user').forEach(function(d){d.style.background='';d.style.borderLeftColor='transparent';d.classList.remove('active');});
  if(el){el.style.background='#fff';el.style.borderLeftColor='var(--pri)';el.classList.add('active');}
  
  var header=document.getElementById('soporteChatHeader');
  var msgs=document.getElementById('soporteChatMessages');
  if(header)header.textContent='\ud83d\udcac Chat con '+username;
  if(msgs)msgs.innerHTML='<div style="color:var(--txM)">Cargando...</div>';
  
  try{
    var fb=await api('/api/feedback');
    var userMsgs=(fb||[]).filter(function(f){return f.username===username;}).sort(function(a,b){return a.id-b.id;});
    
    if(!userMsgs.length){
      if(msgs)msgs.innerHTML='<div style="color:var(--txM);text-align:center;padding:20px">Sin mensajes</div>';
      return;
    }
    
    var html='';
    userMsgs.forEach(function(m){
      var typeIcons={error:'\ud83d\udc1b',mejora:'\ud83d\udca1',duda:'\u2753'};
      var time=m.timestamp?m.timestamp.slice(0,16).replace('T',' '):'';
      // User message (left)
      html+='<div style="display:flex;margin-bottom:12px"><div style="max-width:75%;background:#E3F2FD;border-radius:12px 12px 12px 0;padding:10px 14px">'+
        '<div style="font-size:10px;color:var(--txM);margin-bottom:4px">'+(typeIcons[m.type]||'')+' '+time+(m.page?' \u00b7 '+h(m.page):'')+'</div>'+
        '<div style="font-size:13px;white-space:pre-wrap">'+h(m.message)+'</div>'+
        '</div></div>';
      // Admin reply (right)
      if(m.reply){
        html+='<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><div style="max-width:75%;background:#E8F5E9;border-radius:12px 12px 0 12px;padding:10px 14px">'+
          '<div style="font-size:10px;color:var(--ok);margin-bottom:4px">\u2709\ufe0f '+h(m.replied_by||'Admin')+'</div>'+
          '<div style="font-size:13px;white-space:pre-wrap">'+h(m.reply)+'</div>'+
          '</div></div>';
      }
      // Mark as seen
      if(m.status==='nuevo')updateTicketStatus(m.id,'visto');
    });
    
    if(msgs){msgs.innerHTML=html;msgs.scrollTop=msgs.scrollHeight;}
  }catch(e){if(msgs)msgs.innerHTML='<div style="color:var(--rd)">Error: '+e.message+'</div>';}
}

async function sendSoporteReply(){
  var reply=document.getElementById('soporteReply');
  if(!reply||!reply.value.trim())return;
  var username=window._soporteCurrentUser;
  if(!username){toast('Selecciona un usuario','error');return;}
  
  // Find the last unreplied message from this user
  try{
    var fb=await api('/api/feedback');
    var userMsgs=(fb||[]).filter(function(f){return f.username===username;}).sort(function(a,b){return b.id-a.id;});
    var lastUnreplied=userMsgs.find(function(f){return !f.reply;});
    if(!lastUnreplied&&userMsgs.length)lastUnreplied=userMsgs[0];
    if(!lastUnreplied){toast('No hay mensajes para responder','error');return;}
    
    await api('/api/feedback/'+lastUnreplied.id+'/reply',{method:'POST',body:{reply:reply.value.trim()}});
    reply.value='';
    toast('\u2713 Respuesta enviada');
    loadUserChat(username,null);
  }catch(e){toast('Error: '+e.message,'error');}
}

async function repairProveedores(){
  var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  var all=state.entries;
  
  // Collect all 400 accounts used in entries
  var usedProvCodes={};
  all.forEach(function(e){e.lines.forEach(function(l){
    if(l.a&&(l.a.startsWith('400')||l.a.startsWith('410'))&&l.a!=='40000000'&&l.a!=='41000000'){
      if(!usedProvCodes[l.a])usedProvCodes[l.a]={code:l.a,concept:e.concept||'',count:0};
      usedProvCodes[l.a].count++;
    }
  });});
  
  // Find which ones don't have an account name
  var missing=[];
  Object.values(usedProvCodes).forEach(function(p){
    var acct=am[p.code];
    if(!acct||!acct.name||acct.name===p.code){
      // Try to extract name from entry concept: "Fra. PROVEEDOR NAME [INV/...]"
      var name='';
      all.forEach(function(e){
        if(name)return;
        e.lines.forEach(function(l){
          if(l.a===p.code&&e.concept){
            var m=e.concept.match(/(?:Fra\.|Abono)\s+(.+?)\s*\[/);
            if(m)name=m[1].trim();
          }
        });
      });
      if(!name){
        // Try from masters
        var masters=[];
        try{masters=JSON.parse(localStorage.getItem('cf_masters_supplier_'+state.company.id))||[];}catch(ex){}
        var mast=masters.find(function(s){return s.account===p.code;});
        if(mast&&mast.name)name=mast.name;
      }
      if(!name)name='Proveedor '+p.code;
      missing.push({code:p.code,name:name,count:p.count});
    }
  });
  
  // Also check 430 client accounts
  var usedCliCodes={};
  all.forEach(function(e){e.lines.forEach(function(l){
    if(l.a&&l.a.startsWith('430')&&l.a!=='43000000'){
      if(!usedCliCodes[l.a])usedCliCodes[l.a]={code:l.a,concept:e.concept||'',count:0};
      usedCliCodes[l.a].count++;
    }
  });});
  
  var missingCli=[];
  Object.values(usedCliCodes).forEach(function(p){
    var acct=am[p.code];
    if(!acct||!acct.name||acct.name===p.code){
      var name='';
      all.forEach(function(e){
        if(name)return;
        e.lines.forEach(function(l){
          if(l.a===p.code&&e.concept){
            var m=e.concept.match(/(?:Fra\.|Abono)\s+(.+?)\s*\[/);
            if(m)name=m[1].trim();
          }
        });
      });
      if(!name)name='Cliente '+p.code;
      missingCli.push({code:p.code,name:name,count:p.count});
    }
  });
  
  var total=missing.length+missingCli.length;
  if(total===0){toast('✓ Todas las cuentas de terceros están correctas');return;}
  
  if(!confirm('Se van a crear/actualizar '+total+' cuentas:\n- '+missing.length+' proveedores\n- '+missingCli.length+' clientes\n\n¿Continuar?'))return;
  
  var created=0;
  for(var i=0;i<missing.length;i++){
    var p=missing[i];
    try{
      await api('/api/accounts/'+state.company.id,{method:'POST',body:{code:p.code,name:p.name,g:4,t:'A'}});
      var existing=state.accounts.find(function(a){return a.code===p.code;});
      if(existing){existing.name=p.name;}else{state.accounts.push({code:p.code,name:p.name,g:4,t:'A'});}
      created++;
    }catch(e){}
  }
  for(var j=0;j<missingCli.length;j++){
    var cl=missingCli[j];
    try{
      await api('/api/accounts/'+state.company.id,{method:'POST',body:{code:cl.code,name:cl.name,g:4,t:'A'}});
      var existing2=state.accounts.find(function(a){return a.code===cl.code;});
      if(existing2){existing2.name=cl.name;}else{state.accounts.push({code:cl.code,name:cl.name,g:4,t:'A'});}
      created++;
    }catch(e){}
  }
  
  toast('✓ '+created+' cuentas creadas/actualizadas');
  render();
}
function getEmpresas(){try{return JSON.parse(localStorage.getItem('cf_empresas')||'[]');}catch(e){return [];}}
function saveEmpresas(arr){try{localStorage.setItem('cf_empresas',JSON.stringify(arr));}catch(e){}}

// Map of company IDs to real names — never lose the real name
var EMPRESA_MAP={};
function resolveCompanyName(idOrName){
  if(EMPRESA_MAP[idOrName])return EMPRESA_MAP[idOrName];
  var emps=state.serverEmpresas||[];
  var found=emps.find(function(e){return e.id===idOrName||e.name===idOrName;});
  if(found)return found.name;
  return idOrName;
}
function fixCompanyState(){
  if(state.company){
    // Resolve name from ID first
    if(state.company.id&&EMPRESA_MAP[state.company.id]){
      state.company.name=EMPRESA_MAP[state.company.id];
    }
    // Then try resolving name if it still looks like an ID
    if(state.company.name){
      var resolved=resolveCompanyName(state.company.name);
      if(resolved!==state.company.name)state.company.name=resolved;
    }
    // Register the ID mapping
    if(state.company.id&&state.company.name)EMPRESA_MAP[state.company.id]=state.company.name;
  }
}

function initEmpresas(){
  var em=getEmpresas();
  if(!em.length){
    em=[{name:'Muvail Conta S.L.',cif:'B98000001',direccion:'',cp:'',ciudad:'Valencia',provincia:'Valencia',activa:true},
        {name:'Valentia Alimentación S.L.',cif:'',direccion:'',cp:'',ciudad:'Valencia',provincia:'Valencia',activa:true},
        {name:'Espacio CF',cif:'',direccion:'',cp:'',ciudad:'Valencia',provincia:'Valencia',activa:true}];
    saveEmpresas(em);
  }
  // Fix current company name if it's an ID
  fixCompanyState();
  // Also try loading from server
  try{
    api('/api/companies').then(function(companies){
      if(companies&&companies.length){
        var current=getEmpresas();
        var changed=false;
        companies.forEach(function(sc){
          // Register ID mapping
          if(sc.id&&sc.name)EMPRESA_MAP[sc.id]=sc.name;
          if(!current.some(function(e){return e.name===sc.name;})){
            current.push({name:sc.name,cif:sc.cif||'',direccion:sc.address||'',cp:'',ciudad:'',provincia:'',activa:true});
            changed=true;
          }
        });
        if(changed){saveEmpresas(current);fixCompanyState();render();}
      }
    }).catch(function(){});
  }catch(e){}
}

function saveUsuario(idx){
  var user=$('usrUser').value.trim();var name=$('usrName').value.trim();

  if(idx>=0){

  }else{

  auditLog(idx>=0?'editar_usuario':'nuevo_usuario',user);toast('Usuario guardado');render();
}

function runTestCuadre(){
  var all=state.entries.filter(function(e){return e.date&&e.date.startsWith(String(state.ejercicio));});
  var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  var results=[];

  // Test 1: Todos los asientos cuadran (debe = haber)
  var descuadrados=0;
  all.forEach(function(e){
    var td=0,th=0;e.lines.forEach(function(l){td+=l.d;th+=l.h;});
    if(Math.abs(td-th)>0.01)descuadrados++;
  });
  results.push({name:'Asientos cuadrados (debe=haber)',ok:descuadrados===0,detail:descuadrados===0?all.length+' asientos OK':descuadrados+' asientos descuadrados'});

  // Test 2: Balance de sumas y saldos cuadra
  var totalDebe=0,totalHaber=0;
  all.forEach(function(e){e.lines.forEach(function(l){totalDebe+=l.d;totalHaber+=l.h;});});
  var diffSumas=Math.round((totalDebe-totalHaber)*100)/100;
  results.push({name:'Sumas y saldos cuadrados',ok:Math.abs(diffSumas)<1,detail:'Debe: '+fmt(totalDebe)+'€ · Haber: '+fmt(totalHaber)+'€ · Diff: '+fmt(diffSumas)+'€'});

  // Test 3: Balance de situación (Activo = PN + Pasivo)
  var gSaldos={};
  all.forEach(function(e){e.lines.forEach(function(l){if(!gSaldos[l.a])gSaldos[l.a]={d:0,h:0};gSaldos[l.a].d+=l.d;gSaldos[l.a].h+=l.h;});});
  var activo=0,pasivo=0,patrimonio=0,gastos=0,ingresos=0;
  Object.entries(gSaldos).forEach(function(x){
    var code=x[0],v=x[1],saldo=v.d-v.h,g=parseInt(code[0])||0;
    if(g===1||g===5)patrimonio+=saldo; // PN y financieras
    if(g===2)activo+=saldo; // Inmovilizado
    if(g===3)activo+=saldo; // Existencias
    if(g===4){
      // Grupo 4 depende de la cuenta
      if(code.startsWith('400')||code.startsWith('401')||code.startsWith('410')||code.startsWith('411'))pasivo+=v.h-v.d;
      else if(code.startsWith('430')||code.startsWith('431')||code.startsWith('440'))activo+=saldo;
      else if(code.startsWith('47')){if(saldo>0)activo+=saldo;else pasivo+=Math.abs(saldo);}
      else activo+=saldo;
    }
    if(g===6)gastos+=saldo;
    if(g===7)ingresos+=v.h-v.d;
  });
  var resultado=ingresos-gastos;
  var balDiff=Math.round((activo-(patrimonio+pasivo+resultado))*100)/100;
  // Use simplified check: sum of all debit-side = sum of all credit-side balances
  results.push({name:'Balance de situación (A = PN+P)',ok:Math.abs(balDiff)<1,detail:'Activo: '+fmt(activo)+'€ · PN+Pasivo: '+fmt(patrimonio+pasivo+resultado)+'€ · Diff: '+fmt(balDiff)+'€'});

  // Test 4: PyG = Ingresos (7) - Gastos (6)
  results.push({name:'Resultado PyG coherente',ok:true,detail:'Ingresos G7: '+fmt(ingresos)+'€ · Gastos G6: '+fmt(gastos)+'€ · Resultado: '+fmt(resultado)+'€'});

  // Test 5: IVA soportado (472) = sum de IVAs por tipo
  var iva472=0;
  Object.entries(gSaldos).forEach(function(x){if(x[0]==='47200000')iva472+=x[1].d-x[1].h;});
  results.push({name:'IVA soportado (472) coherente',ok:true,detail:'IVA soportado total: '+fmt(iva472)+'€'});

  // Test 6: IVA repercutido (477)
  var iva477=0;
  Object.entries(gSaldos).forEach(function(x){if(x[0].startsWith('477'))iva477+=x[1].h-x[1].d;});
  results.push({name:'IVA repercutido (477) coherente',ok:true,detail:'IVA repercutido total: '+fmt(iva477)+'€'});

  // Test 7: Recargo de equivalencia separado
  var recargo=0;
  Object.entries(gSaldos).forEach(function(x){if(x[0]==='47200001')recargo+=x[1].d-x[1].h;});
  results.push({name:'Recargo equivalencia separado (47200001)',ok:true,detail:'Recargo total: '+fmt(recargo)+'€'});

  // Test 8: Retenciones (4751)
  var ret4751=0;
  Object.entries(gSaldos).forEach(function(x){if(x[0].startsWith('4751'))ret4751+=x[1].h-x[1].d;});
  results.push({name:'Retenciones IRPF (4751)',ok:true,detail:'Retenciones pendientes: '+fmt(ret4751)+'€'});

  // Test 9: Proveedores = sum facturas - sum pagos
  var prov400=0;
  Object.entries(gSaldos).forEach(function(x){if(x[0].startsWith('400'))prov400+=x[1].h-x[1].d;});
  results.push({name:'Saldo proveedores (400)',ok:true,detail:'Pendiente de pago: '+fmt(prov400)+'€'});

  // Test 10: Modelo 303 cuadra (IVA repercutido - IVA soportado)
  var m303=iva477-iva472;
  results.push({name:'Modelo 303 (IVA rep - IVA sop)',ok:true,detail:'Resultado 303: '+fmt(m303)+'€ '+(m303>0?'(a pagar)':'(a devolver)')});

  // Show results
  var passed=results.filter(function(r){return r.ok;}).length;
  var html='<div class="card" style="margin-top:14px"><div class="card-h"><span>🧪 Test de cuadre fiscal — '+passed+'/'+results.length+' OK</span><span class="badge '+(passed===results.length?'badge-g':'badge-r')+'">'+(passed===results.length?'✓ TODO OK':'✗ '+( results.length-passed)+' errores')+'</span></div>'+
  '<table><thead><tr><th style="width:30px">#</th><th style="width:30px"></th><th>Test</th><th>Detalle</th></tr></thead><tbody>'+
  results.map(function(r,i){
    return '<tr style="background:'+(r.ok?'#E8F8ED':'#FDF0F0')+'"><td style="text-align:center">'+(i+1)+'</td><td style="font-size:16px;text-align:center">'+(r.ok?'✅':'❌')+'</td><td style="font-weight:600">'+r.name+'</td><td style="font-size:10px;color:'+(r.ok?'var(--ok)':'var(--rd)')+'">'+r.detail+'</td></tr>';
  }).join('')+
  '</tbody></table></div>';

  // Insert in admin page or show as modal
  var testDiv=$('testResults');
  if(testDiv){testDiv.innerHTML=html;}
  else{toast(passed+'/'+results.length+' tests OK','ok');var c2=$('content');if(c2)c2.innerHTML+=html;}
}


function renderIncidencias(c){
  var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  var errors=[];
  
  // 1. Asientos descuadrados
  state.entries.forEach(function(e){
    var td=0,th=0;
    e.lines.forEach(function(l){td+=Math.round(l.d*100)/100;th+=Math.round(l.h*100)/100;});
    var diff=Math.round((td-th)*100)/100;
    if(Math.abs(diff)>0.01){
      errors.push({tipo:'Descuadre',icon:'⚖️',severity:'error',date:e.date,ref:e.concept||e.id,detail:'Debe: '+fmt(td)+'€ · Haber: '+fmt(th)+'€ · Diferencia: '+fmt(diff)+'€',entryId:e.id,lines:e.lines});
    }
  });
  
  // 2. Cuentas inexistentes (usadas en asientos pero no en plan de cuentas)
  var cuentasUsadas={};
  state.entries.forEach(function(e){e.lines.forEach(function(l){
    if(l.a&&!am[l.a]&&!cuentasUsadas[l.a]){
      cuentasUsadas[l.a]=true;
      errors.push({tipo:'Cuenta inexistente',icon:'📑',severity:'warning',date:e.date,ref:e.concept||e.id,detail:'Cuenta '+l.a+' usada en asiento pero no existe en el plan de cuentas',entryId:e.id});
    }
  });});
  
  // 3. Asientos sin líneas
  state.entries.forEach(function(e){
    if(!e.lines||e.lines.length===0){
      errors.push({tipo:'Sin líneas',icon:'📋',severity:'warning',date:e.date,ref:e.concept||e.id,detail:'Asiento sin ninguna línea contable',entryId:e.id});
    }
  });
  
  // 4. Asientos con importe 0
  state.entries.forEach(function(e){
    if(e.lines&&e.lines.length>0){
      var td=0;e.lines.forEach(function(l){td+=l.d+l.h;});
      if(td===0){
        errors.push({tipo:'Importe cero',icon:'0️⃣',severity:'info',date:e.date,ref:e.concept||e.id,detail:'Todas las líneas tienen importe 0',entryId:e.id});
      }
    }
  });
  
  // 5. Fechas fuera del ejercicio
  state.entries.forEach(function(e){
    if(e.date&&!e.date.startsWith(String(state.ejercicio))){
      errors.push({tipo:'Fecha fuera ejercicio',icon:'📅',severity:'info',date:e.date,ref:e.concept||e.id,detail:'Fecha '+fmtD(e.date)+' no pertenece al ejercicio '+state.ejercicio,entryId:e.id});
    }
  });
  
  // 6. Saldos invertidos (deudor cuando debería ser acreedor o viceversa)
  var saldosCta={};
  state.entries.forEach(function(e){e.lines.forEach(function(l){
    if(!saldosCta[l.a])saldosCta[l.a]={d:0,h:0};
    saldosCta[l.a].d+=l.d;saldosCta[l.a].h+=l.h;
  });});
  Object.keys(saldosCta).forEach(function(cta){
    var s=saldosCta[cta];var saldo=s.d-s.h;var g=parseInt(cta[0])||0;
    var acct=am[cta];var nombre=acct?acct.name:cta;
    // Banco negativo
    if(cta.substring(0,3)==='572'&&saldo<0){
      errors.push({tipo:'Banco negativo',icon:'🏦',severity:'warning',date:'',ref:nombre,detail:'Saldo banco: '+fmt(saldo)+'€ — la empresa no tiene liquidez suficiente'});
    }
    // Capital con saldo deudor (debería ser acreedor)
    if(cta.substring(0,3)==='100'&&saldo>0){
      errors.push({tipo:'Capital deudor',icon:'⚠️',severity:'error',date:'',ref:nombre,detail:'Capital social tiene saldo deudor ('+fmt(saldo)+'€) — debería ser acreedor'});
    }
  });
  
  // 7. Cuadre global (Total Debe = Total Haber de todos los asientos)
  var globalD=0,globalH=0;
  state.entries.forEach(function(e){e.lines.forEach(function(l){globalD+=l.d;globalH+=l.h;});});
  if(Math.abs(globalD-globalH)>0.01){
    errors.push({tipo:'Descuadre global',icon:'🔴',severity:'error',date:'',ref:'CONTABILIDAD',detail:'Total Debe ('+fmt(globalD)+'€) ≠ Total Haber ('+fmt(globalH)+'€) — Diferencia: '+fmt(globalD-globalH)+'€'});
  }
  
  // 8. IVA: verificar que cuotas IVA son coherentes con bases
  var ivaRep=saldosCta['47700000']||{d:0,h:0};
  var ivaSop=saldosCta['47200000']||{d:0,h:0};
  if(ivaRep.h>0||ivaSop.d>0){
    var ventas700=saldosCta['70000000']||{d:0,h:0};
    var baseVentas=ventas700.h-ventas700.d;
    var cuotaRep=ivaRep.h-ivaRep.d;
    if(baseVentas>0&&cuotaRep>0){
      var tipoIvaVentas=Math.round(cuotaRep/baseVentas*100);
      if(tipoIvaVentas>21){
        errors.push({tipo:'IVA repercutido alto',icon:'💰',severity:'warning',date:'',ref:'IVA',detail:'Tipo medio IVA repercutido: '+tipoIvaVentas+'% — superior al 21% máximo'});
      }
    }
  }
  
  // Sort: errors first, then warnings, then info
  var order={error:0,warning:1,info:2};
  errors.sort(function(a,b){return (order[a.severity]||9)-(order[b.severity]||9)||(a.date||'').localeCompare(b.date||'');});
  
  var countErr=errors.filter(function(e){return e.severity==='error';}).length;
  var countWarn=errors.filter(function(e){return e.severity==='warning';}).length;
  var countInfo=errors.filter(function(e){return e.severity==='info';}).length;
  
  c.innerHTML='<div class="row">'+
  '<div class="stat"><div class="stat-v" style="color:var(--rd)">'+countErr+'</div><div class="stat-l">🔴 Errores (descuadres)</div></div>'+
  '<div class="stat"><div class="stat-v" style="color:var(--am)">'+countWarn+'</div><div class="stat-l">🟡 Advertencias</div></div>'+
  '<div class="stat"><div class="stat-v" style="color:var(--bl)">'+countInfo+'</div><div class="stat-l">🔵 Informativos</div></div>'+
  '<div class="stat"><div class="stat-v" style="color:var(--ok)">'+state.entries.length+'</div><div class="stat-l">Total asientos</div></div>'+
  '</div>'+
  '<div class="card"><div class="card-h"><span>Incidencias contables — '+errors.length+' encontradas</span><div style="display:flex;gap:6px"><button class="btn btn-d" onclick="checkIntegrity();render();">Recomprobar</button></div></div>'+
  (errors.length?'<div class="scr" style="max-height:500px"><table><thead><tr><th style="width:30px"></th><th>Tipo</th><th>Fecha</th><th>Asiento/Concepto</th><th>Detalle</th><th style="width:50px">Acc.</th></tr></thead><tbody>'+
  errors.map(function(e,i){
    var bgColor=e.severity==='error'?'#FDF0F0':e.severity==='warning'?'#FFF8E1':'#EBF5FF';
    var txtColor=e.severity==='error'?'var(--rd)':e.severity==='warning'?'var(--am)':'var(--bl)';
    return '<tr style="background:'+bgColor+'"><td style="font-size:16px;text-align:center">'+e.icon+'</td><td><span class="badge '+(e.severity==='error'?'badge-r':e.severity==='warning'?'badge-a':'badge-b')+'">'+e.tipo+'</span></td><td style="font-size:10px">'+fmtD(e.date)+'</td><td style="font-size:11px;font-weight:600;max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+h(e.ref)+'</td><td style="font-size:10px;color:'+txtColor+'">'+h(e.detail)+'</td><td style="white-space:nowrap">'+(e.entryId?'<button class="abtn" onclick="editEntry(\''+e.entryId+'\')" title="Editar asiento">✏️</button> <button class="abtn" style="color:var(--rd)" onclick="deleteEntry(\''+e.entryId+'\')" title="Eliminar">🗑</button>':'')+'</td></tr>';
  }).join('')+
  '</tbody></table></div>':'<div class="empty"><div style="font-size:40px;margin-bottom:10px">✅</div>Sin incidencias. ¡Todo correcto!</div>')+
  '</div>';
}
