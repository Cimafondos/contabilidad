function importFacturasExcel(file,tipo){
  if(!file){toast('Selecciona un archivo','error');return;}
  var reader=new FileReader();
  reader.onload=function(e){
    try{
      var data=new Uint8Array(e.target.result);
      var wb=XLSX.read(data,{type:'array'});
      // Read Resumen IVA sheet if exists (for cuadre test)
      var resumenIVA=null;
      if(wb.SheetNames.indexOf('Resumen IVA')>=0){
        var rsWs=wb.Sheets['Resumen IVA'];
        var rsRows=XLSX.utils.sheet_to_json(rsWs,{header:1,raw:true});
        resumenIVA={};
        rsRows.forEach(function(r){
          var label=String(r[0]||'').trim().toLowerCase();
          // Use 'total' column (last column with data)
          var totalVal=0;
          for(var ci=r.length-1;ci>=1;ci--){
            var cv=r[ci];
            if(cv!==null&&cv!==undefined&&cv!==''&&cv!==0){
              if(typeof cv==='number'){totalVal=cv;}
              else{totalVal=parseFloat(String(cv).replace(/\./g,'').replace(',','.'))||0;}
              break;
            }
          }
          if(label.indexOf('base 21')>=0)resumenIVA.base21=totalVal;
          if(label.indexOf('base 10')>=0)resumenIVA.base10=totalVal;
          if(label.indexOf('base 4')>=0&&label.indexOf('base 40')<0)resumenIVA.base4=totalVal;
          if(label.indexOf('base 0')>=0)resumenIVA.base0=totalVal;
          if(label.indexOf('iva 21')>=0)resumenIVA.iva21=totalVal;
          if(label.indexOf('iva 10')>=0)resumenIVA.iva10=totalVal;
          if(label.indexOf('iva 4')>=0&&label.indexOf('iva 10')<0)resumenIVA.iva4=totalVal;
          if(label==='total bases'||label.indexOf('total bases')>=0)resumenIVA.totalBases=totalVal;
          if(label==='total iva'||label.indexOf('total iva')>=0)resumenIVA.totalIVA=totalVal;
          if(label.indexOf('total gral')>=0)resumenIVA.totalFacturado=totalVal;
          if(label.indexOf('recargo')>=0)resumenIVA.recargos=totalVal;
          if(label.indexOf('retenc')>=0)resumenIVA.retenciones=totalVal;
        });
        console.log('Resumen IVA del gestor:',resumenIVA);
      }
      // Find the data sheet (not 'Resumen IVA')
      var sheetName=wb.SheetNames.find(function(s){return s!=='Resumen IVA';})||wb.SheetNames[0];
      var ws=wb.Sheets[sheetName];
      var rows=XLSX.utils.sheet_to_json(ws,{header:1,raw:false,defval:''});
      if(rows.length<2){toast('Sin datos en la hoja '+sheetName,'error');return;}
      processFacturasRows(rows,tipo,resumenIVA);
    }catch(err){toast('Error leyendo archivo: '+err.message,'error');}
  };
  reader.readAsArrayBuffer(file);
}

async function processFacturasRows(rows,tipo,resumenIVA){
  var header=rows[0].map(function(c){return String(c||'').trim();});
  // Map columns
  var colMap={};
  header.forEach(function(h,i){
    var hl=h.toLowerCase();
    if(hl.indexOf('nº factura')>=0||hl.indexOf('n factura')>=0||hl==='nº factura'||hl.indexOf('numero factura')>=0||hl.indexOf('núm')>=0||hl==='número'||hl==='numero')colMap.numFact=i;
    if(hl.indexOf('fecha contable')>=0||hl.indexOf('fecha factura')>=0||hl.indexOf('fecha emisión')>=0||hl==='fecha emisión'||(hl==='fecha'&&!colMap.fecha))colMap.fecha=i;
    if(hl.indexOf('fecha vencimiento')>=0||hl.indexOf('fecha vcto')>=0)colMap.vencimiento=i;
    if(hl.indexOf('emisor')>=0&&hl.indexOf('proveedor')>=0)colMap.tercero=i; // "Emisor / Proveedor" — priority
    else if(hl.indexOf('proveedor')>=0&&colMap.tercero===undefined)colMap.tercero=i;
    else if(hl.indexOf('emisor')>=0&&hl.indexOf('cif')<0&&colMap.tercero===undefined)colMap.tercero=i;
    else if((hl.indexOf('cliente')>=0||hl.indexOf('receptor')>=0)&&hl.indexOf('cif')<0&&colMap.tercero===undefined)colMap.tercero=i;
    // Receptor/Cliente: usado para EMITIDAS (el cliente)
    if((hl.indexOf('receptor')>=0||hl.indexOf('cliente')>=0||hl.indexOf('destinatario')>=0)&&hl.indexOf('cif')<0)colMap.receptorNombre=i;
    if(hl==='cif receptor'||hl.indexOf('cif receptor')>=0||hl.indexOf('cif cliente')>=0||hl.indexOf('cif destinatario')>=0)colMap.cifReceptor=i;
    if(hl==='cif'||hl==='cif emisor')colMap.cif=i;
    else if(hl.indexOf('cif emisor')>=0)colMap.cif=i;
    else if(hl==='cif'||(hl.indexOf('cif')>=0&&hl.indexOf('receptor')<0&&hl.indexOf('cliente')<0&&colMap.cif===undefined))colMap.cif=i;
    if(hl.indexOf('concepto')>=0||hl.indexOf('observaciones')>=0)colMap.concepto=i;
    if(hl.indexOf('tipo documento')>=0||hl==='tipo')colMap.tipoDoc=i;
    if(hl==='empresa factura'||hl==='empresa')colMap.empresa=i;
    if(hl.indexOf('base 21')>=0)colMap.base21=i;
    if(hl.indexOf('iva 21')>=0)colMap.iva21=i;
    if(hl.indexOf('base 10')>=0&&hl.indexOf('base 100')<0)colMap.base10=i;
    if(hl.indexOf('iva 10')>=0&&hl.indexOf('iva 100')<0)colMap.iva10=i;
    if(hl.indexOf('base 4')>=0)colMap.base4=i;
    if(hl.indexOf('iva 4')>=0)colMap.iva4=i;
    if(hl.indexOf('base 0')>=0)colMap.base0=i;
    if(hl.indexOf('iva 0')>=0&&hl.indexOf('iva 10')<0)colMap.iva0=i;
    if(hl.indexOf('retenc')>=0||hl.indexOf('retención')>=0)colMap.retencion=i;
    if(hl.indexOf('r. equiv')>=0||hl.indexOf('recargo')>=0)colMap.recargo=i;
    if(hl==='total'||hl==='total factura')colMap.total=i;
    if(hl==='base imponible'&&colMap.totalBase===undefined)colMap.totalBase=i;
  });
  console.log('Column map:',colMap);
  window._lastColMap=colMap;
  window._lastHeaders=header.map(function(c){return c?c.toString().trim():'';});
  console.log('Excel headers:', JSON.stringify(window._lastHeaders));

  // Parse each row into a factura
  var facturas=[];
  for(var i=1;i<rows.length;i++){
    var r=rows[i];
    if(!r)continue;
    var numFact=colMap.numFact!==undefined?String(r[colMap.numFact]||'').trim():'AUTO_'+i;
    if(!numFact||numFact==='TOTALES:'||numFact.indexOf('TOTAL')>=0)continue;
    // Skip empty rows
    var hasData=false;for(var ci=0;ci<r.length;ci++){if(r[ci]!==null&&r[ci]!==undefined&&r[ci]!==''){hasData=true;break;}}
    if(!hasData)continue;

    var fechaRaw=r[colMap.fecha];
    var fecha='';
    if(fechaRaw instanceof Date){
      fecha=fechaRaw.toISOString().slice(0,10);
    }else if(typeof fechaRaw==='number'){
      // Excel serial date number
      var d=new Date((fechaRaw-25569)*86400*1000);
      fecha=d.toISOString().slice(0,10);
    }else{
      var fs2=String(fechaRaw||'');
      fecha=fs2.slice(0,10);
      if(!fecha.match(/^\d{4}-/))fecha=parseDate(fs2);
    }
    if(!fecha||fecha==='undefined'||fecha.length<8)fecha=today();

    if(i<=2){
      var allCols={};for(var ci=0;ci<r.length;ci++){if(r[ci]!==null&&r[ci]!==undefined&&String(r[ci]).trim())allCols['col'+ci]=String(r[ci]).slice(0,80);}
      console.log('RAW ROW '+i+':', JSON.stringify(allCols));
    }
    var concepto=colMap.concepto!==undefined?String(r[colMap.concepto]||'').trim():'';
    var tipoDoc=colMap.tipoDoc!==undefined?String(r[colMap.tipoDoc]||'').trim():'';
    var empresaOrigen=colMap.empresa!==undefined?String(r[colMap.empresa]||'').trim():'';
    var ownCif=(state.company&&state.company.cif)||'';

    // Determinar tipo de documento ANTES de extraer el tercero
    var isEmitida=tipoDoc.indexOf('EMITIDA')>=0||tipoDoc.indexOf('VENTA')>=0;
    if(tipo==='emitida')isEmitida=true;
    if(tipo==='recibida')isEmitida=false;

    var terceroName='',cif='';
    if(isEmitida){
      // EMITIDAS: el tercero es el RECEPTOR (cliente). El CIF propio aparece como emisor.
      if(colMap.receptorNombre!==undefined)terceroName=String(r[colMap.receptorNombre]||'').trim();
      if(colMap.cifReceptor!==undefined)cif=String(r[colMap.cifReceptor]||'').trim();
      // Fallback: si no hay columna receptor explícita, usar "Empresa Factura"
      if(!terceroName&&empresaOrigen&&empresaOrigen.toLowerCase()!==(state.company&&state.company.name||'').toLowerCase())terceroName=empresaOrigen;
      // Fallback: extraer del concepto "CIF Receptor: [XXX]"
      if(!cif){
        var cifRm=concepto.match(/CIF\s*Receptor:\s*\[([A-Z0-9]+)\]/i);
        if(cifRm&&cifRm[1]&&cifRm[1]!==ownCif)cif=cifRm[1];
      }
      // Fallback de seguridad: si el tercero "habitual" (columna tercero) NO es el propio CIF, usarlo
      if(!terceroName){
        var tFallback=String(r[colMap.tercero]||'').trim();
        if(tFallback&&tFallback!==ownCif&&!tFallback.match(/^[A-Z]\d{7,8}[A-Z]?$/i))terceroName=tFallback;
      }
    }else{
      // RECIBIDAS: el tercero es el EMISOR (proveedor)
      terceroName=String(r[colMap.tercero]||'').trim();
      cif=colMap.cif!==undefined?String(r[colMap.cif]||'').trim():'';
    }

    // FIX v10: If tercero looks like a CIF, find real name from accounts/masters/concepto
    if(terceroName.match(/^[A-Z]\d{7,8}[A-Z]?$/i)){
      if(!cif)cif=terceroName;

      // Extract real CIF from concepto — buscamos receptor o emisor según el tipo
      var realCif=cif;
      if(realCif===ownCif){
        var pattern=isEmitida?/CIF\s*Receptor:\s*\[([A-Z0-9]+)\]/i:/CIF\s*Emisor:\s*\[([A-Z0-9]+)\]/i;
        var cifEm=concepto.match(pattern);
        if(cifEm&&cifEm[1]&&cifEm[1]!==ownCif)realCif=cifEm[1];
        else realCif='';
      }
      if(!realCif){
        var pattern2=isEmitida?/CIF\s*Receptor:\s*\[([A-Z0-9]+)\]/i:/CIF\s*Emisor:\s*\[([A-Z0-9]+)\]/i;
        var cifEm2=concepto.match(pattern2);
        if(cifEm2&&cifEm2[1]&&cifEm2[1]!==ownCif)realCif=cifEm2[1];
      }
      cif=realCif||cif;

      // 1. Try to find name from existing masters (más fiable)
      var nameFound='';
      if(realCif){
        loadMasters();
        var pool=isEmitida?(masters.client||[]):(masters.supplier||[]);
        var m=pool.find(function(s){return s.cif===realCif;});
        if(m&&m.name)nameFound=m.name;
        if(!nameFound&&m&&m.account){
          var acctByCode=state.accounts.find(function(a){return a.code===m.account;});
          if(acctByCode&&acctByCode.name)nameFound=acctByCode.name;
        }
      }

      // 2. Try concepto patterns (S.L., S.A., etc.)
      if(!nameFound){
        var matches=concepto.match(/([A-ZÁÉÍÓÚÑ][A-ZÁÉÍÓÚÑ\s\.,'&-]+(?:S\.L\.U?\.|S\.A\.|S\.L\.P\.|S\.COOP\.))/g);
        if(matches){
          for(var mi=0;mi<matches.length;mi++){
            var candidate=matches[mi].trim();
            if(candidate.length>8&&candidate.toLowerCase()!==(state.company&&state.company.name||'').toLowerCase()){nameFound=candidate;break;}
          }
        }
      }

      // 3. Try personal name pattern
      if(!nameFound){
        var pn=concepto.match(/([A-ZÁÉÍÓÚÑ][a-záéíóúñ]+(?:\s+[A-ZÁÉÍÓÚÑ][a-záéíóúñ]+){2,})/);
        if(pn)nameFound=pn[1];
      }

      if(nameFound)terceroName=nameFound;
    }

    // Si el CIF (recibidas) coincide con el propio, intentar extraer el emisor real del concepto
    if(!isEmitida){
      var cifEmisor=concepto.match(/CIF\s*Emisor:\s*\[([A-Z0-9]+)\]/i);
      if(cifEmisor&&cifEmisor[1]&&cifEmisor[1]!==cif&&cifEmisor[1]!==ownCif)cif=cifEmisor[1];
      if(ownCif&&cif===ownCif){
        var altCif=concepto.match(/CIF\s*Emisor:\s*\[([A-Z0-9]+)\]/i);
        if(altCif&&altCif[1]&&altCif[1]!==ownCif)cif=altCif[1];
      }
    }

    // Seguridad: si tras toda la lógica el tercero es la propia empresa, marcar para revisión
    var needsReview=false;
    if(ownCif&&cif===ownCif)needsReview=true;
    if(state.company&&state.company.name&&terceroName&&terceroName.toLowerCase()===String(state.company.name).toLowerCase())needsReview=true;

    // Parse amounts - handle string numbers with comma/dot
    function parseAmt(v){
      if(v===null||v===undefined||v==='')return 0;
      if(typeof v==='number')return v;
      var s=String(v).replace(/\s/g,'').replace(/€/g,'');
      // Detect format: "10.250,00" (Spanish) vs "10,250.00" (English) vs "10250.00" vs "10250,00"
      var lastComma=s.lastIndexOf(',');
      var lastDot=s.lastIndexOf('.');
      if(lastComma>0&&lastDot>0){
        // Both exist: the last separator is the decimal
        if(lastComma>lastDot){
          // Spanish: 10.250,00 → remove dots, replace comma
          s=s.replace(/\./g,'').replace(',','.');
        }else{
          // English: 10,250.00 → remove commas
          s=s.replace(/,/g,'');
        }
      }else if(lastComma>0){
        // Only comma: could be "1.250" (thousands) or "12,50" (decimal)
        // If exactly 2 digits after comma → decimal
        var afterComma=s.substring(lastComma+1);
        if(afterComma.length<=2){
          s=s.replace(',','.');
        }else{
          s=s.replace(/,/g,'');
        }
      }
      // else: only dots or no separator → parseFloat handles it
      return parseFloat(s)||0;
    }

    var fact={
      numFact:numFact, fecha:fecha, tercero:terceroName, cif:cif,
      _needsReview:needsReview,
      concepto:concepto, tipoDoc:tipoDoc, empresa:empresaOrigen,
      vencimiento:colMap.vencimiento!==undefined?parseDate(r[colMap.vencimiento]):'',
      base21:Math.abs(parseAmt(r[colMap.base21])), iva21:Math.abs(parseAmt(r[colMap.iva21])),
      base10:Math.abs(parseAmt(r[colMap.base10])), iva10:Math.abs(parseAmt(r[colMap.iva10])),
      base4:Math.abs(parseAmt(r[colMap.base4])), iva4:Math.abs(parseAmt(r[colMap.iva4])),
      base0:Math.abs(parseAmt(r[colMap.base0])),
      iva0:Math.abs(parseAmt(r[colMap.iva0])),
      retencion:parseAmt(r[colMap.retencion]),
      recargo:parseAmt(r[colMap.recargo]),
      total:parseAmt(r[colMap.total]),
      tipo:tipo==='auto'?(isEmitida?'emitida':'recibida'):tipo,
      isAbono:tipoDoc.indexOf('ABONO')>=0||numFact.toUpperCase().indexOf('AB-')===0||numFact.toUpperCase().indexOf('R-')===0||(parseAmt(r[colMap.total])<0)
    };
    // Calculate total if missing
    if(!fact.total||fact.total===0){
      fact.total=fact.base21+fact.iva21+fact.base10+fact.iva10+fact.base4+fact.iva4+fact.base0-Math.abs(fact.retencion||0);
    }
    fact.total=Math.abs(fact.total);
    // Skip facturas that don't match selected tipo - ONLY when tipo=auto
    if(tipo==='auto'){
      // In auto mode, skip based on tipoDoc column
      // (no filtering needed - all are included with correct tipo assigned)
    }
    facturas.push(fact);
  }

  // ═══ ANTI-DUPLICADOS ═══
  // Capa 1: Verificar contra TODOS los asientos del servidor (incluidos borrados)
  var existingNums={};
  try{
    var allEntries=await api('/api/entries/'+state.company.id+'?deleted=1');
    if(allEntries&&allEntries.length){
      allEntries.forEach(function(e){
        if(e.concept){
          var m=e.concept.match(/\[([^\]]+)\]/);
          if(m){existingNums[m[1]]=true;existingNums[m[1].toUpperCase()]=true;}
        }
      });
    }
  }catch(e){
    state.entries.forEach(function(e){
      if(e.concept){var m=e.concept.match(/\[([^\]]+)\]/);if(m){existingNums[m[1]]=true;existingNums[m[1].toUpperCase()]=true;}}
    });
  }

  // Capa 2: Deduplicar dentro del propio lote de importación (por nº factura)
  var seenInBatch={};
  
  // Capa 3: Comprobar facturas previamente excluidas/pendientes de revisión
  var excludedNums={};
  try{
    var excList=await api('/api/excluded-invoices/'+state.company.id);
    if(excList&&excList.length){
      excList.forEach(function(ex){
        if(ex.estado==='pendiente'){
          excludedNums[ex.num_factura]=ex;
          excludedNums[(ex.num_factura||'').toUpperCase()]=ex;
        }
      });
    }
  }catch(e){}
  
  // Capa 4: existentes en state.invoices (la propia tabla invoices, fuente única)
  var existingInInvoices={};
  (state.invoices||[]).forEach(function(inv){
    if(!inv||!inv.num_factura)return;
    var k=(inv.num_factura||'').toUpperCase()+'__'+(inv.tipo||'recibida');
    existingInInvoices[k]=true;
  });

  var nuevas=[],duplicadas=[];
  facturas.forEach(function(f){
    var numUpper=(f.numFact||'').toUpperCase();
    var key=numUpper+'_'+f.cif;
    var invKeyForCheck=numUpper+'__'+(f.tipo||'recibida');

    var isDup=false;
    var reason='';
    // Check Capa 1: servidor (nº factura exacto)
    if(existingNums[f.numFact]||existingNums[numUpper]){isDup=true;reason='ya contabilizada';}
    // Check Capa 2: mismo lote (nº factura exacto)
    if(!isDup&&(seenInBatch[f.numFact]||seenInBatch[numUpper])){isDup=true;reason='duplicada en lote';}
    // Check Capa 4: ya existe en tabla invoices (mismo num+tipo en empresa actual)
    if(!isDup&&existingInInvoices[invKeyForCheck]){isDup=true;reason='ya en tabla invoices';}
    // Check Capa 3: previamente excluida → marcar para aviso
    if(!isDup&&(excludedNums[f.numFact]||excludedNums[numUpper])){
      var exInfo=excludedNums[f.numFact]||excludedNums[numUpper];
      f._wasExcluded=true;
      f._excludedAt=exInfo.excluded_at;
      f._excludedBy=exInfo.excluded_by;
      f._excludedId=exInfo.id;
    }
    
    if(isDup){
      f._dupReason=reason;
      duplicadas.push(f);
    }else{
      nuevas.push(f);
      seenInBatch[f.numFact]=true;
      seenInBatch[numUpper]=true;
    }
  });

  // Show results
  showFacturasImportResult(nuevas,duplicadas,tipo,resumenIVA);
}

function showFacturasImportResult(nuevas,duplicadas,tipo,resumenIVA){
  window._lastResumenIVA=resumenIVA; // Save for post-contabilization test
  var res=$('impResult');if(!res)return;
  var totalNuevas=nuevas.reduce(function(s,f){return s+(f.isAbono?-f.total:f.total);},0);

  // ═══ TEST DE CUADRE CON GESTOR ═══
  var cuadreHTML='';
  var allFacturas=nuevas.concat(duplicadas); // ALL facturas from file
  var sumIva21=0,sumIva10=0,sumIva4=0,sumBase21=0,sumBase10=0,sumBase4=0,sumBase0=0,sumTotal=0,sumRecargo=0,sumRetencion=0;
  allFacturas.forEach(function(f){
    var sign=f.isAbono?-1:1;
    sumIva21+=f.iva21*sign;sumIva10+=f.iva10*sign;sumIva4+=f.iva4*sign;
    sumBase21+=f.base21*sign;sumBase10+=f.base10*sign;sumBase4+=f.base4*sign;sumBase0+=(f.base0||0)*sign;
    sumTotal+=f.total*sign;
    var rec=0;if(f.recargo&&f.recargo!==0){rec=f.recargo;}else{
      var bEx=Math.abs(f.base21)+Math.abs(f.base10)+Math.abs(f.base4)+Math.abs(f.base0||0);
      var iEx=Math.abs(f.iva21)+Math.abs(f.iva10)+Math.abs(f.iva4);
      var dRec=Math.abs(f.total)-bEx-iEx+(f.retencion?Math.abs(f.retencion):0)+(f.iva0&&f.iva0<0?Math.abs(f.iva0):0);
      if(dRec>0.01)rec=Math.round(dRec*100)/100;
    }
    sumRecargo+=rec;
    var ret=f.retencion||0;if(f.iva0&&f.iva0<0)ret=Math.abs(f.iva0);
    sumRetencion+=ret;
  });
  var sumIvaTotal=sumIva21+sumIva10+sumIva4;
  var sumBasesTotal=sumBase21+sumBase10+sumBase4+sumBase0;
  
  if(resumenIVA&&(resumenIVA.totalIVA||resumenIVA.totalFacturado)&&(tipo==='auto'||tipo==='todas')){
    // Full comparison against gestor Resumen IVA (only when importing ALL types)
    var checks=[];
    function chk(name,prog,gestor,tolerance){
      var diff=Math.abs(prog-gestor);
      var ok=diff<=(tolerance||0.05);
      checks.push({name:name,prog:prog,gestor:gestor,diff:diff,ok:ok});
    }
    if(resumenIVA.totalIVA)chk('Total IVA',sumIvaTotal,resumenIVA.totalIVA);
    if(resumenIVA.totalFacturado)chk('Total Facturado',sumTotal,resumenIVA.totalFacturado);
    if(resumenIVA.totalBases)chk('Total Bases',sumBasesTotal,resumenIVA.totalBases);
    if(resumenIVA.iva21)chk('IVA 21%',sumIva21,resumenIVA.iva21);
    if(resumenIVA.iva10)chk('IVA 10%',sumIva10,resumenIVA.iva10);
    if(resumenIVA.iva4)chk('IVA 4%',sumIva4,resumenIVA.iva4);
    if(resumenIVA.base21)chk('Base 21%',sumBase21,resumenIVA.base21);

    '</tbody></table></div>';
  }else{
    // When importing filtered (only recibidas or emitidas), show summary without gestor comparison
    cuadreHTML='<div style="margin-bottom:12px;border:2px solid var(--bl);border-radius:8px;overflow:hidden">'+
    '<div style="padding:8px 14px;background:#E8F0FE;font-weight:600;font-size:12px;color:var(--bl)">📊 Resumen del lote — '+(tipo==='recibida'?'Recibidas':'Emitidas')+'</div>'+
    '<table style="font-size:11px"><thead><tr><th>Concepto</th><th style="text-align:right">Importe</th></tr></thead><tbody>'+
    '<tr><td style="font-weight:600">Total IVA</td><td style="text-align:right">'+fmt(sumIvaTotal)+'€</td></tr>'+
    '<tr class="alt"><td style="font-weight:600">Total Facturado</td><td style="text-align:right">'+fmt(sumTotal)+'€</td></tr>'+
    '<tr><td style="font-weight:600">Total Bases</td><td style="text-align:right">'+fmt(sumBasesTotal)+'€</td></tr>'+
    (sumIva21?'<tr class="alt"><td>IVA 21%</td><td style="text-align:right">'+fmt(sumIva21)+'€</td></tr>':'')+
    (sumIva10?'<tr><td>IVA 10%</td><td style="text-align:right">'+fmt(sumIva10)+'€</td></tr>':'')+
    (sumIva4?'<tr class="alt"><td>IVA 4%</td><td style="text-align:right">'+fmt(sumIva4)+'€</td></tr>':'')+
    (sumRetencion?'<tr><td>Retenciones</td><td style="text-align:right">'+fmt(sumRetencion)+'€</td></tr>':'')+
    '</tbody></table></div>';
  }

  var numExcluded=nuevas.filter(function(f){return f._wasExcluded;}).length;
  var initialChecked=nuevas.length-numExcluded;
  var excWarning=numExcluded>0?'<div style="margin-top:8px;padding:10px;background:#FFF3E0;border-radius:6px;font-size:12px;color:#E65100;border:1px solid #FFB74D">⚠️ <b>'+numExcluded+' factura(s) previamente excluida(s)</b> — aparecen en amarillo y desmarcadas. Revísalas antes de contabilizar. <a href="#" onclick="setView(\'excluidas\');return false;" style="color:#E65100;font-weight:600">Ver todas →</a></div>':'';
  
  res.innerHTML='<div class="card" style="border:2px solid var(--pri)"><div class="card-h" style="background:var(--priLt)"><span style="color:var(--pri)">📋 Resultado importación — '+(tipo==='recibida'?'Facturas recibidas':(tipo==='auto'?'Facturas':'Facturas emitidas'))+'</span><div style="display:flex;gap:6px">'+(nuevas.length?'<button class="btn btn-d" onclick="clearImpResult()">Cancelar</button><button class="btn btn-p" style="font-size:13px;padding:8px 20px" id="btnContabilizar" onclick="contabilizarFacturas()">✓ Contabilizar '+initialChecked+' facturas</button>':'<button class="btn btn-d" onclick="clearImpResult()">Cerrar</button>')+'</div></div><div class="card-b">'+
  '<div class="row"><div class="stat"><div class="stat-v" style="color:var(--ok)">'+nuevas.length+'</div><div class="stat-l">Nuevas para importar</div></div><div class="stat"><div class="stat-v" style="color:var(--txM)">'+duplicadas.length+'</div><div class="stat-l">Duplicadas (saltadas)</div></div><div class="stat"><div class="stat-v" style="color:var(--bl)">'+fmt(totalNuevas)+'€</div><div class="stat-l">Importe total</div></div></div>'+
  excWarning+
  cuadreHTML+
  (nuevas.length?'<div class="scr" style="max-height:400px"><table><thead><tr><th style="width:30px"><input type="checkbox" checked onchange="toggleAllFacturas(this.checked)"></th><th>Nº Factura</th><th>Fecha</th><th>'+(tipo==='recibida'?'Proveedor':'Cliente')+'</th><th>CIF</th><th style="text-align:right">Base</th><th style="text-align:right">IVA</th><th style="text-align:right">Total</th><th>Tipo</th></tr></thead><tbody>'+

    var isExcluded=f._wasExcluded;
    var excDate=f._excludedAt?f._excludedAt.slice(0,10):'';
    var rowStyle=isExcluded?'background:#FFF3E0;border-left:3px solid #FF9800;':(f.isAbono?'color:var(--rd)':'');
    var checked=isExcluded?'':'checked';

    return '<tr class="'+(i%2?'alt':'')+'" style="'+rowStyle+'"><td><input type="checkbox" class="fact-chk" data-idx="'+i+'" '+checked+' onchange="updateContabilizarCount()"></td><td style="font-weight:600;font-size:10px">'+h(f.numFact)+excBadge+'</td><td style="font-size:10px">'+fmtD(f.fecha)+'</td><td style="font-size:11px">'+h(f.tercero)+'</td><td style="font-size:9px;color:var(--txM)">'+h(f.cif)+'</td><td style="text-align:right">'+fmt(realBase)+'€</td><td style="text-align:right">'+fmt(totalIva)+'€</td><td style="text-align:right;font-weight:700">'+fmt(f.total)+'€</td><td style="font-size:9px"><span class="badge '+(f.isAbono?'badge-r':(f.tipo==='emitida'?'badge-g':'badge-b'))+'">'+(f.isAbono?'Abono':(f.tipo==='emitida'?'Emitida':'Recibida'))+'</span></td></tr>';
  }).join('')+'</tbody></table></div>':'<div class="empty">No hay facturas nuevas para importar</div>')+
  (duplicadas.length?'<div style="margin-top:8px;padding:8px;background:#FFF8E1;border-radius:6px;font-size:11px;color:var(--am)">⚠ '+duplicadas.length+' facturas ya contabilizadas: '+duplicadas.map(function(f){return f.numFact;}).join(', ')+'</div>':'')+
  '</div></div>';

  // Store for contabilizar
  window._facturasToImport=nuevas;
  window._facturasType=tipo;
  window._facturasSkipped=duplicadas.length;
}

function clearImpResult(){
  // Before clearing, save any unchecked invoices as excluded
  saveUncheckedAsExcluded();
  var el=$('impResult');if(el)el.innerHTML='';window._impResultHTML=null;
}

async function saveUncheckedAsExcluded(){
  // Prevent saving if already saving
  if(window._savingExcluded)return;window._savingExcluded=true;setTimeout(function(){window._savingExcluded=false;},3000);
  var allFacturas=window._facturasToImport;
  var tipo=window._facturasType;
  if(!allFacturas||!allFacturas.length)return;
  var unchecked=[];
  document.querySelectorAll('.fact-chk').forEach(function(cb){
    if(!cb.checked){
      var idx=parseInt(cb.getAttribute('data-idx'));
      if(!isNaN(idx)&&allFacturas[idx])unchecked.push(allFacturas[idx]);
    }
  });
  if(!unchecked.length)return;
  var excData=unchecked.map(function(f){
    return {num_factura:f.numFact,fecha:f.fecha||'',tercero:f.tercero||'',cif:f.cif||'',base:Math.abs(f.base21+f.base10+f.base4+(f.base0||0)),iva:Math.abs(f.iva21+f.iva10+f.iva4),total:Math.abs(f.total),tipo:tipo==='recibida'?'recibida':'emitida'};
  });
  try{
    await api('/api/excluded-invoices/'+state.company.id,{method:'POST',body:{invoices:excData}});
    toast(unchecked.length+' factura(s) guardada(s) en Revisión (Fiscal → Revisión fact.)','ok');
  }catch(e){console.error('Error saving excluded:',e);}
}

}

async function contabilizarFacturas(){
  var allFacturas=window._facturasToImport;
  var tipo=window._facturasType;
  if(!allFacturas||!allFacturas.length){toast('No hay facturas','error');return;}
  
  // Filter only checked facturas
  var checkedIdxs={};
  document.querySelectorAll('.fact-chk:checked').forEach(function(cb){checkedIdxs[cb.getAttribute('data-idx')]=true;});
  var facturas=allFacturas.filter(function(f,i){return checkedIdxs[String(i)];});
  if(!facturas.length){toast('Selecciona al menos una factura','error');return;}

  // DIAGNOSTIC: verify IVA totals before contabilizing
  var diagIva=0,diagNoIva=[],diagDetails=[];
  facturas.forEach(function(f){
    var iva=f.iva21+f.iva10+f.iva4;
    diagIva+=iva;
    diagDetails.push(f.numFact+': iva21='+f.iva21+' iva10='+f.iva10+' iva4='+f.iva4+' total_iva='+iva.toFixed(2));
    if(Math.abs(iva)<0.01&&Math.abs(f.total)>1)diagNoIva.push(f.numFact+' (total='+f.total+', iva21='+f.iva21+', iva10='+f.iva10+')');
  });
  if(diagNoIva.length>5){
    console.warn('ALERTA: '+diagNoIva.length+' facturas sin IVA detectadas');
  }
  
  var invoicesToSave=[];

  // Show progress overlay
  var overlay=document.createElement('div');
  overlay.id='impProgress';
  overlay.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999';
  overlay.innerHTML='<div style="background:#fff;border-radius:12px;padding:30px 50px;text-align:center;box-shadow:0 8px 32px rgba(0,0,0,0.2)"><div style="font-size:28px;margin-bottom:10px">⏳</div><div style="font-size:16px;font-weight:700;margin-bottom:6px" id="impProgressTitle">Contabilizando facturas...</div><div style="font-size:13px;color:var(--txM)" id="impProgressDetail">Preparando...</div><div style="margin-top:12px;background:#E8E8E8;border-radius:6px;height:8px;overflow:hidden"><div id="impProgressBar" style="background:var(--pri);height:100%;width:0%;transition:width 0.3s;border-radius:6px"></div></div></div>';
  document.body.appendChild(overlay);

  function updateProgress(current,total,detail){
    var pct=Math.round(current/total*100);
    var bar=$('impProgressBar');if(bar)bar.style.width=pct+'%';
    var det=$('impProgressDetail');if(det)det.textContent=current+'/'+total+' — '+detail;
  }

  var created=0,provsCreated=0,clientsCreated=0;
  loadMasters();
  
  // Ensure recargo equivalencia account exists
  var has47200001=state.accounts.some(function(a){return a.code==='47200001';});
  if(!has47200001){
    try{await api('/api/accounts/'+state.company.id,{method:'POST',body:{code:'47200001',name:'HP Recargo equivalencia soportado',g:4,t:'A'}});}catch(e){}
    state.accounts.push({code:'47200001',name:'HP Recargo equivalencia soportado',g:4,t:'A'});
  }

  for(var fi=0;fi<facturas.length;fi++){
    var f=facturas[fi];
    updateProgress(fi+1,facturas.length,(f.isAbono?'Abono ':'Fra. ')+f.tercero);
    await new Promise(function(r){setTimeout(r,10)}); // Let UI update
    var lines=[];

    // Base 0% from gestor documental is NEVER a real additional base.
    // It's either a retention indicator or an informational duplicate.
    // We ignore it completely and trust the Total from Excel.
    var realRetencion=f.retencion||0;
    if(f.iva0&&f.iva0<0){
      // IVA 0% negative = this is IRPF retention amount
      realRetencion=Math.abs(f.iva0);
    }

    var totalIva=f.iva21+f.iva10+f.iva4;
    var recargoUsado=0;

    if(f.tipo==='recibida'){
      // FACTURA RECIBIDA: Gasto(D) + IVA soportado(D) + Proveedor(H) - Retención
      var cuentaGasto='60000000'; // Por defecto compras
      // If it's services, use 62X
      if(f.concepto&&f.concepto.toLowerCase().indexOf('asesor')>=0)cuentaGasto='62300000';

      // Calculate recargo: try explicit columns first, then derive from totals
      var recargoTotal=0;
      if(f.recargo&&f.recargo!==0){
        recargoTotal=f.recargo;
      }else{
        // Derive recargo from total: recargo = total - bases(21+10+4+0) - iva(21+10+4) + retención
        var basesExcel=Math.abs(f.base21)+Math.abs(f.base10)+Math.abs(f.base4)+Math.abs(f.base0||0);
        var ivaExcel=Math.abs(f.iva21)+Math.abs(f.iva10)+Math.abs(f.iva4);
        var derivedRecargo=Math.abs(f.total)-basesExcel-ivaExcel+Math.abs(realRetencion);
        if(derivedRecargo>0.01){
          recargoTotal=Math.round(derivedRecargo*100)/100;
        }
      }
      recargoUsado=recargoTotal;
      
      // Use REAL bases from Excel per IVA type instead of a single derived base
      var totalFactura=Math.abs(f.total);
      
      // Derive the real base from Total to ensure perfect balance
      var realBase=totalFactura-Math.abs(totalIva)-Math.abs(recargoTotal)+Math.abs(realRetencion);
      
      // Gasto = single derived base (guarantees balance with total)
      if(f.isAbono){
        lines.push({a:cuentaGasto,d:0,h:Math.abs(realBase)});
      }else{
        lines.push({a:cuentaGasto,d:Math.abs(realBase),h:0});
      }

      // IVA soportado — all types go to 47200000
      // For abonos: IVA goes to HABER (credit = reduces IVA soportado)
      if(f.isAbono){
        if(f.iva21!==0)lines.push({a:'47200000',d:0,h:Math.abs(f.iva21)});
        if(f.iva10!==0)lines.push({a:'47200000',d:0,h:Math.abs(f.iva10)});
        if(f.iva4!==0)lines.push({a:'47200000',d:0,h:Math.abs(f.iva4)});
      }else{
        if(f.iva21!==0)lines.push({a:'47200000',d:Math.abs(f.iva21),h:0});
        if(f.iva10!==0)lines.push({a:'47200000',d:Math.abs(f.iva10),h:0});
        if(f.iva4!==0)lines.push({a:'47200000',d:Math.abs(f.iva4),h:0});
      }
      // DIAGNOSTIC: check IVA lines exist
      var ivaLines47=lines.filter(function(l){return l.a==='47200000';});
      if(ivaLines47.length===0&&Math.abs(f.iva21+f.iva10+f.iva4)>0.01){
        console.error('FALTA IVA en '+f.numFact+': iva21='+f.iva21+' iva10='+f.iva10+' iva4='+f.iva4);
      }

      // Retención IRPF
      if(realRetencion!==0)lines.push({a:'47510000',d:0,h:Math.abs(realRetencion)});

      // Recargo equivalencia soportado = mayor gasto (NO es IVA deducible en régimen general)
      // Va a la misma cuenta de gasto, no a la 472
      if(recargoTotal!==0){
        if(f.isAbono){
          lines.push({a:cuentaGasto,d:0,h:Math.abs(recargoTotal)});
        }else{
          lines.push({a:cuentaGasto,d:Math.abs(recargoTotal),h:0});
        }
      }

      // ═══ ASIGNACIÓN DE PROVEEDOR — REESCRITA v9.0.6 ═══
      // 1. Determinar CIF real del proveedor (nunca usar CIF de la propia empresa)
      var ownCif=state.company.cif||'';
      var provCif=f.cif;
      if(!provCif||(ownCif&&provCif===ownCif)){
        var cifEmMatch=(f.concepto||'').match(/CIF Emisor:\s*\[([A-Z0-9]+)\]/i);
        if(cifEmMatch&&cifEmMatch[1]&&cifEmMatch[1]!==ownCif){provCif=cifEmMatch[1];}
        else{provCif='';}
        }
      // 2. Buscar proveedor: PRIMERO por nombre (fiable), luego por CIF (si no es propio)
      var provRecord=null;
      if(f.tercero){provRecord=masters.supplier.find(function(s){return s.name&&s.name.toUpperCase()===f.tercero.toUpperCase();});}
      if(!provRecord&&provCif){provRecord=masters.supplier.find(function(s){return s.cif&&s.cif===provCif;});}
      // 3. Crear nuevo si no existe
      if(!provRecord&&f.tercero){
        var provCode='P'+String(masters.supplier.length+1).padStart(3,'0');
        var formaPago='';if(f.concepto){var fpMatch=f.concepto.match(/Forma de pago:\s*([^|]+)/i);if(fpMatch)formaPago=fpMatch[1].trim();}
        var diasPago='';if(f.fecha&&f.vencimiento){var d1=new Date(f.fecha),d2=new Date(f.vencimiento);if(!isNaN(d1)&&!isNaN(d2)){diasPago=String(Math.round((d2-d1)/(1000*60*60*24)));}}
        var provAccount='4000'+String(masters.supplier.length+1).padStart(4,'0');
        provRecord={code:provCode,name:f.tercero,cif:provCif,address:'',cp:'',city:'',province:'',country:'ES',account:provAccount,payment:formaPago,days:diasPago,contact:'',phone:'',email:'',notes:'Auto-importado'};
        masters.supplier.push(provRecord);saveMasters('supplier');
        if(!state.accounts.some(function(a){return a.code===provAccount;})){
          try{api('/api/accounts/'+state.company.id,{method:'POST',body:{code:provAccount,name:f.tercero,g:4,t:'P'}});}catch(e){}
          state.accounts.push({code:provAccount,name:f.tercero,g:4,t:'P'});
        }
        provsCreated++;
      }else if(provRecord&&(provRecord.account==='40000000'||!provRecord.account)){
        var newProvAccount='4000'+String(masters.supplier.indexOf(provRecord)+1).padStart(4,'0');
        provRecord.account=newProvAccount;saveMasters('supplier');
        if(!state.accounts.some(function(a){return a.code===newProvAccount;})){
          try{api('/api/accounts/'+state.company.id,{method:'POST',body:{code:newProvAccount,name:provRecord.name,g:4,t:'P'}});}catch(e){}
          state.accounts.push({code:newProvAccount,name:provRecord.name,g:4,t:'P'});
        }
      }
      var cuentaProv=provRecord?provRecord.account:'40000000';

      // Proveedor (haber = lo que debemos) — Total from Excel, using individual account
      if(f.isAbono){
        lines.push({a:cuentaProv,d:totalFactura,h:0});
      }else{
        lines.push({a:cuentaProv,d:0,h:totalFactura});
      }

    }else{
      // FACTURA EMITIDA: Cliente(D) + Ingreso(H) + IVA repercutido(H)
      var totalIvaEm=f.iva21+f.iva10+f.iva4;
      var totalFacturaEm=Math.abs(f.total);
      var realBaseEm=totalFacturaEm-Math.abs(totalIvaEm);
      
      // Ingreso
      if(f.isAbono){
        lines.push({a:'70000000',d:Math.abs(realBaseEm),h:0});
      }else{
        lines.push({a:'70000000',d:0,h:Math.abs(realBaseEm)});
      }

      // IVA repercutido
      if(f.isAbono){
        if(f.iva21!==0)lines.push({a:'47700000',d:Math.abs(f.iva21),h:0});
        if(f.iva10!==0)lines.push({a:'47700000',d:Math.abs(f.iva10),h:0});
        if(f.iva4!==0)lines.push({a:'47700000',d:Math.abs(f.iva4),h:0});
      }else{
        if(f.iva21!==0)lines.push({a:'47700000',d:0,h:Math.abs(f.iva21)});
        if(f.iva10!==0)lines.push({a:'47700000',d:0,h:Math.abs(f.iva10)});
        if(f.iva4!==0)lines.push({a:'47700000',d:0,h:Math.abs(f.iva4)});
      }

      // Find or create client with individual account
      var clientName=f.empresa||f.tercero;
      var clientCif=f.cif;
      var cliRecord=masters.client.find(function(c2){return c2.cif===clientCif||(c2.name&&c2.name===clientName);});
      if(!cliRecord&&clientName){
        var cliCode='C'+String(masters.client.length+1).padStart(3,'0');
        var cliAccount='4300'+String(masters.client.length+1).padStart(4,'0');
        cliRecord={code:cliCode,name:clientName,cif:clientCif,address:'',cp:'',city:'',province:'',country:'ES',account:cliAccount,payment:'',days:'',contact:'',phone:'',email:'',notes:'Auto-importado desde gestor documental'};
        masters.client.push(cliRecord);
        saveMasters('client');
        if(!state.accounts.some(function(a){return a.code===cliAccount;})){
          try{api('/api/accounts/'+state.company.id,{method:'POST',body:{code:cliAccount,name:clientName,g:4,t:'A'}});}catch(e){}
          state.accounts.push({code:cliAccount,name:clientName,g:4,t:'A'});
        }
        clientsCreated++;
      }else if(cliRecord&&(cliRecord.account==='43000000'||!cliRecord.account)){
        var newCliAccount='4300'+String(masters.client.indexOf(cliRecord)+1).padStart(4,'0');
        cliRecord.account=newCliAccount;
        saveMasters('client');
        if(!state.accounts.some(function(a){return a.code===newCliAccount;})){
          try{api('/api/accounts/'+state.company.id,{method:'POST',body:{code:newCliAccount,name:cliRecord.name,g:4,t:'A'}});}catch(e){}
          state.accounts.push({code:newCliAccount,name:cliRecord.name,g:4,t:'A'});
        }
      }
      var cuentaCli=cliRecord?cliRecord.account:'43000000';

      // Cliente — using individual account
      if(f.isAbono){
        lines.push({a:cuentaCli,d:0,h:totalFacturaEm});
      }else{
        lines.push({a:cuentaCli,d:totalFacturaEm,h:0});
      }
    }

    // Consolidate lines with same account
    var consolidated={};
    lines.forEach(function(l){
      if(!consolidated[l.a])consolidated[l.a]={a:l.a,d:0,h:0};
      consolidated[l.a].d+=l.d;
      consolidated[l.a].h+=l.h;
    });
    var finalLines=Object.values(consolidated).filter(function(l){return l.d>0.001||l.h>0.001;});

    // Verify IVA in final lines
    var ivaInFinal=finalLines.filter(function(l){return l.a==='47200000'||l.a.startsWith('477');});
    var ivaDebe=0,ivaHaber=0;
    ivaInFinal.forEach(function(l){ivaDebe+=l.d;ivaHaber+=l.h;});
    if(Math.abs(f.iva21+f.iva10+f.iva4)>0.01&&ivaInFinal.length===0){
      console.error('ERROR: IVA PERDIDO en '+f.numFact+': iva21='+f.iva21+' iva10='+f.iva10+' iva4='+f.iva4+' pero 0 líneas 47200000 en finalLines');
    }

    // Round to 2 decimals
    finalLines.forEach(function(l){l.d=Math.round(l.d*100)/100;l.h=Math.round(l.h*100)/100;});

    // Verify balance
    var tD=finalLines.reduce(function(s,l){return s+l.d;},0);
    var tH=finalLines.reduce(function(s,l){return s+l.h;},0);
    if(Math.abs(tD-tH)>0.02){
      console.log('Descuadre en factura '+f.numFact+': D='+tD+' H='+tH+' diff='+(tD-tH));
      // Auto-fix rounding: adjust largest line
      var diff=Math.round((tD-tH)*100)/100;
      if(Math.abs(diff)<=0.02){
        var maxLine=finalLines.reduce(function(a,b){return (a.d+a.h)>(b.d+b.h)?a:b;});
        if(diff>0)maxLine.h+=diff; else maxLine.d+=(-diff);
      }
    }

    var invKey=invoiceKey(state.company.id,f.tipo||'recibida',f.numFact);
    var entryId=(f.tipo==='recibida'?'fr_':'fe_')+invKey;
    var conceptStr=(f.isAbono?'Abono ':'Fra. ')+h(f.tercero)+' ['+f.numFact+']';
    // Add meta to first line with complete invoice data
    var metaObj={numFactura:f.numFact,tercero:f.tercero,cif:provCif||f.cif,tipoFactura:f.tipo||'recibida',isAbono:!!f.isAbono,base21:f.base21||0,iva21:f.iva21||0,base10:f.base10||0,iva10:f.iva10||0,base4:f.base4||0,iva4:f.iva4||0,base0:f.base0||0,retencion:f.retencion||0,recargo:f.recargo||0,totalFactura:f.total||0};
    if(finalLines.length>0)finalLines[0].meta=JSON.stringify(metaObj);
    await api('/api/entries/'+state.company.id,{method:'POST',body:{
      id:entryId,
      date:f.fecha,
      concept:conceptStr,
      type:'import_factura',
      lines:finalLines
    }});
    
    // ═══ GUARDAR EN TABLA INVOICES (fuente única de verdad) ═══
    invoicesToSave.push({
      id:'inv_'+invKey,
      num_factura:f.numFact,
      fecha:f.fecha,
      tipo:f.tipo||'recibida',
      is_abono:!!f.isAbono,
      tercero_nombre:f.tercero,
      tercero_cif:provCif||f.cif||'',
      tercero_cuenta:cuentaProv||'',
      base21:f.base21||0, iva21:f.iva21||0,
      base10:f.base10||0, iva10:f.iva10||0,
      base4:f.base4||0, iva4:f.iva4||0,
      base0:f.base0||0,
      retencion:f.retencion||0,
      recargo:recargoUsado||f.recargo||0,
      total:f.total||0,
      forma_pago:f.formaPago||'',
      fecha_vencimiento:f.vencimiento||'',
      concepto_gestor:f.concepto||'',
      entry_id:entryId
    });
    created++;
  }

  // Save all invoices to DB in batch
  if(invoicesToSave.length>0){
    try{await api('/api/invoices/'+state.company.id,{method:'POST',body:{invoices:invoicesToSave}});}
    catch(e){console.error('Error saving invoices:',e);}
  }
  
  await loadData();await loadInvoices();checkIntegrity();
  // Remove progress overlay
  var ov=$('impProgress');if(ov)ov.remove();
  auditLog('importar_facturas',tipo+': '+created+' facturas');
  
  // ═══ TEST POST-CONTABILIZACIÓN ═══
  // Verify totals match the gestor if we have resumenIVA
  var postTestMsg='';
  if(window._lastResumenIVA){
    var ri=window._lastResumenIVA;
    var postIvaSop=0,postIvaRep=0;
    state.entries.forEach(function(e){
      e.lines.forEach(function(l){
        if(l.a==='47200000')postIvaSop+=l.d-l.h;
        if(l.a&&l.a.startsWith('477'))postIvaRep+=l.h-l.d;
      });
    });
    postIvaSop=Math.round(postIvaSop*100)/100;
    if(ri.totalIVA&&Math.abs(postIvaSop-ri.totalIVA)>0.05){
      postTestMsg='\n\n⚠️ ALERTA: IVA Soportado post-contabilización ('+fmt(postIvaSop)+'€) NO cuadra con gestor ('+fmt(ri.totalIVA)+'€). Diferencia: '+fmt(Math.abs(postIvaSop-ri.totalIVA))+'€. Revisa antes de continuar.';
    }
    var numAsientos=state.entries.length;
    if(ri.totalIVA&&Math.abs(postIvaSop-ri.totalIVA)<0.05){
      postTestMsg='\n\n✅ IVA verificado post-contabilización: '+fmt(postIvaSop)+'€ = gestor '+fmt(ri.totalIVA)+'€';
    }
  }
  
  var msg='✓ '+created+' facturas contabilizadas';
  if(provsCreated>0)msg+=' · '+provsCreated+' proveedores nuevos';
  if(clientsCreated>0)msg+=' · '+clientsCreated+' clientes nuevos';
  if(window._facturasSkipped&&window._facturasSkipped>0)msg+=' · '+window._facturasSkipped+' duplicadas saltadas';
  if(postTestMsg)msg+=postTestMsg;
  
  // Save excluded (unchecked) invoices for review
  await saveUncheckedAsExcluded();
  
  toast(msg,postTestMsg&&postTestMsg.indexOf('ALERTA')>=0?'error':'ok');
  render();
}

function parseDate(s){
  if(!s)return '';s=String(s).trim();
  var m;
  if(m=s.match(/^(\d{4})-(\d{2})-(\d{2})/))return s.slice(0,10);
  if(m=s.match(/^(\d{2})[\/\-](\d{2})[\/\-](\d{4})/))return m[3]+'-'+m[2]+'-'+m[1];
  if(m=s.match(/^(\d{2})[\/\-](\d{2})[\/\-](\d{2})/))return '20'+m[3]+'-'+m[2]+'-'+m[1];
  // Excel serial number
  var num=parseFloat(s);if(num>30000&&num<60000){var d=new Date((num-25569)*86400000);return d.toISOString().slice(0,10);}
  return '';
}

function processN43(text){
  var lines=text.split('\n');var txns=[];
  lines.forEach(function(line){
    if(line.substring(0,2)==='22'){
      var y='20'+line.substring(10,12);var m=line.substring(12,14);var d=line.substring(14,16);
      var amt=parseInt(line.substring(28,42))||0;amt=amt/100;
      var sign=line.substring(27,28);if(sign==='1')amt=-amt;
      var concept=line.substring(52).trim();
      txns.push({date:y+'-'+m+'-'+d,concept:concept,amount:amt});
    }
  });
  showImportResults(txns);
}

// Normaliza un código de cuenta a 8 dígitos. Con punto (prefijo.sufijo) rellena el sufijo
// con ceros a la IZQUIERDA (555.1 → 55500001); sin punto rellena a la DERECHA (555 → 55500000).
function normAccountCode(raw){
  raw=String(raw||'');var dot=raw.indexOf('.');
  if(dot>=0){
    var pre=raw.slice(0,dot).replace(/[^0-9]/g,'');
    var suf=raw.slice(dot+1).replace(/[^0-9]/g,'');
    if(!pre)return '';
    if(pre.length>8)pre=pre.slice(0,8);
    var rem=8-pre.length;
    if(rem<=0)return pre;
    if(suf.length>rem)suf=suf.slice(suf.length-rem);
    return pre+('00000000'+suf).slice(-rem);
  }
  var d=raw.replace(/[^0-9]/g,'');
  if(!d)return '';
  if(d.length>8)d=d.slice(0,8);
  if(d.length<8)d=d+('00000000').slice(d.length);
  return d;
}

// Siguiente código LIBRE dentro de un grupo (prefijo: 400 proveedores, 410 acreedores, 430
// clientes…). Ej: si existen 40000000 y 40000001 → devuelve 40000002.
function nextFreeAccountCode(prefix){
  prefix=String(prefix||'').replace(/[^0-9]/g,'').slice(0,7)||'400';
  var width=8-prefix.length;if(width<1)return prefix.slice(0,8);
  var max=0;
  (state.accounts||[]).forEach(function(a){var c=String(a.code||'');if(c.length===8&&c.indexOf(prefix)===0){var n=parseInt(c.slice(prefix.length),10);if(!isNaN(n)&&n>max)max=n;}});
  var nx=String(max+1);while(nx.length<width)nx='0'+nx;
  return prefix+nx.slice(-width);
}
// ¿Es una cuenta de tercero GENÉRICA (no el tercero concreto)? Para invitar a crear el específico.
function esCuentaGenerica(c){return c==='40000000'||c==='41000000'||c==='43000000'||c==='44000000';}
// Nombre legible de un tercero a partir del concepto bancario.
function _tituloTercero(s){var t=_normConcepto(s).replace(/\b\d+\b/g,' ').replace(/\s+/g,' ').trim();return t.slice(0,40);}

// Reaplica reglas a TODO lo importado (botón): aprende en memoria de las filas que ya tienen
// una cuenta válida asignada (por beneficiario, igual que aprenderReglaBanco) y rellena las que
// siguen en 555/vacío. NO pisa las filas que ya tengan cuenta asignada.
function impReaplicar(){
  var txns=window._impTxns||[];
  if(!txns.length){toast('No hay movimientos','error');return;}
  var aprendidas=[];
  for(var i=0;i<txns.length;i++){
    var inp=document.getElementById('impAcct'+i);if(!inp)continue;
    var c=normAccountCode(inp.value);
    if(!c||c==='55500000'||!window._accIndex[c])continue; // solo aprende de cuentas que existen
    var bn=_normNombreTercero(txns[i].beneficiario||'');
    var pat=(bn&&bn.length>=4)?bn:_tokenConcepto(txns[i].concept||''); // beneficiario o, si falta, token del concepto
    if(pat&&pat.length>=4){
      var re=pat.replace(/[.*+?^${}()|[\]\\]/g,'\\$&');
      if(!aprendidas.some(function(r){return r.re===re&&r.cuenta===c;}))aprendidas.push({re:re,cuenta:c});
    }
  }
  var cambn=0;
  for(var j=0;j<txns.length;j++){
    var inj=document.getElementById('impAcct'+j);if(!inj)continue;
    var cj=normAccountCode(inj.value);
    if(cj&&cj!=='55500000')continue; // ya tiene cuenta asignada (aunque sea nueva) → no la pisamos
    var hay=((txns[j].beneficiario||'')+' '+(txns[j].concept||'')).trim();
    var hayN=_normConcepto(hay);
    var dest='';
    for(var k=0;k<aprendidas.length;k++){try{var rk=new RegExp(aprendidas[k].re,'i');if(rk.test(hay)||rk.test(hayN)){dest=aprendidas[k].cuenta;break;}}catch(e){}}
    if(!dest){
      var prop=proponerContrapartida(txns[j].concept,txns[j].beneficiario,txns[j].amount);
      if(prop&&prop.cuenta&&prop.cuenta!=='55500000'&&window._accIndex[prop.cuenta])dest=prop.cuenta;
    }
    if(dest&&window._accIndex[dest]){
      inj.value=dest;
      var sp=document.getElementById('impAcctN'+j);if(sp)sp.textContent=(window._accIndex[dest]||'');
      var b=document.getElementById('impNew'+j);if(b)b.style.display='none';
      txns[j].cuenta=dest;cambn++;
    }
  }
  toast(cambn?('🔁 Reaplicado: '+cambn+' filas actualizadas'):'No hay más filas donde aplicar esas reglas');
}

}

async function importAll(){
  var txns=window._impTxns;if(!txns)return;
  // Asegurar la cuenta de contrapartida 555 (Partidas pendientes de aplicación)
  if(!state.accounts.some(function(a){return a.code==='55500000';})){
    try{await api('/api/accounts/'+state.company.id,{method:'POST',body:{code:'55500000',name:'Partidas pendientes de aplicación',g:5,t:'P'}});await loadData();}catch(e){}
  }
  var count=0,aprendidas=0,porAprender=[];
  for(var i=0;i<txns.length;i++){
    var ck=$('impCk'+i);if(!ck||!ck.checked)continue;
    var t=txns[i];var absAmt=Math.abs(t.amount);
    if(absAmt<0.005)continue;
    // Contrapartida = la cuenta editada por el usuario (o la propuesta). Si no existe → 555.
    var inp=$('impAcct'+i);
    var cuenta=inp?normAccountCode(inp.value):(t.cuenta||'55500000');
    if(!cuenta||!state.accounts.some(function(a){return a.code===cuenta;}))cuenta='55500000';
    // Un movimiento bancario = un asiento de 2 líneas. SIN IVA. Banco (572) ↔ contrapartida.
    var lines;
    if(t.amount<0){
      // Cargo (salida de dinero): banco al Haber, contrapartida al Debe
      lines=[{a:cuenta,d:absAmt,h:0},{a:'57200000',d:0,h:absAmt}];
    }else{
      // Ingreso (entrada de dinero): banco al Debe, contrapartida al Haber
      lines=[{a:'57200000',d:absAmt,h:0},{a:cuenta,d:0,h:absAmt}];
    }
    // id determinista (huella del movimiento) → INSERT OR REPLACE en servidor evita duplicar
    await api('/api/entries/'+state.company.id,{method:'POST',body:{id:t.entryId||('imp_'+uid()),date:t.date,concept:t.concept,type:'import',lines:lines}});
    count++;
    // Aprender: si el usuario asignó/corrigió una cuenta, recordarla (por beneficiario o concepto)
    if(cuenta!=='55500000'&&(t.motivo==='Pendiente'||cuenta!==t.cuenta))porAprender.push([t.beneficiario||'',cuenta,t.concept]);
  }
  for(var k=0;k<porAprender.length;k++){await aprenderReglaBanco(porAprender[k][0],porAprender[k][1],porAprender[k][2]);aprendidas++;}
  await loadData();checkIntegrity();toast(count+' movimientos contabilizados'+(aprendidas?' · '+aprendidas+' reglas aprendidas':''));render();
}

// ═══ IMPORTAR ASIENTOS CONTABLES (Nº Asiento · Fecha · Cuenta · Descripción · Debe · Haber) ═══
function processAsientosFile(file){
  if(!file){toast('Selecciona un archivo','error');return;}
  var ext=file.name.split('.').pop().toLowerCase();
  var reader=new FileReader();
  if(ext==='csv'){
    reader.onload=function(e){
      var sep=e.target.result.indexOf(';')>=0?';':',';
      var rows=e.target.result.trim().split('\n').map(function(l){return l.split(sep);});
      processAsientosRows(rows);
    };reader.readAsText(file);
  }else{
    reader.onload=function(e){
      var data=new Uint8Array(e.target.result);var wb=XLSX.read(data,{type:'array'});
      var ws=wb.Sheets[wb.SheetNames[0]];
      // Read raw cell values directly to avoid formatting issues
      var range=XLSX.utils.decode_range(ws['!ref']);
      var rows=[];
      for(var R=range.s.r;R<=range.e.r;R++){
        var row=[];
        for(var C=range.s.c;C<=range.e.c;C++){
          var cell=ws[XLSX.utils.encode_cell({r:R,c:C})];
          row.push(cell?cell.v:undefined);
        }
        rows.push(row);
      }
      processAsientosRows(rows);
    };reader.readAsArrayBuffer(file);
  }
}

function processAsientosPaste(){
  var txt=$('impPasteAsientos').value;if(!txt.trim()){toast('Pega datos primero','error');return;}
  var rows=txt.trim().split('\n').map(function(line){return line.split('\t');});
  processAsientosRows(rows);
}

function parseAsientoAmount(val){
  if(typeof val==='number')return val;
  var s=String(val||'').replace(/[€$\s]/g,'');
  if(!s)return 0;
  if(s.indexOf(',')>=0&&s.indexOf('.')<s.indexOf(','))s=s.replace(/\./g,'').replace(',','.');
  return parseFloat(s)||0;
}

function processAsientosRows(rows){
  if(rows.length<2){toast('Sin datos','error');return;}
  var headerIdx=0;
  for(var hi=0;hi<Math.min(rows.length,5);hi++){
    var joined=(rows[hi]||[]).join(' ').toLowerCase();
    if(joined.indexOf('cuenta')>=0||joined.indexOf('debe')>=0||joined.indexOf('haber')>=0){headerIdx=hi;break;}
  }
  var header=rows[headerIdx].map(function(c){return String(c||'').toLowerCase().trim();});
  var nI=-1,dI=-1,cI=-1,descI=-1,debeI=-1,haberI=-1;
  for(var ci=0;ci<header.length;ci++){
    var hc=header[ci];
    if(nI<0&&(hc.match(/asiento|nº|num|entry/)))nI=ci;
    if(dI<0&&(hc.match(/fecha|date/)))dI=ci;
    if(cI<0&&(hc.match(/cuenta|account|code/)))cI=ci;
    if(descI<0&&(hc.match(/desc|concepto|concept|detalle/)))descI=ci;
    if(debeI<0&&(hc.match(/^debe$|^debit$|^cargo$/)))debeI=ci;
    if(haberI<0&&(hc.match(/^haber$|^credit$|^abono$/)))haberI=ci;
  }
  // Salvavidas: si parece un EXTRACTO BANCARIO (tiene Importe/Saldo y NO columnas Debe+Haber
  // ni Cuenta), no es un fichero de asientos → avisar y no crear un asiento gigante descuadrado.
  var headerJoin=header.join(' ');
  var pareceExtracto=(/importe/.test(headerJoin)||/saldo/.test(headerJoin))&&debeI<0&&haberI<0&&cI<0;
  if(pareceExtracto){
    toast('Esto parece un EXTRACTO BANCARIO, no asientos. Súbelo en la caja "Extracto bancario" para crear un asiento por movimiento.','error');
    return;
  }
  if(nI<0)nI=0;if(dI<0)dI=1;if(cI<0)cI=2;if(descI<0)descI=3;
  if(debeI<0)debeI=4;if(haberI<0)haberI=5;

  var asientosMap={};var order=[];
  for(var i=headerIdx+1;i<rows.length;i++){
    var r=rows[i];if(!r||r.length<3)continue;
    var numAsi=String(r[nI]||'').trim();
    var fechaRaw=String(r[dI]||'').trim();
    var cuenta=String(r[cI]||'').trim();
    var desc=String(r[descI]||'').trim();
    var debe=parseAsientoAmount(r[debeI]);
    var haber=parseAsientoAmount(r[haberI]);
    if(!cuenta&&!debe&&!haber)continue;
    if(!numAsi&&order.length>0)numAsi=order[order.length-1];
    var dateStr=parseDate(fechaRaw);
    if(!dateStr&&asientosMap[numAsi])dateStr=asientosMap[numAsi].date;
    if(!asientosMap[numAsi]){asientosMap[numAsi]={num:numAsi,date:dateStr,lines:[],descs:[]};order.push(numAsi);}
    if(dateStr&&!asientosMap[numAsi].date)asientosMap[numAsi].date=dateStr;
    asientosMap[numAsi].lines.push({a:cuenta,d:debe,h:haber});
    if(desc)asientosMap[numAsi].descs.push(desc);
  }

  var asientos=order.map(function(k){
    var a=asientosMap[k];
    var totalD=0,totalH=0;
    a.lines.forEach(function(l){totalD+=l.d;totalH+=l.h;});
    var cuadra=Math.abs(totalD-totalH)<0.01;
    return {num:a.num,date:a.date||today(),concept:a.descs[0]||'Asiento importado',lines:a.lines,totalD:totalD,totalH:totalH,cuadra:cuadra,descs:a.descs};
  });

  var cuentasNeeded={};
  asientos.forEach(function(a){a.lines.forEach(function(l){if(l.a&&!cuentasNeeded[l.a])cuentasNeeded[l.a]={code:l.a,desc:''};});});
  asientos.forEach(function(a){a.lines.forEach(function(l){if(l.a){var d=a.descs.find(function(dd){return dd;});if(d&&!cuentasNeeded[l.a].desc)cuentasNeeded[l.a].desc=d;}});});

  var existingAccts={};
  state.accounts.forEach(function(ac){existingAccts[ac.code]=ac;});
  var newAccts=[];
  Object.values(cuentasNeeded).forEach(function(cn){if(!existingAccts[cn.code])newAccts.push(cn);});

  window._impAsientos=asientos;
  window._impNewAccts=newAccts;

  var nOk=asientos.filter(function(a){return a.cuadra;}).length;
  var nErr=asientos.length-nOk;
  var totalD=0,totalH=0;
  asientos.forEach(function(a){totalD+=a.totalD;totalH+=a.totalH;});

  var res=$('impAsientosResult');
  res.innerHTML='<div class="card" style="border:2px solid #7B1FA2;margin-top:14px"><div class="card-h" style="background:#F3E5F5"><span style="color:#7B1FA2">📒 '+asientos.length+' asientos · '+asientos.reduce(function(s,a){return s+a.lines.length;},0)+' apuntes</span><div>'+
  (nErr?'<span class="badge badge-a" style="margin-right:8px">⚠ '+nErr+' descuadrados</span>':'')+
  '<button class="btn btn-d" onclick="$(\'impAsientosResult\').innerHTML=\'\'" style="margin-right:6px">✕ Cancelar</button>'+
  '<button class="btn" style="background:#7B1FA2;color:#fff" onclick="importAsientosAll()">✅ Contabilizar '+nOk+' asientos</button></div></div>'+
  '<div style="padding:10px;font-size:11px;display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px">'+
  '<div><strong>Total Debe:</strong> '+fmt(totalD)+'€</div>'+
  '<div><strong>Total Haber:</strong> '+fmt(totalH)+'€</div>'+
  '<div><strong>Diferencia:</strong> <span style="color:'+(Math.abs(totalD-totalH)<0.01?'var(--ok)':'var(--err)')+'">'+fmt(totalD-totalH)+'€</span></div>'+
  '<div><strong>Cuentas nuevas:</strong> <span style="color:'+(newAccts.length?'#7B1FA2':'var(--ok)')+'">'+newAccts.length+'</span></div></div>'+
  (newAccts.length?'<div style="padding:0 10px 10px;font-size:10px;color:var(--txM)">Se crearán automáticamente: '+newAccts.map(function(a){return a.code;}).join(', ')+'</div>':'')+
  '<div class="scr" style="max-height:400px"><table><thead><tr><th>Nº</th><th>Fecha</th><th>Concepto</th><th>Líneas</th><th style="text-align:right">Debe</th><th style="text-align:right">Haber</th><th>Estado</th></tr></thead><tbody>'+
  asientos.map(function(a){
    var cls=a.cuadra?'':'background:#FFEBEE';
    return '<tr style="'+cls+'"><td>'+h(a.num)+'</td><td style="font-size:10px">'+fmtD(a.date)+'</td><td style="font-size:10px">'+h(a.concept.substring(0,40))+'</td><td style="text-align:center">'+a.lines.length+'</td><td style="text-align:right">'+fmt(a.totalD)+'€</td><td style="text-align:right">'+fmt(a.totalH)+'€</td><td>'+(a.cuadra?'<span class="badge badge-g">✓ Cuadra</span>':'<span class="badge badge-a">⚠ '+fmt(a.totalD-a.totalH)+'€</span>')+'</td></tr>';
  }).join('')+'</tbody></table></div></div>';
}

async function importAsientosAll(){
  var asientos=window._impAsientos;if(!asientos)return;
  var newAccts=window._impNewAccts||[];
  var cid=state.company.id;
  
  // Show progress modal

  modal.id='modalOverlay';modal.style.cssText='position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;z-index:9999';
  modal.innerHTML='<div style="background:#fff;border-radius:12px;padding:30px;text-align:center;min-width:400px"><div style="font-size:32px">⏳</div><div style="font-weight:700;font-size:16px;margin:12px 0" id="progTitle">Contabilizando asientos...</div><div style="font-size:12px;color:var(--txM);margin:8px 0" id="progDetail">Preparando...</div><div style="background:#E0E0E0;border-radius:6px;height:8px;margin:16px 0;overflow:hidden"><div id="progBar" style="height:100%;background:var(--pri);border-radius:6px;width:0%;transition:width 0.3s"></div></div><div style="font-size:11px;color:var(--txM)" id="progCount">0 / '+total+'</div></div>';
  document.body.appendChild(modal);
  function updateProg(msg){done++;$('progBar').style.width=Math.round(done/total*100)+'%';$('progDetail').textContent=msg;$('progCount').textContent=done+' / '+total;}
  
  // 1. Create missing accounts
  for(var j=0;j<newAccts.length;j++){
    var na=newAccts[j];
    var g=parseInt(na.code[0])||0;
    var name=na.desc||'Cuenta '+na.code;
    var t='gasto';
    if(g<=2||g===3||g===5)t='activo';
    if(g===4){var c3=na.code.substring(0,3);if(c3==='400')t='proveedor';else if(c3==='430')t='cliente';else t='gasto';}

    if(!/^\d{1,8}$/.test(na.code)){

      continue;
    }
    try{await api('/api/accounts/'+cid,{method:'POST',body:{code:na.code,name:name,g:g,t:t}});}catch(e){}
    updateProg('Cuenta '+na.code);
  }
  
  // 2. Import entries (only balanced ones)
  $('progTitle').textContent='Contabilizando asientos...';
  var count=0,skipped=0;
  for(var i=0;i<asientos.length;i++){
    var a=asientos[i];
    if(!a.cuadra){skipped++;continue;}
    var concept=a.descs.join(' / ').substring(0,120)||'Asiento '+a.num;
    await api('/api/entries/'+cid,{method:'POST',body:{id:'asi_'+uid(),date:a.date,concept:concept,type:'import_asiento',lines:a.lines}});
    count++;
    updateProg('Asiento '+a.num+' — '+concept.substring(0,40));
  }
  
  document.body.removeChild(modal);
  await loadData();checkIntegrity();
  toast(count+' asientos contabilizados'+(skipped?' ('+skipped+' descuadrados omitidos)':''));
  render();
}

// ═══ PREVISIÓN DE TESORERÍA (editable) ═══
var prevLines=[];
function loadPrevLines(){try{prevLines=JSON.parse(localStorage.getItem('cf_prev_'+(state.company?state.company.id:''))||'[]');}catch(e){prevLines=[];}}
function savePrevLines(){try{localStorage.setItem('cf_prev_'+(state.company?state.company.id:''),JSON.stringify(prevLines));}catch(e){}}

function renderPrevision(c){
  loadPrevLines();
  // Auto-import pending items from accounting
  var all=state.entries.filter(function(e){return e.date&&e.date.startsWith(String(state.ejercicio));});
  var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  // Current bank balance
  var saldoActual=0;
  all.forEach(function(e){e.lines.forEach(function(l){if(l.a&&(l.a.startsWith('572')||l.a.startsWith('570')))saldoActual+=l.d-l.h;});});

  // Calculate running balance
  var sorted=prevLines.slice().sort(function(a,b){return (a.date||'').localeCompare(b.date||'');});

  sorted.forEach(function(l){l._saldo=saldo+(l.ingreso||0)-(l.gasto||0);saldo=l._saldo;});

  c.innerHTML='<div class="card"><div class="card-h"><span>📊 Previsión de tesorería</span><div style="display:flex;gap:4px"><button class="btn btn-p" onclick="addPrevLine()">+ Línea</button><button class="btn btn-d" style="font-size:10px" onclick="importPrevFromAccounting()">📥 Importar pendientes</button><button class="btn btn-d" style="font-size:10px" onclick="exportPrevExcel()">📊 Excel</button></div></div>'+

  '<div class="scr" style="max-height:500px"><table><thead><tr><th style="width:100px">Fecha</th><th style="width:150px">Cliente/Proveedor</th><th>Descripción</th><th style="width:80px">Tipo</th><th style="text-align:right;width:100px">Ingreso</th><th style="text-align:right;width:100px">Gasto</th><th style="text-align:right;width:110px">Saldo</th><th style="width:50px">Acc.</th></tr></thead><tbody>'+
  '<tr style="background:var(--priLt);font-weight:700"><td colspan="4">SALDO INICIAL</td><td></td><td></td><td style="text-align:right;color:var(--bl)">'+fmt(saldoActual)+'€</td><td></td></tr>'+

    '<td><input class="inp" style="font-size:10px;padding:3px 5px;text-align:right;color:var(--ok)" value="'+(l.ingreso||'')+'" onchange="updatePrevLine('+idx+',\'ingreso\',parseFloat(this.value)||0)" placeholder="0"></td>'+

}

function addPrevLine(){
  loadPrevLines();
  prevLines.push({date:today(),tercero:'',desc:'',tipo:'pago',ingreso:0,gasto:0});
  savePrevLines();render();
}
function updatePrevLine(idx,field,val){
  loadPrevLines();
  if(prevLines[idx])prevLines[idx][field]=val;
  savePrevLines();render();
}
function deletePrevLine(idx){
  loadPrevLines();prevLines.splice(idx,1);savePrevLines();render();
}
function importPrevFromAccounting(){
  loadPrevLines();
  var all=state.entries.filter(function(e){return e.date&&e.date.startsWith(String(state.ejercicio));});
  var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  // Find pending receivables (430 with debit balance)
  var clientSaldos={};
  all.forEach(function(e){e.lines.forEach(function(l){
    if(l.a&&l.a.startsWith('430')){if(!clientSaldos[e.concept])clientSaldos[e.concept]=0;clientSaldos[e.concept]+=l.d-l.h;}
  });});
  // Find pending payables (400, 410 with credit balance)
  var provSaldos={};
  all.forEach(function(e){e.lines.forEach(function(l){
    if(l.a&&(l.a.startsWith('400')||l.a.startsWith('410'))){if(!provSaldos[e.concept])provSaldos[e.concept]=0;provSaldos[e.concept]+=l.h-l.d;}
  });});
  // Check existing lines to avoid duplicates
  var existingKeys={};
  prevLines.forEach(function(pl){existingKeys[pl.desc+'_'+pl.tipo]=true;});
  var added=0;
  Object.entries(clientSaldos).forEach(function(x){
    if(x[1]>1 && !existingKeys[x[0]+'_cobro']){prevLines.push({date:today(),tercero:'Cliente',desc:x[0],tipo:'cobro',ingreso:Math.round(x[1]*100)/100,gasto:0});added++;}
  });
  Object.entries(provSaldos).forEach(function(x){
    if(x[1]>1 && !existingKeys[x[0]+'_pago']){prevLines.push({date:today(),tercero:'Proveedor',desc:x[0],tipo:'pago',ingreso:0,gasto:Math.round(x[1]*100)/100});added++;}
  });
  savePrevLines();
  toast(added>0?added+' líneas importadas de pendientes':'Ya están todos los pendientes importados');
  render();
}

// ═══ MODELO 303 — IVA TRIMESTRAL ═══
function renderModelo303(c){
  // ═══ MODELO 303 v10.8 — IVA contabilizado (cuentas 477/472) ═══
  // El IVA repercutido/soportado y el resultado se calculan desde las cuentas 477 y 472
  // (todo el IVA devengado/deducible contabilizado), igual que el Panel y el Test 10 de
  // cuadre fiscal. Antes se calculaba sólo desde la tabla de facturas y dejaba fuera el
  // IVA soportado de gastos, leasing e inmovilizado (asientos sin factura registrada),
  // por eso el resultado discrepaba del Panel. El desglose por tipo (21/10/4) y las bases
  // se siguen tomando de las facturas registradas, con una línea de conciliación para el
  // IVA contabilizado sin factura.
  var trimLabels=['1T (Ene-Mar)','2T (Abr-Jun)','3T (Jul-Sep)','4T (Oct-Dic)'];
  var trimKeys=['1T','2T','3T','4T'];
  var ejStr=String(state.ejercicio);
  var qKey=function(fecha){var m=parseInt(fecha.substring(5,7));return m<=3?'1T':m<=6?'2T':m<=9?'3T':'4T';};
  // IVA contabilizado por trimestre desde las cuentas 477 (repercutido) y 472 (soportado)
  var ledger={'1T':{rep:0,sop:0},'2T':{rep:0,sop:0},'3T':{rep:0,sop:0},'4T':{rep:0,sop:0}};
  state.entries.filter(function(e){return !e.del&&!e.deleted&&e.date&&e.date.startsWith(ejStr);}).forEach(function(e){
    var tk=qKey(e.date);
    e.lines.forEach(function(l){
      if(!l.a)return;
      if(l.a.indexOf('477')===0)ledger[tk].rep+=(l.h||0)-(l.d||0);
      else if(l.a.indexOf('472')===0)ledger[tk].sop+=(l.d||0)-(l.h||0);
    });
  });
  var datos=trimKeys.map(function(tk,idx){
    var recibidas=getInvoiceData({tipo:'recibida',trimestre:tk});
    var emitidas=getInvoiceData({tipo:'emitida',trimestre:tk});
    var rates={21:{baseR:0,cuotaR:0,baseS:0,cuotaS:0},10:{baseR:0,cuotaR:0,baseS:0,cuotaS:0},4:{baseR:0,cuotaR:0,baseS:0,cuotaS:0}};
    var baseSop=0,sopFact=0,baseRep=0,repFact=0;
    recibidas.forEach(function(f){
      var sign=f.isAbono?-1:1;
      rates[21].baseS+=sign*Math.abs(f.base21);rates[21].cuotaS+=sign*Math.abs(f.iva21);
      rates[10].baseS+=sign*Math.abs(f.base10);rates[10].cuotaS+=sign*Math.abs(f.iva10);
      rates[4].baseS+=sign*Math.abs(f.base4);rates[4].cuotaS+=sign*Math.abs(f.iva4);
      baseSop+=sign*f.totalBase;sopFact+=sign*f.totalIva;
    });
    emitidas.forEach(function(f){
      var sign=f.isAbono?-1:1;
      rates[21].baseR+=sign*Math.abs(f.base21);rates[21].cuotaR+=sign*Math.abs(f.iva21);
      rates[10].baseR+=sign*Math.abs(f.base10);rates[10].cuotaR+=sign*Math.abs(f.iva10);
      rates[4].baseR+=sign*Math.abs(f.base4);rates[4].cuotaR+=sign*Math.abs(f.iva4);
      baseRep+=sign*f.totalBase;repFact+=sign*f.totalIva;
    });
    // IVA repercutido/soportado = contabilizado en cuentas (incluye gastos/inmovilizado sin factura)
    var rep=ledger[tk].rep, sop=ledger[tk].sop;
    return {name:trimLabels[idx],baseRep:baseRep,rep:rep,sopFact:sopFact,repFact:repFact,baseSop:baseSop,sop:sop,resultado:rep-sop,rates:rates};
  });
  var totalRep=datos.reduce(function(s,d){return s+d.rep;},0);
  var totalSop=datos.reduce(function(s,d){return s+d.sop;},0);
  var totalRepFact=datos.reduce(function(s,d){return s+d.repFact;},0);
  var totalSopFact=datos.reduce(function(s,d){return s+d.sopFact;},0);
  var totalBaseRep=datos.reduce(function(s,d){return s+d.baseRep;},0);
  var totalBaseSop=datos.reduce(function(s,d){return s+d.baseSop;},0);
  var totalRates={21:{baseR:0,cuotaR:0,baseS:0,cuotaS:0},10:{baseR:0,cuotaR:0,baseS:0,cuotaS:0},4:{baseR:0,cuotaR:0,baseS:0,cuotaS:0}};
  datos.forEach(function(d){[21,10,4].forEach(function(r){totalRates[r].baseR+=d.rates[r].baseR;totalRates[r].cuotaR+=d.rates[r].cuotaR;totalRates[r].baseS+=d.rates[r].baseS;totalRates[r].cuotaS+=d.rates[r].cuotaS;});});
  var rateDetail='';
  [21,10,4].forEach(function(r){
    var d=totalRates[r];
    if(Math.abs(d.baseR)>0.01||Math.abs(d.cuotaR)>0.01||Math.abs(d.baseS)>0.01||Math.abs(d.cuotaS)>0.01){
      rateDetail+='<tr style="background:#F8F9FB;font-size:11px"><td style="padding-left:20px;color:var(--txM)">↳ IVA '+r+'% (facturas)</td><td style="text-align:right;color:var(--txM)">'+fmt(d.baseR)+'€</td><td style="text-align:right;color:var(--txM)">'+fmt(d.cuotaR)+'€</td><td style="text-align:right;color:var(--txM)">'+fmt(d.baseS)+'€</td><td style="text-align:right;color:var(--txM)">'+fmt(d.cuotaS)+'€</td><td style="text-align:right;color:var(--txM)">'+fmt(Math.abs(d.cuotaR-d.cuotaS))+'€</td><td></td></tr>';
    }
  });
  // Conciliación: IVA contabilizado (cuentas 477/472) que no procede de facturas registradas
  // (gastos, leasing, inmovilizado, etc.). Hace que el desglose cuadre con el total.
  var diffRepFact=Math.round((totalRep-totalRepFact)*100)/100;
  var diffSopFact=Math.round((totalSop-totalSopFact)*100)/100;
  if(Math.abs(diffRepFact)>0.01||Math.abs(diffSopFact)>0.01){
    rateDetail+='<tr style="background:#FFF8EC;font-size:11px"><td style="padding-left:20px;color:var(--am)">↳ IVA contabilizado sin factura (gastos/inmovilizado)</td><td style="text-align:right;color:var(--txM)">—</td><td style="text-align:right;color:var(--txM)">'+fmt(diffRepFact)+'€</td><td style="text-align:right;color:var(--txM)">—</td><td style="text-align:right;color:var(--txM)">'+fmt(diffSopFact)+'€</td><td style="text-align:right;color:var(--txM)">'+fmt(Math.abs(diffRepFact-diffSopFact))+'€</td><td></td></tr>';
  }
  c.innerHTML='<div class="card"><div class="card-h"><span>Modelo 303 — IVA Trimestral '+state.ejercicio+'</span><div><button class="btn btn-d" onclick="export303Excel()">↓ Excel</button> <button class="btn btn-d" onclick="export303PDF()">↓ PDF</button> <button class="btn btn-d" onclick="export303TXT()">↓ TXT AEAT</button></div></div>'+
  '<div class="row" style="margin:12px 14px"><div class="stat" style="border-left:3px solid var(--rd)"><div class="stat-l">IVA Repercutido</div><div class="stat-v" style="color:var(--rd)">'+fmt(totalRep)+'€</div></div><div class="stat" style="border-left:3px solid var(--ok)"><div class="stat-l">IVA Soportado</div><div class="stat-v" style="color:var(--ok)">'+fmt(totalSop)+'€</div></div><div class="stat" style="border-left:3px solid var(--bl)"><div class="stat-l">Resultado — '+(totalRep-totalSop>=0?'a pagar':'a devolver')+'</div><div class="stat-v" style="color:'+(totalRep-totalSop>=0?'var(--rd)':'var(--ok)')+'">'+fmt(Math.abs(totalRep-totalSop))+'€</div></div></div>'+
  '<div style="padding:6px 14px;font-size:11px;color:var(--txM);border-bottom:1px solid #EDF0F4">IVA repercutido/soportado = saldo contabilizado en cuentas 477/472 (incluye gastos e inmovilizado). Coincide con el Panel. Las bases y el desglose por tipo proceden de las facturas registradas.</div>'+

    if(l.a&&l.a.startsWith('430')){

      if(!clientes[key])clientes[key]={saldo:0,date:e.date,name:name};
      clientes[key].saldo+=l.d-l.h;

// ═══ MODELO 111 — RETENCIONES IRPF ═══
function renderModelo111(c){
  var all=state.entries.filter(function(e){return e.date&&e.date.startsWith(String(state.ejercicio));});
  var trimestres=[{name:'1T',from:'01',to:'03'},{name:'2T',from:'04',to:'06'},{name:'3T',from:'07',to:'09'},{name:'4T',from:'10',to:'12'}];
  var datos=trimestres.map(function(t){
    var from=state.ejercicio+'-'+t.from+'-01',to=state.ejercicio+'-'+t.to+'-31';
    var retTotal=0,baseT=0,baseP=0;
    all.forEach(function(e){
      if(e.date>=from&&e.date<=to){e.lines.forEach(function(l){
        var acct=l.a||l.account||'';
        var debe=parseFloat(l.d||l.debe||0)||0;
        var haber=parseFloat(l.h||l.haber||0)||0;
        if(acct.startsWith('4751'))retTotal+=haber;
        if(acct.startsWith('640'))baseT+=debe;
        if(acct.startsWith('623')||acct.startsWith('629'))baseP+=debe;
      });}
    });
    var retT=retTotal,retP=0;
    if(baseP>0&&baseT>0&&retTotal>0){var tot=baseT+baseP;retT=Math.round(retTotal*baseT/tot*100)/100;retP=Math.round(retTotal*baseP/tot*100)/100;}
    else if(baseP>0&&baseT===0){retP=retTotal;retT=0;}
    return {name:t.name,baseT:baseT,retT:retT,baseP:baseP,retP:retP,total:retTotal};
  });
  var totalBaseT=datos.reduce(function(s,d){return s+d.baseT;},0);
  var totalRet=datos.reduce(function(s,d){return s+d.total;},0);
  var verificacion='';
  if(totalBaseT>0&&totalRet===0)verificacion='<div style="padding:8px 14px;background:#FDF0F0;border-bottom:1px solid var(--rd);font-size:11px;color:var(--rd)">⚠️ Nóminas '+fmt(totalBaseT)+'€ sin retenciones IRPF (cuenta 4751). Revisa los asientos de nómina.</div>';
  c.innerHTML='<div class="card"><div class="card-h"><span>Modelo 111 — Retenciones IRPF '+state.ejercicio+'</span><div style="display:flex;gap:6px"><button class="btn btn-d" onclick="exportModelo111()">↓ Excel</button></div></div>'+verificacion+
  '<table><thead><tr><th>Trimestre</th><th style="text-align:right">Base trabajadores</th><th style="text-align:right">Retenc. trabajo</th><th style="text-align:right">Base profesionales</th><th style="text-align:right">Retenc. profes.</th><th style="text-align:right">Total retenciones</th></tr></thead><tbody>'+
  datos.map(function(d,i){return '<tr class="'+(i%2?'alt':'')+'"><td style="font-weight:600">'+d.name+'</td><td style="text-align:right">'+fmt(d.baseT)+'€</td><td style="text-align:right">'+fmt(d.retT)+'€</td><td style="text-align:right">'+fmt(d.baseP)+'€</td><td style="text-align:right">'+fmt(d.retP)+'€</td><td style="text-align:right;font-weight:700;color:var(--rd)">'+fmt(d.total)+'€</td></tr>';}).join('')+
  '<tr class="total"><td>ANUAL</td><td style="text-align:right">'+fmt(totalBaseT)+'€</td><td style="text-align:right">'+fmt(datos.reduce(function(s,d){return s+d.retT;},0))+'€</td><td style="text-align:right">'+fmt(datos.reduce(function(s,d){return s+d.baseP;},0))+'€</td><td style="text-align:right">'+fmt(datos.reduce(function(s,d){return s+d.retP;},0))+'€</td><td style="text-align:right;font-size:14px">'+fmt(totalRet)+'€</td></tr></tbody></table></div>';
}


// ═══ MODELO 347 — TERCEROS (clientes y proveedores) ═══
var m347Minimo=3005.06;
function renderModelo347(c){
  // ═══ MODELO 347 v10 — usa getInvoiceData() ═══
  // Exclusiones legales del 347: las operaciones exentas/exportaciones NO se declaran
  // (se informan en otros modelos). Filtramos las facturas exentas (p.ej. CLIENTE EXPORT)
  // y, después, los terceros cuyo total no supera el umbral de 3.005,06€.
  var invoices=getInvoiceData();
  var terceros={};
  var exentasExcluidas=0, importeExento=0;
  invoices.forEach(function(f){
    if(f.esExenta){exentasExcluidas++;importeExento+=Math.abs(f.totalFactura);return;}
    var key=f.cif||f.tercero;
    if(!key)return;
    if(!terceros[key])terceros[key]={nombre:f.tercero,cif:f.cif,compras:0,ventas:0,t1:0,t2:0,t3:0,t4:0};
    var importe=f.isAbono?-f.totalFactura:f.totalFactura;
    var m=f.fecha?parseInt(f.fecha.substring(5,7)):0;
    var trim=m<=3?'t1':m<=6?'t2':m<=9?'t3':'t4';
    if(f.tipo==='recibida'){terceros[key].compras+=importe;terceros[key][trim]+=importe;}
    else{terceros[key].ventas+=importe;terceros[key][trim]+=importe;}
  });
  var minimo=parseFloat($('min347')?$('min347').value:3005.06)||3005.06;
  var lista=Object.values(terceros).filter(function(t){return Math.abs(t.compras+t.ventas)>minimo;}).sort(function(a,b){return Math.abs(b.compras+b.ventas)-Math.abs(a.compras+a.ventas);});
  c.innerHTML='<div class="card"><div class="card-h"><span>Modelo 347 — Terceros >'+fmt(minimo)+'€ — '+state.ejercicio+'</span><div style="display:flex;align-items:center;gap:6px"><span class="badge badge-b">'+lista.length+' declarables</span><button class="btn btn-d" onclick="export347Excel()">↓ Excel</button></div></div>'+
  '<div style="padding:8px 14px;font-size:11px;color:var(--txM);border-bottom:1px solid #EDF0F4">Operaciones con clientes y proveedores (IVA incluido). Presentación: febrero año siguiente.'+(exentasExcluidas?' <span style="color:var(--am)">Excluidas '+exentasExcluidas+' operación(es) exenta/exportación ('+fmt(importeExento)+'€), no declarables en 347.</span>':'')+'<div style="margin-top:6px;text-align:right">Mínimo €: <input id="min347" value="'+minimo+'" style="width:70px;padding:2px 6px;border:1px solid #CBD5E1;border-radius:4px"> <button class="btn btn-p" style="padding:3px 10px;font-size:11px" onclick="renderModelo347($(\'content\'))">Aplicar</button></div></div>'+
  '<table><thead><tr><th>Tercero</th><th>CIF/NIF</th><th style="text-align:right">Compras (IVA incl.)</th><th style="text-align:right">Ventas (IVA incl.)</th><th style="text-align:right">Total</th><th style="text-align:right">1T</th><th style="text-align:right">2T</th><th style="text-align:right">3T</th><th style="text-align:right">4T</th></tr></thead><tbody>'+
  lista.map(function(t,i){return '<tr class="'+(i%2?'alt':'')+'"><td>'+h(t.nombre)+'</td><td style="font-size:9px;color:var(--txM)">'+h(t.cif)+'</td><td style="text-align:right;color:var(--rd)">'+fmt(t.compras)+'€</td><td style="text-align:right;color:var(--ok)">'+fmt(t.ventas)+'€</td><td style="text-align:right;font-weight:700">'+fmt(t.compras+t.ventas)+'€</td><td style="text-align:right;font-size:10px">'+fmt(t.t1)+'</td><td style="text-align:right;font-size:10px">'+fmt(t.t2)+'</td><td style="text-align:right;font-size:10px">'+fmt(t.t3)+'</td><td style="text-align:right;font-size:10px">'+fmt(t.t4)+'</td></tr>';}).join('')+
  (lista.length?'<tr class="total"><td colspan="2">TOTALES ('+lista.length+' terceros)</td><td style="text-align:right">'+fmt(lista.reduce(function(s,t){return s+t.compras;},0))+'€</td><td style="text-align:right">'+fmt(lista.reduce(function(s,t){return s+t.ventas;},0))+'€</td><td style="text-align:right;font-size:14px">'+fmt(lista.reduce(function(s,t){return s+t.compras+t.ventas;},0))+'€</td><td colspan="4"></td></tr>':'')+'</tbody></table></div>';
}

// Exportación CSV del Modelo 347 — misma lógica que renderModelo347 (excluye exentas y aplica umbral)
function export347Excel(){

    if(parseInt(code[0])===7)ingresos+=(-val);
    if(parseInt(code[0])===6)gastos+=val;

    }

    var liq=ivaRep-ivaSop;answer='<strong>Liquidación IVA '+state.ejercicio+':</strong><br>IVA Repercutido: '+fmt(ivaRep)+'€<br>IVA Soportado: '+fmt(ivaSop)+'€<br><strong>Resultado: '+fmt(Math.abs(liq))+'€ '+(liq>=0?'a pagar':'a devolver')+'</strong>';

    // Desglose de compras por proveedor

      var provName='';var total=0;

        if(l.a&&l.a.startsWith('400')){total+=l.h-l.d;}

      }

async function replyTicket(id){
