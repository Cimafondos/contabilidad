window._soporteCurrentUser=null;
async function loadUserChat(username,el){
  window._soporteCurrentUser=username;
  // Update sidebar selection
  document.querySelectorAll('.soporte-user').forEach(function(d){d.style.background='';d.style.borderLeftColor='transparent';d.classList.remove('active');});
  if(el){el.style.background='#fff';el.style.borderLeftColor='var(--pri)';el.classList.add('active');}
  
  var header=document.getElementById('soporteChatHeader');
  var msgs=document.getElementById('soporteChatMessages');
  if(header)header.textContent='\ud83d\udcac Chat con '+username;
  if(msgs)msgs.innerHTML='<div style="color:var(--txM)">Cargando...</div>';
  
  try{
    var fb=await api('/api/feedback');
    var userMsgs=(fb||[]).filter(function(f){return f.username===username;}).sort(function(a,b){return a.id-b.id;});
    
    if(!userMsgs.length){
      if(msgs)msgs.innerHTML='<div style="color:var(--txM);text-align:center;padding:20px">Sin mensajes</div>';
      return;
    }
    
    var html='';
    userMsgs.forEach(function(m){
      var typeIcons={error:'\ud83d\udc1b',mejora:'\ud83d\udca1',duda:'\u2753'};
      var time=m.timestamp?m.timestamp.slice(0,16).replace('T',' '):'';
      // User message (left)
      html+='<div style="display:flex;margin-bottom:12px"><div style="max-width:75%;background:#E3F2FD;border-radius:12px 12px 12px 0;padding:10px 14px">'+
        '<div style="font-size:10px;color:var(--txM);margin-bottom:4px">'+(typeIcons[m.type]||'')+' '+time+(m.page?' \u00b7 '+h(m.page):'')+'</div>'+
        '<div style="font-size:13px;white-space:pre-wrap">'+h(m.message)+'</div>'+
        '</div></div>';
      // Admin reply (right)
      if(m.reply){
        html+='<div style="display:flex;justify-content:flex-end;margin-bottom:12px"><div style="max-width:75%;background:#E8F5E9;border-radius:12px 12px 0 12px;padding:10px 14px">'+
          '<div style="font-size:10px;color:var(--ok);margin-bottom:4px">\u2709\ufe0f '+h(m.replied_by||'Admin')+'</div>'+
          '<div style="font-size:13px;white-space:pre-wrap">'+h(m.reply)+'</div>'+
          '</div></div>';
      }
      // Mark as seen
      if(m.status==='nuevo')updateTicketStatus(m.id,'visto');
    });
    
    if(msgs){msgs.innerHTML=html;msgs.scrollTop=msgs.scrollHeight;}
  }catch(e){if(msgs)msgs.innerHTML='<div style="color:var(--rd)">Error: '+e.message+'</div>';}
}

async function sendSoporteReply(){
  var reply=document.getElementById('soporteReply');
  if(!reply||!reply.value.trim())return;
  var username=window._soporteCurrentUser;
  if(!username){toast('Selecciona un usuario','error');return;}
  
  // Find the last unreplied message from this user
  try{
    var fb=await api('/api/feedback');
    var userMsgs=(fb||[]).filter(function(f){return f.username===username;}).sort(function(a,b){return b.id-a.id;});
    var lastUnreplied=userMsgs.find(function(f){return !f.reply;});
    if(!lastUnreplied&&userMsgs.length)lastUnreplied=userMsgs[0];
    if(!lastUnreplied){toast('No hay mensajes para responder','error');return;}
    
    await api('/api/feedback/'+lastUnreplied.id+'/reply',{method:'POST',body:{reply:reply.value.trim()}});
    reply.value='';
    toast('\u2713 Respuesta enviada');
    loadUserChat(username,null);
  }catch(e){toast('Error: '+e.message,'error');}
}

async function updateTicketStatus(id,status){

}

function doNewEmpresaGrupo(){
  var nombre=document.getElementById('neNombre').value.trim();
  var cif=(document.getElementById('neCif')||{}).value||'';
  var dir=(document.getElementById('neDir')||{}).value||'';
  var tel=(document.getElementById('neTel')||{}).value||'';
  var email=(document.getElementById('neEmail')||{}).value||'';
  var loadPGC=document.getElementById('nePGC')?document.getElementById('nePGC').checked:true;
  var err=document.getElementById('neError');
  if(!nombre){err.textContent='El nombre es obligatorio';return;}
  var id=nombre.replace(/[^a-zA-Z0-9]/g,'_').toLowerCase();
  var config=JSON.stringify({tel:tel.trim(),email:email.trim(),dir:dir.trim()});
  var selectedUsers=[];
  document.querySelectorAll('.neUserCheck').forEach(function(cb){if(cb.checked)selectedUsers.push(cb.value);});
  api('/api/companies',{method:'POST',body:{id:id,name:nombre,cif:cif.trim(),address:dir.trim(),config:config}}).then(function(){
    var promises=selectedUsers.map(function(uid){return api('/api/user-companies',{method:'POST',body:{userId:uid,companyId:id}});});
    return Promise.all(promises);
  }).then(function(){
    closeModal();
    toast('\u2713 Empresa '+nombre+' creada con Plan Contable Pymes');
    api('/api/companies').then(function(emps){state.serverEmpresas=emps;render();});
  }).catch(function(e){if(err)err.textContent='Error: '+e.message;});
}

async function repairProveedores(){
  var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  var all=state.entries;
  
  // Collect all 400 accounts used in entries
  var usedProvCodes={};
  all.forEach(function(e){e.lines.forEach(function(l){
    if(l.a&&(l.a.startsWith('400')||l.a.startsWith('410'))&&l.a!=='40000000'&&l.a!=='41000000'){
      if(!usedProvCodes[l.a])usedProvCodes[l.a]={code:l.a,concept:e.concept||'',count:0};
      usedProvCodes[l.a].count++;
    }
  });});
  
  // Find which ones don't have an account name
  var missing=[];
  Object.values(usedProvCodes).forEach(function(p){
    var acct=am[p.code];
    if(!acct||!acct.name||acct.name===p.code){
      // Try to extract name from entry concept: "Fra. PROVEEDOR NAME [INV/...]"
      var name='';
      all.forEach(function(e){
        if(name)return;
        e.lines.forEach(function(l){
          if(l.a===p.code&&e.concept){
            var m=e.concept.match(/(?:Fra\.|Abono)\s+(.+?)\s*\[/);
            if(m)name=m[1].trim();
          }
        });
      });
      if(!name){
        // Try from masters
        var masters=[];
        try{masters=JSON.parse(localStorage.getItem('cf_masters_supplier_'+state.company.id))||[];}catch(ex){}
        var mast=masters.find(function(s){return s.account===p.code;});
        if(mast&&mast.name)name=mast.name;
      }
      if(!name)name='Proveedor '+p.code;
      missing.push({code:p.code,name:name,count:p.count});
    }
  });
  
  // Also check 430 client accounts
  var usedCliCodes={};
  all.forEach(function(e){e.lines.forEach(function(l){
    if(l.a&&l.a.startsWith('430')&&l.a!=='43000000'){
      if(!usedCliCodes[l.a])usedCliCodes[l.a]={code:l.a,concept:e.concept||'',count:0};
      usedCliCodes[l.a].count++;
    }
  });});
  
  var missingCli=[];
  Object.values(usedCliCodes).forEach(function(p){
    var acct=am[p.code];
    if(!acct||!acct.name||acct.name===p.code){
      var name='';
      all.forEach(function(e){
        if(name)return;
        e.lines.forEach(function(l){
          if(l.a===p.code&&e.concept){
            var m=e.concept.match(/(?:Fra\.|Abono)\s+(.+?)\s*\[/);
            if(m)name=m[1].trim();
          }
        });
      });
      if(!name)name='Cliente '+p.code;
      missingCli.push({code:p.code,name:name,count:p.count});
    }
  });
  
  var total=missing.length+missingCli.length;
  if(total===0){toast('✓ Todas las cuentas de terceros están correctas');return;}
  
  if(!confirm('Se van a crear/actualizar '+total+' cuentas:\n- '+missing.length+' proveedores\n- '+missingCli.length+' clientes\n\n¿Continuar?'))return;
  
  var created=0;
  for(var i=0;i<missing.length;i++){
    var p=missing[i];
    try{
      await api('/api/accounts/'+state.company.id,{method:'POST',body:{code:p.code,name:p.name,g:4,t:'A'}});
      var existing=state.accounts.find(function(a){return a.code===p.code;});
      if(existing){existing.name=p.name;}else{state.accounts.push({code:p.code,name:p.name,g:4,t:'A'});}
      created++;
    }catch(e){}
  }
  for(var j=0;j<missingCli.length;j++){
    var cl=missingCli[j];
    try{
      await api('/api/accounts/'+state.company.id,{method:'POST',body:{code:cl.code,name:cl.name,g:4,t:'A'}});
      var existing2=state.accounts.find(function(a){return a.code===cl.code;});
      if(existing2){existing2.name=cl.name;}else{state.accounts.push({code:cl.code,name:cl.name,g:4,t:'A'});}
      created++;
    }catch(e){}
  }
  
  toast('✓ '+created+' cuentas creadas/actualizadas');
  render();
}

function getEmpresas(){try{return JSON.parse(localStorage.getItem('cf_empresas')||'[]');}catch(e){return [];}}
function saveEmpresas(arr){try{localStorage.setItem('cf_empresas',JSON.stringify(arr));}catch(e){}}

// Map of company IDs to real names — never lose the real name
var EMPRESA_MAP={};
function resolveCompanyName(idOrName){
  if(EMPRESA_MAP[idOrName])return EMPRESA_MAP[idOrName];
  var emps=state.serverEmpresas||[];
  var found=emps.find(function(e){return e.id===idOrName||e.name===idOrName;});
  if(found)return found.name;
  return idOrName;
}
function fixCompanyState(){
  if(state.company){
    // Resolve name from ID first
    if(state.company.id&&EMPRESA_MAP[state.company.id]){
      state.company.name=EMPRESA_MAP[state.company.id];
    }
    // Then try resolving name if it still looks like an ID
    if(state.company.name){
      var resolved=resolveCompanyName(state.company.name);
      if(resolved!==state.company.name)state.company.name=resolved;
    }
    // Register the ID mapping
    if(state.company.id&&state.company.name)EMPRESA_MAP[state.company.id]=state.company.name;
  }
}

function initEmpresas(){
  var em=getEmpresas();
  if(!em.length){
    em=[{name:'Muvail Conta S.L.',cif:'B98000001',direccion:'',cp:'',ciudad:'Valencia',provincia:'Valencia',activa:true},
        {name:'Valentia Alimentación S.L.',cif:'',direccion:'',cp:'',ciudad:'Valencia',provincia:'Valencia',activa:true},
        {name:'Espacio CF',cif:'',direccion:'',cp:'',ciudad:'Valencia',provincia:'Valencia',activa:true}];
    saveEmpresas(em);
  }
  // Fix current company name if it's an ID
  fixCompanyState();
  // Also try loading from server
  try{
    api('/api/companies').then(function(companies){
      if(companies&&companies.length){
        var current=getEmpresas();
        var changed=false;
        companies.forEach(function(sc){
          // Register ID mapping
          if(sc.id&&sc.name)EMPRESA_MAP[sc.id]=sc.name;
          if(!current.some(function(e){return e.name===sc.name;})){
            current.push({name:sc.name,cif:sc.cif||'',direccion:sc.address||'',cp:'',ciudad:'',provincia:'',activa:true});
            changed=true;
          }
        });
        if(changed){saveEmpresas(current);fixCompanyState();render();}
      }
    }).catch(function(){});
  }catch(e){}
}

function saveUsuario(idx){
  var user=$('usrUser').value.trim();var name=$('usrName').value.trim();
  if(!user||!name){toast('Usuario y nombre obligatorios','error');return;}
  var pass=$('usrPass').value;var role=$('usrRole').value;
  var empChecks=document.querySelectorAll('.usr-emp-chk');
  var empresas=[];empChecks.forEach(function(ch){if(ch.checked)empresas.push(ch.value);});
  var allChecked=empresas.length===empChecks.length;
  var users=getUsers();
  if(idx>=0){
    users[idx].name=name;users[idx].role=role;
    if(pass)users[idx].pass=pass;
    users[idx].empresas=allChecked?[]:empresas;
  }else{
    if(users.some(function(u){return u.user===user;})){toast('Ese usuario ya existe','error');return;}
    users.push({user:user,name:name,role:role,pass:pass||'1234',empresas:allChecked?[]:empresas});
  }
  saveUsers(users);$('userModal').remove();
  auditLog(idx>=0?'editar_usuario':'nuevo_usuario',user);toast('Usuario guardado');render();
}

var testCuadreActivo = false;
async function runTestCuadre(){
  testCuadreActivo = true;
  // Guard anti-falso-descuadre: tras un deploy el test podía ejecutarse antes
  // de que terminara loadInvoices() (sesión no lista / 401) y comparaba contra
  // 0 facturas → diffs enormes en tests 6,7,9,11,12,15,16. Recargamos siempre
  // las facturas antes de medir y, si siguen vacías habiendo asientos de
  // factura, avisamos en vez de correr el test con datos incompletos.
  await loadInvoices();
  var hayAsientosFactura = state.entries.some(function(e){ return e.type === 'import_factura'; });
  if(hayAsientosFactura && (state.invoices||[]).length === 0){
    var avisoHtml = '<div class="card" style="margin-top:14px">'+
      '<div class="card-h"><span>🧪 Test de cuadre fiscal</span>'+
      '<span class="badge badge-r">⏳ Facturas no cargadas</span></div>'+
      '<div class="card-b">Las facturas aún no se han cargado (sesión no lista o error de red). '+
      'Pulsa <b>Ctrl+F5</b> y vuelve a ejecutar el test para evitar falsos descuadres.</div></div>';
    var avisoDiv = $('testResults');
    if(avisoDiv){ avisoDiv.innerHTML = avisoHtml; } else { toast('Facturas no cargadas, reintenta', 'err'); }
    return;
  }
  var ejercicio = String(state.ejercicio);
  var all = state.entries.filter(function(e){
    return !e.del && !e.deleted && e.date && e.date.startsWith(ejercicio);
  });
  var am = {};
  state.accounts.forEach(function(a){ am[a.code] = a; });
  var results = [];

  // ─────────────────────────────────────────────────────────────────────────
  // BLOQUE 1 — INTEGRIDAD BÁSICA DE ASIENTOS
  // ─────────────────────────────────────────────────────────────────────────

  // Test 1: Todos los asientos cuadran (Debe = Haber)
  var descuadrados = [];
  all.forEach(function(e){
    var td = 0, th = 0;
    e.lines.forEach(function(l){ td += l.d; th += l.h; });
    if(Math.abs(td - th) > 0.01) descuadrados.push(e);
  });
  results.push({
    name: 'Asientos cuadrados (Debe = Haber)',
    ok: descuadrados.length === 0,
    detail: descuadrados.length === 0
      ? all.length + ' asientos OK'
      : descuadrados.length + ' descuadrados: ' +
        descuadrados.slice(0,3).map(function(e){
          return (e.concept||e.id)+' ('+e.date+')';
        }).join(', ')
  });

  // Test 2: Sumas y saldos globales cuadran
  var totalDebe = 0, totalHaber = 0;
  all.forEach(function(e){
    e.lines.forEach(function(l){ totalDebe += l.d; totalHaber += l.h; });
  });
  var diffSumas = Math.round((totalDebe - totalHaber) * 100) / 100;
  results.push({
    name: 'Sumas y saldos globales cuadrados',
    ok: Math.abs(diffSumas) < 1,
    detail: 'Debe: '+fmt(totalDebe)+'\u20ac \u00b7 Haber: '+fmt(totalHaber)+'\u20ac \u00b7 Diff: '+fmt(diffSumas)+'\u20ac'
  });

  // Test 3: Sin líneas con cuenta inexistente en el plan
  var cuentasInexistentes = {};
  all.forEach(function(e){
    e.lines.forEach(function(l){
      if(l.a && !am[l.a]) cuentasInexistentes[l.a] = (cuentasInexistentes[l.a]||0) + 1;
    });
  });
  var ciKeys = Object.keys(cuentasInexistentes);
  results.push({
    name: 'Cuentas usadas existen en el plan',
    ok: ciKeys.length === 0,
    detail: ciKeys.length === 0
      ? 'Todas las cuentas del ejercicio están en el plan'
      : ciKeys.length + ' cuenta(s) no declaradas: ' + ciKeys.slice(0,5).join(', ')
  });

  // ─────────────────────────────────────────────────────────────────────────
  // BLOQUE 2 — BALANCES ESTRUCTURALES
  // ─────────────────────────────────────────────────────────────────────────

  // Calcular saldos por cuenta (acumulado del ejercicio)
  var gSaldos = {};
  all.forEach(function(e){
    e.lines.forEach(function(l){
      if(!l.a) return;
      if(!gSaldos[l.a]) gSaldos[l.a] = {d:0, h:0};
      gSaldos[l.a].d += l.d;
      gSaldos[l.a].h += l.h;
    });
  });

  // Test 4: Balance de situación — Activo = PN + Pasivo + Resultado
  var activo = 0, pasivo = 0, patrimonio = 0, gastos = 0, ingresos = 0;
  Object.entries(gSaldos).forEach(function(x){
    var code = x[0], v = x[1];
    var g = code.charAt(0);
    var saldo = v.d - v.h;
    if(g === '1'){ if(saldo < 0) patrimonio += Math.abs(saldo); else pasivo += saldo; }
    else if(g === '2'){ activo += saldo; }
    else if(g === '3'){ activo += saldo; }
    else if(g === '4'){
      if(code.startsWith('47')){ if(saldo > 0) activo += saldo; else pasivo += Math.abs(saldo); }
      else if(code.startsWith('43') || code.startsWith('44')){ activo += saldo; }
      else { pasivo += Math.abs(Math.min(saldo, 0)); activo += Math.max(saldo, 0); }
    }
    else if(g === '5'){ if(saldo >= 0) activo += saldo; else pasivo += Math.abs(saldo); }
    else if(g === '6'){ gastos += saldo; }
    else if(g === '7'){ ingresos += v.h - v.d; }
  });
  var resultado = ingresos - gastos;
  var balDiff = Math.round((activo - (patrimonio + pasivo + resultado)) * 100) / 100;
  results.push({
    name: 'Balance de situación (A = PN+P+Resultado)',
    ok: Math.abs(balDiff) < 1,
    detail: 'Activo: '+fmt(activo)+'\u20ac \u00b7 PN+Pasivo: '+fmt(patrimonio+pasivo)+'\u20ac \u00b7 Resultado: '+fmt(resultado)+'\u20ac \u00b7 Diff: '+fmt(balDiff)+'\u20ac'
  });

  // Test 5: Resultado PyG = Ingresos G7 − Gastos G6
  results.push({
    name: 'Resultado PyG (G7 − G6)',
    ok: true,
    detail: 'Ingresos G7: '+fmt(ingresos)+'\u20ac \u00b7 Gastos G6: '+fmt(gastos)+'\u20ac \u00b7 Resultado: '+fmt(resultado)+'\u20ac'
  });

  // ─────────────────────────────────────────────────────────────────────────
  // BLOQUE 3 — IVA Y HACIENDA
  // ─────────────────────────────────────────────────────────────────────────

  // Test 6: IVA soportado (cuenta 472) de facturas cuadra con facturas recibidas
  var facRecibidas = getInvoiceData({tipo:'recibida'});
  var iva472Facturas = 0;
  all.forEach(function(e){
    if(e.type!=='import_factura') return;
    e.lines.forEach(function(l){
      if(l.a && l.a.startsWith('472')) iva472Facturas += l.d - l.h;
    });
  });
  var ivaFactRecibidas = facRecibidas.reduce(function(s,f){
    var sign = f.isAbono ? -1 : 1;
    return s + sign * (Math.abs(f.iva21||0) + Math.abs(f.iva10||0) + Math.abs(f.iva4||0));
  }, 0);
  var diff472 = Math.round((iva472Facturas - ivaFactRecibidas) * 100) / 100;
  var ok472 = facRecibidas.length === 0 || Math.abs(diff472) < 1;
  results.push({
    name: 'IVA soportado 472 cuadra con facturas recibidas',
    ok: ok472,
    detail: 'Cta 472 (facturas): '+fmt(iva472Facturas)+'\u20ac \u00b7 Facturas rec: '+fmt(ivaFactRecibidas)+'\u20ac \u00b7 Diff: '+fmt(diff472)+'\u20ac'
  });

  // Test 7: IVA repercutido (cuenta 477) cuadra con facturas emitidas
  // iva477 = TOTAL del periodo (lo necesita el Modelo 303, test 10).
  var iva477 = 0;
  Object.entries(gSaldos).forEach(function(x){
    if(x[0].startsWith('477')) iva477 += x[1].h - x[1].d;
  });
  // iva477Facturas = solo 477 de asientos de factura de venta (type import_factura con cuenta 430x/431x).
  // Las rectificaciones de ventas (rappels 709, devoluciones 708, dtos 706) minoran el 477 pero
  // no son facturas: no existen en la tabla invoices, así que se excluyen aquí.
  var iva477Facturas = 0;
  all.forEach(function(e){
    if(e.type!=='import_factura') return;
    var esVenta = e.lines.some(function(l){ return l.a && (l.a.startsWith('430') || l.a.startsWith('431')); });
    if(!esVenta) return;
    e.lines.forEach(function(l){
      if(l.a && l.a.startsWith('477')) iva477Facturas += l.h - l.d;
    });
  });
  var facEmitidas = getInvoiceData({tipo:'emitida'});
  var ivaFactEmitidas = facEmitidas.reduce(function(s,f){
    var sign = f.isAbono ? -1 : 1;
    return s + sign * (Math.abs(f.iva21||0) + Math.abs(f.iva10||0) + Math.abs(f.iva4||0));
  }, 0);
  var diff477 = Math.round((iva477Facturas - ivaFactEmitidas) * 100) / 100;
  var ok477 = facEmitidas.length === 0 || Math.abs(diff477) < 1;
  results.push({
    name: 'IVA repercutido 477 cuadra con facturas emitidas',
    ok: ok477,
    detail: 'Cta 477 (asientos factura): '+fmt(iva477Facturas)+'\u20ac \u00b7 Facturas emit: '+fmt(ivaFactEmitidas)+'\u20ac \u00b7 Diff: '+fmt(diff477)+'\u20ac'
  });

  // Test 8: Recargo de equivalencia coherente
  // En régimen de recargo (minorista), el recargo soportado se contabiliza como mayor coste
  // en el grupo 6, NO en una cuenta de IVA. Verificamos que la 47200001 queda a cero.
  var recargo47200001 = 0;
  Object.entries(gSaldos).forEach(function(x){
    if(x[0] === '47200001') recargo47200001 += x[1].d - x[1].h;
  });
  var recargoFact = facRecibidas.reduce(function(s,f){
    return s + Math.abs(f.recargo||0);
  }, 0);
  var okRecargo = Math.abs(recargo47200001) < 1;
  results.push({
    name: 'Recargo de equivalencia coherente',
    ok: okRecargo,
    detail: 'En facturas: '+fmt(recargoFact)+'\u20ac (integrado como mayor coste en grupo 6) \u00b7 Cuenta 47200001: '+fmt(recargo47200001)+'\u20ac (debe ser 0)'
  });

  // Test 9: Retenciones IRPF de facturas (cuenta 4751) cuadran con facturas
  var ret4751Fact = 0;
  all.forEach(function(e){
    if(e.type!=='import_factura') return;
    e.lines.forEach(function(l){
      if(l.a && l.a.startsWith('4751')) ret4751Fact += l.h - l.d;
    });
  });
  var retFact = facRecibidas.reduce(function(s,f){
    return s + Math.abs(f.retencion||0);
  }, 0);
  var diffRet = Math.round((ret4751Fact - retFact) * 100) / 100;
  var okRet = facRecibidas.length === 0 || Math.abs(diffRet) < 1;
  results.push({
    name: 'Retenciones IRPF (4751) cuadran con facturas',
    ok: okRet,
    detail: 'Cta 4751 (facturas): '+fmt(ret4751Fact)+'\u20ac \u00b7 En facturas: '+fmt(retFact)+'\u20ac \u00b7 Diff: '+fmt(diffRet)+'\u20ac'
  });

  // Test 10: Modelo 303 — IVA repercutido − IVA soportado (usa totales globales, no solo facturas)
  var iva472Total = 0;
  Object.entries(gSaldos).forEach(function(x){ if(x[0].startsWith('472')) iva472Total += x[1].d - x[1].h; });
  var m303 = iva477 - iva472Total;
  results.push({
    name: 'Modelo 303 (IVA rep − IVA sop)',
    ok: true,
    detail: 'Resultado 303: '+fmt(m303)+'\u20ac '+(m303 >= 0 ? '(a ingresar)' : '(a devolver)')
  });

  // ─────────────────────────────────────────────────────────────────────────
  // BLOQUE 4 — TRIANGULACIÓN FACTURAS ↔ ASIENTOS
  // ─────────────────────────────────────────────────────────────────────────

  var invoicesAll = getInvoiceData();

  // Test 11: Ventas asientos G7 ≈ base imponible facturas emitidas
  // Solo cuenta el grupo 7 de asientos de factura de venta (import_factura con cuenta 430x/431x).
  // Las rectificaciones de ventas (rappels 709, devoluciones 708, dtos 706) no son facturas.
  var ventasFactBase = facEmitidas.reduce(function(s,f){
    var sign = f.isAbono ? -1 : 1;
    return s + sign * Math.abs(f.totalBase||0);
  }, 0);
  var ventasAsientos = 0;
  all.forEach(function(e){
    if(e.type!=='import_factura') return;
    var esVenta = e.lines.some(function(l){ return l.a && (l.a.startsWith('430') || l.a.startsWith('431')); });
    if(!esVenta) return;
    e.lines.forEach(function(l){
      if(l.a && l.a.charAt(0) === '7') ventasAsientos += l.h - l.d;
    });
  });
  var diffVentas = Math.round((ventasFactBase - ventasAsientos) * 100) / 100;
  results.push({
    name: 'Ventas: Facturas emitidas \u2194 Asientos G7',
    ok: facEmitidas.length === 0 || Math.abs(diffVentas) < 0.01,
    detail: 'Base facturas: '+fmt(ventasFactBase)+'\u20ac \u00b7 Asientos G7 (factura): '+fmt(ventasAsientos)+'\u20ac \u00b7 Diff: '+fmt(diffVentas)+'\u20ac'
  });

  // Test 12: Compras: facturas recibidas ↔ asientos de factura (solo tipo import_factura, cuenta 6xx)
  var comprasFactBase = facRecibidas.reduce(function(s,f){
    var sign = f.isAbono ? -1 : 1;
    return s + sign * (Math.abs(f.totalBase||0) + Math.abs(f.recargo||0));
  }, 0);
  var comprasAsientos = 0;
  all.forEach(function(e){
    if(e.type!=='import_factura') return;
    // Check if this entry is linked to a recibida (has 400x or 410x account)
    var isRecibida = e.lines.some(function(l){ return l.a && (l.a.startsWith('400') || l.a.startsWith('410')); });
    if(!isRecibida) return;
    e.lines.forEach(function(l){
      if(l.a && l.a.charAt(0) === '6') comprasAsientos += l.d - l.h;
    });
  });
  var diffCompras = Math.round((comprasFactBase - comprasAsientos) * 100) / 100;
  // ── Localizar el origen exacto del descuadre (asiento por asiento) ──
  var culpablesG6 = [];
  if(Math.abs(diffCompras) >= 0.01){
    // Mapa: entry_id de factura recibida → base de la factura (con signo)
    var baseFactPorEntry = {};
    facRecibidas.forEach(function(f){
      if(!f.entryId) return;
      var sign = f.isAbono ? -1 : 1;
      baseFactPorEntry[f.entryId] = (baseFactPorEntry[f.entryId]||0) + sign * (Math.abs(f.totalBase||0) + Math.abs(f.recargo||0));
    });
    // Recorrer cada asiento de factura con apuntes al grupo 6 y comparar con su factura
    all.forEach(function(e){
      if(e.type!=='import_factura') return;
      var isRecibida = e.lines.some(function(l){ return l.a && (l.a.startsWith('400') || l.a.startsWith('410')); });
      if(!isRecibida) return;
      var g6 = 0;
      e.lines.forEach(function(l){
        if(l.a && l.a.charAt(0) === '6') g6 += l.d - l.h;
      });
      if(Math.abs(g6) < 0.005) return; // asiento sin grupo 6, se ignora
      var baseFac = baseFactPorEntry[e.id];
      if(baseFac === undefined){
        // Apunte al grupo 6 sin factura recibida que lo respalde
        culpablesG6.push({ e:e, g6:g6, motivo:'sin factura', delta:g6 });
      } else {
        var d = Math.round((g6 - baseFac) * 100) / 100;
        if(Math.abs(d) >= 0.01){
          culpablesG6.push({ e:e, g6:g6, motivo:'base ≠ factura ('+fmt(baseFac)+'\u20ac)', delta:d });
        }
      }
    });
    culpablesG6.sort(function(a,b){ return Math.abs(b.delta) - Math.abs(a.delta); });
  }
  var detalleCompras = 'Base facturas: '+fmt(comprasFactBase)+'\u20ac \u00b7 Asientos G6: '+fmt(comprasAsientos)+'\u20ac \u00b7 Diff: '+fmt(diffCompras)+'\u20ac';
  if(culpablesG6.length){
    detalleCompras += '<br><span style="color:var(--rd);font-weight:600">Origen del descuadre:</span>';
    culpablesG6.slice(0,10).forEach(function(c){
      detalleCompras += '<br>\u2022 ' + (c.e.concept || c.e.id) + ' (' + c.e.date + '): <strong>' + fmt(c.delta) + '\u20ac</strong> [' + c.motivo + '] ' +
        '<button class="btn btn-p" style="padding:1px 8px;font-size:10px;margin-left:6px" onclick="editEntry(\'' + c.e.id + '\')">\u270f\ufe0f Editar asiento</button>';
    });
    if(culpablesG6.length > 10) detalleCompras += '<br>\u00b7 (+'+(culpablesG6.length-10)+' m\u00e1s)';
  }
  results.push({
    name: 'Compras: Facturas recibidas ↔ Asientos G6',
    ok: facRecibidas.length === 0 || Math.abs(diffCompras) < 0.01,
    detail: detalleCompras
  });

  // Test 13: Facturas huérfanas (entry_id apunta a asiento eliminado o inexistente)
  var entryIds = {};
  state.entries.forEach(function(e){ if(!e.del && !e.deleted) entryIds[e.id] = true; });
  var huerfanas = invoicesAll.filter(function(f){
    return f.entryId && !entryIds[f.entryId];
  });
  results.push({
    name: 'Facturas huérfanas (sin asiento vivo)',
    ok: huerfanas.length === 0,
    detail: huerfanas.length === 0
      ? 'Todas las facturas referencian un asiento existente'
      : huerfanas.length + ' huérfanas: ' +
        huerfanas.slice(0,5).map(function(f){ return f.numFactura||f.id; }).join(', ')
  });

  // Test 14: Duplicados por nº factura + tipo
  var seenDup = {}, dupCount = [];
  invoicesAll.forEach(function(f){
    var k = (f.numFactura||'').toUpperCase() + '__' + f.tipo;
    if(seenDup[k]) dupCount.push(f); else seenDup[k] = true;
  });
  results.push({
    name: 'Sin duplicados de nº factura',
    ok: dupCount.length === 0,
    detail: dupCount.length === 0
      ? 'Sin duplicados en ' + invoicesAll.length + ' facturas'
      : dupCount.length + ' duplicados: ' +
        dupCount.slice(0,5).map(function(f){ return (f.numFactura||'s/n')+' ('+f.tipo+')'; }).join(', ')
  });

  // ─────────────────────────────────────────────────────────────────────────
  // BLOQUE 5 — CLIENTES, PROVEEDORES Y TESORERÍA
  // ─────────────────────────────────────────────────────────────────────────

  // Test 15: Saldo clientes (430x) ≤ total facturado emitido
  var saldoClientes = 0;
  Object.entries(gSaldos).forEach(function(x){
    if(x[0].startsWith('430')) saldoClientes += x[1].d - x[1].h;
  });
  var totalEmitidoCobrable = facEmitidas.reduce(function(s,f){
    var sign = f.isAbono ? -1 : 1;
    return s + sign * Math.abs(f.totalFactura||f.total||0);
  }, 0);
  results.push({
    name: 'Saldo clientes 430x ≤ facturado emitido',
    ok: facEmitidas.length === 0 || saldoClientes <= totalEmitidoCobrable + 1,
    detail: 'Pendiente cobro (430): '+fmt(saldoClientes)+'\u20ac \u00b7 Total facturado: '+fmt(totalEmitidoCobrable)+'\u20ac'
  });

  // Test 16: Saldo proveedores (400x)
  var saldoProv = 0;
  Object.entries(gSaldos).forEach(function(x){
    if(x[0].startsWith('400')) saldoProv += x[1].h - x[1].d;
  });
  var totalRecibidoPagable = facRecibidas.reduce(function(s,f){
    var sign = f.isAbono ? -1 : 1;
    return s + sign * Math.abs(f.totalFactura||f.total||0);
  }, 0);
  results.push({
    name: 'Saldo proveedores 400x coherente',
    ok: true,
    detail: 'Pendiente pago (400): '+fmt(saldoProv)+'\u20ac \u00b7 Total recibido: '+fmt(totalRecibidoPagable)+'\u20ac'
  });

  // Test 17: Tesorería — saldo cuentas 57x no negativa
  var tesoreria = 0;
  Object.entries(gSaldos).forEach(function(x){
    if(x[0].startsWith('57')) tesoreria += x[1].d - x[1].h;
  });
  results.push({
    name: 'Tesorería (57x) no negativa',
    ok: tesoreria >= -1,
    detail: 'Saldo tesorería: '+fmt(tesoreria)+'\u20ac' + (tesoreria < -1 ? ' \u26a0 Saldo negativo en cuentas bancarias' : '')
  });

  // ─────────────────────────────────────────────────────────────────────────
  // RENDER RESULTADOS
  // ─────────────────────────────────────────────────────────────────────────
  var passed = results.filter(function(r){ return r.ok; }).length;
  var html = '<div class="card" style="margin-top:14px">'+
    '<div class="card-h"><span>\ud83e\uddea Test de cuadre fiscal \u2014 '+passed+'/'+results.length+' OK</span>'+
    '<span class="badge '+(passed === results.length ? 'badge-g' : 'badge-r')+'">'+
    (passed === results.length ? '\u2713 TODO OK' : '\u2717 '+(results.length-passed)+' errores')+'</span></div>'+
    '<table><thead><tr>'+
      '<th style="width:30px">#</th>'+
      '<th style="width:30px"></th>'+
      '<th>Test</th>'+
      '<th>Detalle</th>'+
    '</tr></thead><tbody>'+
    results.map(function(r,i){
      return '<tr style="background:'+(r.ok ? '#E8F8ED' : '#FDF0F0')+'">'+
        '<td style="text-align:center">'+(i+1)+'</td>'+
        '<td style="font-size:16px;text-align:center">'+(r.ok ? '\u2705' : '\u274c')+'</td>'+
        '<td style="font-weight:600">'+r.name+'</td>'+
        '<td style="font-size:10px;color:'+(r.ok ? 'var(--ok)' : 'var(--rd)')+'">'+r.detail+'</td>'+
      '</tr>';
    }).join('')+
    '</tbody></table></div>';

  var testDiv = $('testResults');
  if(testDiv){ testDiv.innerHTML = html; }
  else{
    toast(passed+'/'+results.length+' tests OK', 'ok');
    var c2 = $('content');
    if(c2) c2.innerHTML += html;
  }
}
function renderIncidencias(c){
  var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  var errors=[];
  
  // 1. Asientos descuadrados
  state.entries.forEach(function(e){
    var td=0,th=0;
    e.lines.forEach(function(l){td+=Math.round(l.d*100)/100;th+=Math.round(l.h*100)/100;});
    var diff=Math.round((td-th)*100)/100;
    if(Math.abs(diff)>0.01){
      errors.push({tipo:'Descuadre',icon:'⚖️',severity:'error',date:e.date,ref:e.concept||e.id,detail:'Debe: '+fmt(td)+'€ · Haber: '+fmt(th)+'€ · Diferencia: '+fmt(diff)+'€',entryId:e.id,lines:e.lines});
    }
  });
  
  // 2. Cuentas inexistentes (usadas en asientos pero no en plan de cuentas)
  var cuentasUsadas={};
  state.entries.forEach(function(e){e.lines.forEach(function(l){
    if(l.a&&!am[l.a]&&!cuentasUsadas[l.a]){
      cuentasUsadas[l.a]=true;
      errors.push({tipo:'Cuenta inexistente',icon:'📑',severity:'warning',date:e.date,ref:e.concept||e.id,detail:'Cuenta '+l.a+' usada en asiento pero no existe en el plan de cuentas',entryId:e.id});
    }
  });});
  
  // 3. Asientos sin líneas
  state.entries.forEach(function(e){
    if(!e.lines||e.lines.length===0){
      errors.push({tipo:'Sin líneas',icon:'📋',severity:'warning',date:e.date,ref:e.concept||e.id,detail:'Asiento sin ninguna línea contable',entryId:e.id});
    }
  });
  
  // 4. Asientos con importe 0
  state.entries.forEach(function(e){
    if(e.lines&&e.lines.length>0){
      var td=0;e.lines.forEach(function(l){td+=l.d+l.h;});
      if(td===0){
        errors.push({tipo:'Importe cero',icon:'0️⃣',severity:'info',date:e.date,ref:e.concept||e.id,detail:'Todas las líneas tienen importe 0',entryId:e.id});
      }
    }
  });
  
  // 5. Fechas fuera del ejercicio
  state.entries.forEach(function(e){
    if(e.date&&!e.date.startsWith(String(state.ejercicio))){
      errors.push({tipo:'Fecha fuera ejercicio',icon:'📅',severity:'info',date:e.date,ref:e.concept||e.id,detail:'Fecha '+fmtD(e.date)+' no pertenece al ejercicio '+state.ejercicio,entryId:e.id});
    }
  });
  
  // 6. Saldos invertidos (deudor cuando debería ser acreedor o viceversa)
  var saldosCta={};
  state.entries.forEach(function(e){e.lines.forEach(function(l){
    if(!saldosCta[l.a])saldosCta[l.a]={d:0,h:0};
    saldosCta[l.a].d+=l.d;saldosCta[l.a].h+=l.h;
  });});
  Object.keys(saldosCta).forEach(function(cta){
    var s=saldosCta[cta];var saldo=s.d-s.h;var g=parseInt(cta[0])||0;
    var acct=am[cta];var nombre=acct?acct.name:cta;
    // Banco negativo
    if(cta.substring(0,3)==='572'&&saldo<0){
      errors.push({tipo:'Banco negativo',icon:'🏦',severity:'warning',date:'',ref:nombre,detail:'Saldo banco: '+fmt(saldo)+'€ — la empresa no tiene liquidez suficiente'});
    }
    // Capital con saldo deudor (debería ser acreedor)
    if(cta.substring(0,3)==='100'&&saldo>0){
      errors.push({tipo:'Capital deudor',icon:'⚠️',severity:'error',date:'',ref:nombre,detail:'Capital social tiene saldo deudor ('+fmt(saldo)+'€) — debería ser acreedor'});
    }
  });
  
  // 7. Cuadre global (Total Debe = Total Haber de todos los asientos)
  var globalD=0,globalH=0;
  state.entries.forEach(function(e){e.lines.forEach(function(l){globalD+=l.d;globalH+=l.h;});});
  if(Math.abs(globalD-globalH)>0.01){
    errors.push({tipo:'Descuadre global',icon:'🔴',severity:'error',date:'',ref:'CONTABILIDAD',detail:'Total Debe ('+fmt(globalD)+'€) ≠ Total Haber ('+fmt(globalH)+'€) — Diferencia: '+fmt(globalD-globalH)+'€'});
  }
  
  // 8. IVA: verificar que cuotas IVA son coherentes con bases
  var ivaRep=saldosCta['47700000']||{d:0,h:0};
  var ivaSop=saldosCta['47200000']||{d:0,h:0};
  if(ivaRep.h>0||ivaSop.d>0){
    var ventas700=saldosCta['70000000']||{d:0,h:0};
    var baseVentas=ventas700.h-ventas700.d;
    var cuotaRep=ivaRep.h-ivaRep.d;
    if(baseVentas>0&&cuotaRep>0){
      var tipoIvaVentas=Math.round(cuotaRep/baseVentas*100);
      if(tipoIvaVentas>21){
        errors.push({tipo:'IVA repercutido alto',icon:'💰',severity:'warning',date:'',ref:'IVA',detail:'Tipo medio IVA repercutido: '+tipoIvaVentas+'% — superior al 21% máximo'});
      }
    }
  }
  
  // Sort: errors first, then warnings, then info
  var order={error:0,warning:1,info:2};
  errors.sort(function(a,b){return (order[a.severity]||9)-(order[b.severity]||9)||(a.date||'').localeCompare(b.date||'');});
  
  var countErr=errors.filter(function(e){return e.severity==='error';}).length;
  var countWarn=errors.filter(function(e){return e.severity==='warning';}).length;
  var countInfo=errors.filter(function(e){return e.severity==='info';}).length;
  
  c.innerHTML='<div class="row">'+
  '<div class="stat"><div class="stat-v" style="color:var(--rd)">'+countErr+'</div><div class="stat-l">🔴 Errores (descuadres)</div></div>'+
  '<div class="stat"><div class="stat-v" style="color:var(--am)">'+countWarn+'</div><div class="stat-l">🟡 Advertencias</div></div>'+
  '<div class="stat"><div class="stat-v" style="color:var(--bl)">'+countInfo+'</div><div class="stat-l">🔵 Informativos</div></div>'+
  '<div class="stat"><div class="stat-v" style="color:var(--ok)">'+state.entries.length+'</div><div class="stat-l">Total asientos</div></div>'+
  '</div>'+
  '<div class="card"><div class="card-h"><span>Incidencias contables — '+errors.length+' encontradas</span><div style="display:flex;gap:6px"><button class="btn btn-d" onclick="checkIntegrity();render();">Recomprobar</button></div></div>'+
  (errors.length?'<div class="scr" style="max-height:500px"><table><thead><tr><th style="width:30px"></th><th>Tipo</th><th>Fecha</th><th>Asiento/Concepto</th><th>Detalle</th><th style="width:50px">Acc.</th></tr></thead><tbody>'+
  errors.map(function(e,i){
    var bgColor=e.severity==='error'?'#FDF0F0':e.severity==='warning'?'#FFF8E1':'#EBF5FF';
    var txtColor=e.severity==='error'?'var(--rd)':e.severity==='warning'?'var(--am)':'var(--bl)';
    return '<tr style="background:'+bgColor+'"><td style="font-size:16px;text-align:center">'+e.icon+'</td><td><span class="badge '+(e.severity==='error'?'badge-r':e.severity==='warning'?'badge-a':'badge-b')+'">'+e.tipo+'</span></td><td style="font-size:10px">'+fmtD(e.date)+'</td><td style="font-size:11px;font-weight:600;max-width:250px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+h(e.ref)+'</td><td style="font-size:10px;color:'+txtColor+'">'+h(e.detail)+'</td><td style="white-space:nowrap">'+(e.entryId?'<button class="abtn" onclick="editEntry(\''+e.entryId+'\')" title="Editar asiento">✏️</button> <button class="abtn" style="color:var(--rd)" onclick="deleteEntry(\''+e.entryId+'\')" title="Eliminar">🗑</button>':'')+'</td></tr>';
  }).join('')+
  '</tbody></table></div>':'<div class="empty"><div style="font-size:40px;margin-bottom:10px">✅</div>Sin incidencias. ¡Todo correcto!</div>')+
  '</div>';
}

function renderCartera(c){

  '<div class="card"><div class="card-h"><span>📊 Distribución por estado</span></div><div class="card-b">'+

  }).join('')+'</div></div></div>'+

  (function(){
    var tipos={};expedientes.forEach(function(e){var t=e.tipo||'otros';if(!tipos[t])tipos[t]={count:0,deuda:0,precio:0};tipos[t].count++;tipos[t].deuda+=(e.deuda||0);tipos[t].precio+=(e.precio||0);});

    Object.entries(tipos).map(function(x,i){var pct=x[1].deuda>0?Math.round(x[1].precio/x[1].deuda*100):0;return '<tr class="'+(i%2?'alt':'')+'"><td style="font-weight:600"><span class="badge badge-v">'+h(x[0])+'</span></td><td style="text-align:right">'+x[1].count+'</td><td style="text-align:right">'+fmt(x[1].deuda)+'€</td><td style="text-align:right">'+fmt(x[1].precio)+'€</td><td style="text-align:right;font-weight:600">'+pct+'%</td></tr>';}).join('')+'</tbody></table>';
  })()+'</div>';
}

// ═══ RENTABILIDAD POR EXPEDIENTE ═══
function renderRentabilidad(c){
  loadExpedientes();
  var items=expedientes.filter(function(e){return e.deuda>0&&e.precio>0;}).map(function(e){
    var rentab=Math.round((e.deuda-e.precio)/e.precio*100);
    var multiple=e.precio>0?(e.deuda/e.precio).toFixed(1):'—';
    return {codigo:e.codigo,deudor:e.deudor,deuda:e.deuda,precio:e.precio,rentab:rentab,multiple:multiple,estado:e.estado||'gestion'};
  }).sort(function(a,b){return b.rentab-a.rentab;});
  var totalInvertido=items.reduce(function(s,x){return s+x.precio;},0);
  var totalRecuperable=items.reduce(function(s,x){return s+x.deuda;},0);
  var rentabMedia=totalInvertido>0?Math.round((totalRecuperable-totalInvertido)/totalInvertido*100):0;

async function resolveExcluded(id,estado){
  if(!confirm(estado==='descartada'?'¿Descartar esta factura definitivamente?':'¿Marcar como contabilizada?'))return;
  try{
    await api('/api/excluded-invoices/'+state.company.id+'/'+id,{method:'PUT',body:{estado:estado}});

    renderExcluidas($('content'));
  }catch(e){toast('Error: '+e.message,'error');}
}

// ── getInvoiceData() — ahora lee de state.invoices (la BD) ──
function getInvoiceData(opts){
  opts=opts||{};
  var year=opts.year||state.ejercicio;
  var data=(state.invoices||[]).filter(function(f){
    return f.fecha&&f.fecha.startsWith(String(year));
  });
  if(opts.tipo)data=data.filter(function(f){return f.tipo===opts.tipo;});
  if(opts.trimestre){
    var tMap={'1T':['01','02','03'],'2T':['04','05','06'],'3T':['07','08','09'],'4T':['10','11','12']};
    var meses=tMap[opts.trimestre]||[];
    data=data.filter(function(f){var m=f.fecha.substring(5,7);return meses.indexOf(m)>=0;});
  }
  // Normalize fields for compatibility
  return data.map(function(f){
    var totalBase=Math.abs(f.base21||0)+Math.abs(f.base10||0)+Math.abs(f.base4||0)+Math.abs(f.base0||0);
    var totalIva=Math.abs(f.iva21||0)+Math.abs(f.iva10||0)+Math.abs(f.iva4||0);
    return {
      id:f.id,
      numFactura:f.num_factura,
      fecha:f.fecha,
      tipo:f.tipo,
      tipoFactura:f.tipo,
      isAbono:!!f.is_abono,
      tercero:f.tercero_nombre,
      cif:f.tercero_cif,
      cuenta:f.tercero_cuenta,
      base21:f.base21||0, iva21:f.iva21||0,
      base10:f.base10||0, iva10:f.iva10||0,
      base4:f.base4||0, iva4:f.iva4||0,
      base0:f.base0||0,
      // Operación exenta/exportación: base sólo en exento (base0) y sin IVA ni base gravada.
      // El Modelo 347 excluye exportaciones/operaciones exentas → se usa para filtrarlas.
      esExenta:(Math.abs(f.base0||0)>0.01)&&(Math.abs(f.base21||0)+Math.abs(f.base10||0)+Math.abs(f.base4||0)+Math.abs(f.iva21||0)+Math.abs(f.iva10||0)+Math.abs(f.iva4||0)<0.01),
      retencion:f.retencion||0,
      recargo:f.recargo||0,
      total:f.total||0,
      totalBase:totalBase,
      totalIva:totalIva,
      totalFactura:Math.abs(f.total||0),
      formaPago:f.forma_pago||'',
      entryId:f.entry_id||''
    };
  });
}

// ── Parsear factura desde fila de Excel ──
function parseInvoiceFromExcelRow(r, colMap, ownCif){
  var numFact=String(r[colMap.numFact]||'').trim();
  if(!numFact)return null;
  
  var terceroRaw=String(r[colMap.tercero]||'').trim();
  var cifRaw=colMap.cif!==undefined?String(r[colMap.cif]||'').trim():'';
  var concepto=colMap.concepto!==undefined?String(r[colMap.concepto]||'').trim():'';
  
  // Determine real provider name and CIF
  var terceroName=terceroRaw;
  var terceroCif=cifRaw;
  
  // If tercero looks like a CIF, extract real name from concepto
  if(terceroName.match(/^[A-Z]\d{7,8}[A-Z]?$/i)){
    terceroCif=terceroName; // This IS the CIF
    terceroName=''; // Need to find real name
  }
  
  // If CIF is own company, look for real emisor CIF in concepto
  if(ownCif&&terceroCif===ownCif){
    var cifEmMatch=concepto.match(/CIF Emisor:\s*\[([A-Z0-9]+)\]/i);
    if(cifEmMatch&&cifEmMatch[1]&&cifEmMatch[1]!==ownCif){
      terceroCif=cifEmMatch[1];
    }else{
      terceroCif=''; // Can't determine
    }
  }
  
  // If no CIF yet, try from concepto
  if(!terceroCif){
    var cifEmMatch2=concepto.match(/CIF Emisor:\s*\[([A-Z0-9]+)\]/i);
    if(cifEmMatch2&&cifEmMatch2[1]&&cifEmMatch2[1]!==ownCif){
      terceroCif=cifEmMatch2[1];
    }
  }
  
  // If no name, try to extract from concepto
  if(!terceroName){
    // Pattern: CIF Emisor: [CIF] → [CIF] ✅ Nombre traído ... | next section
    // The name is in the "Proveedor" column of manual Excel, but in API Excel it's the CIF
    // Look for known name patterns in concepto
    // Pattern 1: "Nombre traído de BDD" doesn't give us the name directly
    // Pattern 2: Look for S.L., S.A. etc in concepto
    var namePatterns=[
      /([A-ZÁÉÍÓÚÑ][A-ZÁÉÍÓÚÑ\s\.,'&-]+(?:S\.L\.U?\.|S\.A\.|S\.L\.P\.|S\.COOP\.))/g
    ];
    for(var p=0;p<namePatterns.length;p++){
      var matches=concepto.match(namePatterns[p]);
      if(matches){
        // Filter out matches that are just CIFs or too short
        for(var m=0;m<matches.length;m++){
          var candidate=matches[m].trim();
          if(candidate.length>8&&candidate!==terceroCif){
            terceroName=candidate;
            break;
          }
        }
        if(terceroName)break;
      }
    }
    // If still no name, try personal names (JOAO MESSIAS DA CRUZ DOMINGUES)
    if(!terceroName){
      var nm=concepto.match(/([A-ZÁÉÍÓÚÑ][a-záéíóúñ]+(?:\s+[A-ZÁÉÍÓÚÑ][a-záéíóúñ]+){2,})/);
      if(nm)terceroName=nm[1];
    }
    // Last resort: use CIF as name
    if(!terceroName)terceroName=terceroCif||'DESCONOCIDO';
  }
  
  // Parse amounts
  var base21=parseFloat(r[colMap.base21])||0;
  var iva21=parseFloat(r[colMap.iva21])||0;
  var base10=parseFloat(r[colMap.base10])||0;
  var iva10=parseFloat(r[colMap.iva10])||0;
  var base4=parseFloat(r[colMap.base4])||0;
  var iva4=parseFloat(r[colMap.iva4])||0;
  var base0=parseFloat(r[colMap.base0])||0;
  var iva0=parseFloat(r[colMap.iva0])||0;
  var retencion=parseFloat(r[colMap.retencion])||0;
  var recargo=parseFloat(r[colMap.recargo])||0;
  var total=parseFloat(r[colMap.total])||0;
  
  // Detect if abono
  var isAbono=numFact.match(/^AB-|^R-/i)||concepto.indexOf('ABONO')>=0||concepto.indexOf('DOCUMENTO ES ABONO')>=0||total<0;
  
  // Calculate total if not present
  if(!total){
    total=Math.abs(base21)+Math.abs(iva21)+Math.abs(base10)+Math.abs(iva10)+Math.abs(base4)+Math.abs(iva4)+Math.abs(base0)-Math.abs(retencion)+Math.abs(recargo);
  }
  
  // Parse forma de pago from concepto
  var formaPago='';
  var fpMatch=concepto.match(/Forma de pago:\s*([^|]+)/i);
  if(fpMatch)formaPago=fpMatch[1].trim();
  
  // Parse fecha vencimiento
  var fechaVenc='';
  if(colMap.fechaVenc!==undefined){
    var fv=r[colMap.fechaVenc];
    if(fv instanceof Date)fechaVenc=fv.toISOString().slice(0,10);
    else if(fv)fechaVenc=String(fv);
  }
  
  // Parse fecha
  var fecha='';
  var fechaRaw=r[colMap.fecha];
  if(fechaRaw instanceof Date){fecha=fechaRaw.toISOString().slice(0,10);}
  else if(fechaRaw){
    var fd=String(fechaRaw);
    if(fd.match(/^\d{4}-\d{2}-\d{2}/))fecha=fd.slice(0,10);
    else if(fd.match(/^\d{2}\/\d{2}\/\d{4}/))fecha=fd.slice(6,10)+'-'+fd.slice(3,5)+'-'+fd.slice(0,2);
  }
  
  // Tipo documento
  var tipoDoc='recibida';
  if(colMap.tipoDoc!==undefined){
    var td=String(r[colMap.tipoDoc]||'').toLowerCase();
    if(td.indexOf('emitid')>=0||td.indexOf('venta')>=0)tipoDoc='emitida';
  }
  
  return {
    num_factura:numFact,
    fecha:fecha,
    tipo:tipoDoc,
    is_abono:isAbono,
    tercero_nombre:terceroName,
    tercero_cif:terceroCif,
    base21:base21, iva21:iva21,
    base10:base10, iva10:iva10,
    base4:base4, iva4:iva4,
    base0:base0,
    retencion:retencion,
    recargo:recargo,
    total:total,
    forma_pago:formaPago,
    fecha_vencimiento:fechaVenc,
    concepto_gestor:concepto
  };
}

// ── Generar asiento contable desde factura ──
function generateEntryFromInvoice(inv, cuentaTercero){
  var lines=[];
  var isAbono=inv.is_abono;
  var sign=isAbono?-1:1;
  
  if(inv.tipo==='recibida'){
    // Proveedor (400x) al Haber
    var totalProv=Math.abs(inv.total)*sign;
    lines.push({a:cuentaTercero,d:isAbono?Math.abs(inv.total):0,h:isAbono?0:Math.abs(inv.total)});
    // IVA soportado (472) al Debe
    var totalIva=Math.abs(inv.iva21||0)+Math.abs(inv.iva10||0)+Math.abs(inv.iva4||0);
    if(totalIva>0.001)lines.push({a:'47200000',d:isAbono?0:totalIva,h:isAbono?totalIva:0});
    // Retenciones (4751) al Haber
    if(Math.abs(inv.retencion||0)>0.001)lines.push({a:'47510000',d:0,h:isAbono?0:Math.abs(inv.retencion)});
    // Compras (600) al Debe
    var totalBase=Math.abs(inv.base21||0)+Math.abs(inv.base10||0)+Math.abs(inv.base4||0)+Math.abs(inv.base0||0);
    if(totalBase>0.001)lines.push({a:'60000000',d:isAbono?0:totalBase,h:isAbono?totalBase:0});
  }else{
    // Cliente (430x) al Debe
    lines.push({a:cuentaTercero,d:isAbono?0:Math.abs(inv.total),h:isAbono?Math.abs(inv.total):0});
    // IVA repercutido (477) al Haber
    var totalIvaE=Math.abs(inv.iva21||0)+Math.abs(inv.iva10||0)+Math.abs(inv.iva4||0);
    if(totalIvaE>0.001)lines.push({a:'47700000',d:isAbono?totalIvaE:0,h:isAbono?0:totalIvaE});
    // Ventas (700) al Haber
    var totalBaseE=Math.abs(inv.base21||0)+Math.abs(inv.base10||0)+Math.abs(inv.base4||0)+Math.abs(inv.base0||0);
    if(totalBaseE>0.001)lines.push({a:'70000000',d:isAbono?totalBaseE:0,h:isAbono?0:totalBaseE});
  }
  
  return {
    date:inv.fecha,
    concept:(inv.is_abono?'Abono ':'Fra. ')+inv.tercero_nombre+' ['+inv.num_factura+']',
    type:'import_factura',
    lines:lines
  };
}

// ── Tests de integridad automáticos ──
function runIntegrityTests(){
  var invoices=getInvoiceData();
  var recibidas=invoices.filter(function(f){return f.tipo==='recibida';});
  var emitidas=invoices.filter(function(f){return f.tipo==='emitida';});
  
  // Test 1: Cuadre general Debe = Haber
  var totalD=0,totalH=0;
  state.entries.forEach(function(e){if(!e.del)e.lines.forEach(function(l){totalD+=l.d;totalH+=l.h;});});
  var cuadre=Math.abs(totalD-totalH)<0.02;
  
  // Test 2: IVA Soportado = sum facturas recibidas
  var ivaSopFact=recibidas.reduce(function(s,f){var sign=f.isAbono?-1:1;return s+sign*(Math.abs(f.iva21)+Math.abs(f.iva10)+Math.abs(f.iva4));},0);
  var ivaSopAsientos=0;
  state.entries.forEach(function(e){if(!e.del)e.lines.forEach(function(l){if(l.a==='47200000')ivaSopAsientos+=l.d-l.h;});});
  var ivaMatch=Math.abs(ivaSopFact-ivaSopAsientos)<1;
  
  // Test 3: Total compras facturas = Total asientos grupo 6
  var comprasFact=recibidas.reduce(function(s,f){var sign=f.isAbono?-1:1;return s+sign*f.totalBase;},0);
  var comprasAsientos=0;
  state.entries.forEach(function(e){if(!e.del)e.lines.forEach(function(l){if(l.a&&l.a[0]==='6')comprasAsientos+=l.d-l.h;});});
  var comprasMatch=Math.abs(comprasFact-comprasAsientos)<1;
  
  // Test 4: Nº facturas = Nº asientos tipo factura
  var nFacturas=invoices.length;
  var nAsientos=state.entries.filter(function(e){return !e.del&&e.type==='import_factura';}).length;
  var countMatch=nFacturas===nAsientos;

  // Test 5: Ventas cruzado (Libro Fact Emitidas vs IVA Repercutido vs base ventas en asientos)
  var ventasFact=emitidas.reduce(function(s,f){var sign=f.isAbono?-1:1;return s+sign*f.totalBase;},0);
  var ivaRepFact=emitidas.reduce(function(s,f){var sign=f.isAbono?-1:1;return s+sign*(Math.abs(f.iva21)+Math.abs(f.iva10)+Math.abs(f.iva4));},0);
  var ivaRepAsientos=0,ventasAsientos=0;
  state.entries.forEach(function(e){if(!e.del)e.lines.forEach(function(l){
    if(l.a&&l.a.indexOf('477')===0)ivaRepAsientos+=l.h-l.d;
    if(l.a&&l.a[0]==='7')ventasAsientos+=l.h-l.d;
  });});
  var ventasMatch=Math.abs(ventasFact-ventasAsientos)<1;
  var ivaRepMatch=Math.abs(ivaRepFact-ivaRepAsientos)<1;

  // Test 6: Invariante invoice↔entry — toda factura con entry_id debe tener entry vivo
  var entryIds={};
  state.entries.forEach(function(e){if(!e.del)entryIds[e.id]=true;});
  var huerfanas=invoices.filter(function(f){return f.entryId&&!entryIds[f.entryId];});
  var huerfanasOk=huerfanas.length===0;

  // Test 7: Duplicados por nº factura (canario hasta que UNIQUE index esté desplegado)
  var seenDup={},dupCount=0;
  invoices.forEach(function(f){
    var k=(f.numFactura||'').toUpperCase()+'__'+f.tipo;
    if(seenDup[k])dupCount++; else seenDup[k]=true;
  });
  var dupOk=dupCount===0;

  // Test 8: Tesorería — pendiente de cobro (saldos 430x) ≈ facturas emitidas sin entry de cobro
  var saldoClientes=0;
  state.entries.forEach(function(e){if(!e.del)e.lines.forEach(function(l){
    if(l.a&&l.a.indexOf('430')===0)saldoClientes+=l.d-l.h;
  });});
  // No tenemos forma directa de saber cuáles están cobradas; el invariante razonable
  // es que el saldo no sea negativo y guarde coherencia con el total facturado emitido (con IVA).
  var totalEmitidoCobrable=emitidas.reduce(function(s,f){var sign=f.isAbono?-1:1;return s+sign*Math.abs(f.totalFactura||0);},0);
  var tesoreriaOk=saldoClientes<=totalEmitidoCobrable+1;

  var results={
    cuadreGeneral:{ok:cuadre,debe:Math.round(totalD*100)/100,haber:Math.round(totalH*100)/100},
    ivaSoportado:{ok:ivaMatch,facturas:Math.round(ivaSopFact*100)/100,asientos:Math.round(ivaSopAsientos*100)/100},
    compras:{ok:comprasMatch,facturas:Math.round(comprasFact*100)/100,asientos:Math.round(comprasAsientos*100)/100},
    conteo:{ok:countMatch,facturas:nFacturas,asientos:nAsientos},
    ventas:{ok:ventasMatch,facturas:Math.round(ventasFact*100)/100,asientos:Math.round(ventasAsientos*100)/100},
    ivaRepercutido:{ok:ivaRepMatch,facturas:Math.round(ivaRepFact*100)/100,asientos:Math.round(ivaRepAsientos*100)/100},
    huerfanas:{ok:huerfanasOk,count:huerfanas.length,ids:huerfanas.slice(0,5).map(function(f){return f.numFactura;})},
    duplicados:{ok:dupOk,count:dupCount},
    tesoreria:{ok:tesoreriaOk,saldoClientes:Math.round(saldoClientes*100)/100,facturas:Math.round(totalEmitidoCobrable*100)/100},
    allOk:cuadre&&ivaMatch&&comprasMatch&&countMatch&&ventasMatch&&ivaRepMatch&&huerfanasOk&&dupOk&&tesoreriaOk
  };
  return results;
}

// ═══ TEST INTEGRIDAD DIARIO AUTOMÁTICO ═══
function runDailyIntegrityCheck(){
  try{
    var lastCheck=localStorage.getItem('cf_integrity_last_'+(state.company?state.company.id:''));
    var today2=new Date().toISOString().slice(0,10);
    if(lastCheck===today2)return;// Ya se hizo hoy
    localStorage.setItem('cf_integrity_last_'+(state.company?state.company.id:''),today2);
    var report=fullIntegrityReport();
    if(report.errors.length>0){
      auditLog('integrity_error','⚠ '+report.errors.length+' errores detectados');
      toast('⚠️ Test integridad: '+report.errors.length+' errores. Ver Config → Auditoría','error');
    }
  }catch(e){}
}
function fullIntegrityReport(){
  var errors=[];var warnings=[];
  var all=state.entries||[];var am={};(state.accounts||[]).forEach(function(a){am[a.code]=a;});
  // 1. Cada asiento debe cuadrar al céntimo
  all.forEach(function(e,i){
    var td=0,th=0;(e.lines||[]).forEach(function(l){td+=(l.d||0);th+=(l.h||0);});
    td=Math.round(td*100)/100;th=Math.round(th*100)/100;
    if(Math.abs(td-th)>0.005){
      errors.push('Asiento '+(i+1)+' ('+e.date+' '+e.concept+'): descuadre de '+Math.abs(td-th).toFixed(2)+'€');
    }
  });
  // 2. Sumas y saldos: total debe = total haber
  var totalD=0,totalH=0;
  all.forEach(function(e){(e.lines||[]).forEach(function(l){totalD+=(l.d||0);totalH+=(l.h||0);});});
  totalD=Math.round(totalD*100)/100;totalH=Math.round(totalH*100)/100;
  if(Math.abs(totalD-totalH)>0.005){
    errors.push('DESCUADRE GLOBAL: Debe='+totalD.toFixed(2)+' Haber='+totalH.toFixed(2)+' Dif='+Math.abs(totalD-totalH).toFixed(2));
  }
  // 3. Verificar que IVA repercutido = base * tipo
  var saldos={};
  all.forEach(function(e){(e.lines||[]).forEach(function(l){if(!saldos[l.a])saldos[l.a]={d:0,h:0};saldos[l.a].d+=(l.d||0);saldos[l.a].h+=(l.h||0);});});
  // 4. Balance: activo = pasivo + neto (G1-5)
  var activo=0,pasivo=0;
  Object.entries(saldos).forEach(function(x){
    var g=parseInt(x[0][0])||0;
    if(g>=1&&g<=5){
      var s=x[1].d-x[1].h;
      if(s>0)activo+=s;else pasivo+=(-s);
    }
  });
  // 5. Ingresos grupo 7 vs gastos grupo 6
  var ingresos=0,gastos=0;
  Object.entries(saldos).forEach(function(x){
    var g=parseInt(x[0][0])||0;
    if(g===7)ingresos+=x[1].h-x[1].d;
    if(g===6)gastos+=x[1].d-x[1].h;
  });
  return {errors:errors,warnings:warnings,stats:{asientos:all.length,cuentas:Object.keys(saldos).length,totalDebe:totalD,totalHaber:totalH,activo:activo,pasivo:pasivo,ingresos:ingresos,gastos:gastos,resultado:ingresos-gastos}};
}

function startGlobalVoice(){
  if(globalVoiceRecog){globalVoiceRecog.stop();globalVoiceRecog=null;var btn=$('globalMicBtn');if(btn){btn.textContent='🎤';btn.style.background='';}return;}
  if(!('webkitSpeechRecognition' in window)&&!('SpeechRecognition' in window)){toast('Tu navegador no soporta reconocimiento de voz','error');return;}
  var SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  var r=new SR();r.lang='es-ES';r.continuous=false;r.interimResults=false;
  r.onresult=function(e){
    var transcript=e.results[0][0].transcript;
    globalVoiceRecog=null;var btn=$('globalMicBtn');if(btn){btn.textContent='🎤';btn.style.background='';}
    addVoiceMessage('user',transcript);
    processVoiceCommand(transcript);
  };
  r.onerror=function(){globalVoiceRecog=null;var btn=$('globalMicBtn');if(btn){btn.textContent='🎤';btn.style.background='';}toast('No se ha podido escuchar','error');};
  r.onend=function(){globalVoiceRecog=null;var btn=$('globalMicBtn');if(btn){btn.textContent='🎤';btn.style.background='';}};
  r.start();globalVoiceRecog=r;
  var btn=$('voiceMicBtn')||$('globalMicBtn');if(btn){btn.textContent='⏹';btn.style.background='var(--rd)';}
  addVoiceMessage('system','🎤 Escuchando... habla ahora');

function processVoiceCommand(text){
  var ql=text.toLowerCase();
  // Navigation
  var navMap={'diario':'journal','mayor':'ledger','saldos':'trial','sumas y saldos':'trial','balance':'balance','pérdidas y ganancias':'pnl','pyg':'pnl','libro iva':'libroiva','factura':'facturas','socio':'socios','proveedore':'analisis','tesorería':'posicion','concilia':'conciliacion','expediente':'expedientes','previsión':'prevision','prevision':'prevision','plan de cuenta':'planCuentas','regla':'rules','auditoría':'audit','auditoria':'audit','backup':'backups','dashboard':'dashboard','inicio':'dashboard','borradores':'borradores','plantilla':'plantillas','artículo':'articulos','inmovilizado':'inmovilizado','mapa':'mapaventas','nuevo gasto':'newEntry','asiento manual':'manualEntry','nuevo asiento':'manualEntry','chat':'chatcontable'};
  var navigated=false;
  // Sort keys by length desc to match longer phrases first
  var keys=Object.keys(navMap).sort(function(a,b){return b.length-a.length;});
  for(var i=0;i<keys.length;i++){
    if(ql.indexOf(keys[i])>=0){
      setView(navMap[keys[i]]);addVoiceMessage('bot','✅ Abriendo <strong>'+keys[i]+'</strong>...');stopVoiceDialog();navigated=true;break;
    }
  }
  if(!navigated){
    // Try as a chat question
    chatHistory=chatHistory||[];
    chatHistory.push({role:'user',text:h(text)});
    // Calculate data for answer
    var all=state.entries.filter(function(e){return e.date&&e.date.startsWith(String(state.ejercicio));});
    var s2={};all.forEach(function(e){e.lines.forEach(function(l){if(!s2[l.a])s2[l.a]=0;s2[l.a]+=l.d-l.h;});});
    var ivaRep=0,ivaSop=0,ingresos=0,gastos=0,banco=0,caja=0,clientes=0,proveedores=0;
    Object.entries(s2).forEach(function(x){var code=x[0],val=x[1];
      if(code.startsWith('477'))ivaRep+=-(val);if(code.startsWith('472'))ivaSop+=val;
      if(parseInt(code[0])===7)ingresos+=(-val);if(parseInt(code[0])===6)gastos+=val;
      if(code.startsWith('572'))banco+=val;if(code.startsWith('570'))caja+=val;
      if(code.startsWith('430'))clientes+=val;if(code.startsWith('400')||code.startsWith('410'))proveedores+=(-val);
    });
    var answer='';
    if(ql.indexOf('vendido')>=0||ql.indexOf('venta')>=0||ql.indexOf('ingreso')>=0||ql.indexOf('facturado')>=0)answer='Ventas: <strong>'+fmt(ingresos)+'€</strong>';
    else if(ql.indexOf('iva')>=0)answer='IVA: Rep '+fmt(ivaRep)+'€ - Sop '+fmt(ivaSop)+'€ = <strong>'+fmt(Math.abs(ivaRep-ivaSop))+'€ '+(ivaRep-ivaSop>=0?'a pagar':'a devolver')+'</strong>';
    else if(ql.indexOf('resultado')>=0||ql.indexOf('beneficio')>=0)answer='Resultado: <strong>'+fmt(ingresos-gastos)+'€</strong>';
    else if(ql.indexOf('banco')>=0||ql.indexOf('tesorería')>=0||ql.indexOf('dinero')>=0||ql.indexOf('saldo')>=0)answer='Banco: '+fmt(banco)+'€ | Caja: '+fmt(caja)+'€ | <strong>Total: '+fmt(banco+caja)+'€</strong>';
    else if(ql.indexOf('gasto')>=0)answer='Gastos totales: <strong>'+fmt(gastos)+'€</strong>';
    else if(ql.indexOf('cliente')>=0||ql.indexOf('cobrar')>=0)answer='Clientes pte cobro: <strong>'+fmt(clientes)+'€</strong>';
    else if(ql.indexOf('proveedor')>=0||ql.indexOf('debo')>=0)answer='Proveedores pte pago: <strong>'+fmt(proveedores)+'€</strong>';
    else answer='No he entendido. Prueba: "sácame sumas y saldos", "cuánto he vendido", "abre el diario"...';
    chatHistory.push({role:'bot',text:answer});
    addVoiceMessage('bot',answer);
    if(state.view==='chatcontable')render();
  }
}

// ═══ BÚSQUEDA GLOBAL ═══
function globalSearch(query){
  if(!query||query.length<2)return;
  var q=query.toUpperCase();var results=[];
  var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  // Search entries
  state.entries.forEach(function(e){
    if((e.concept||'').toUpperCase().indexOf(q)>=0||e.date.indexOf(query)>=0){
      var total=e.lines.reduce(function(s,l){return s+l.d;},0);
      results.push({type:'asiento',date:e.date,text:e.concept,val:total,action:"setTab('diario');setView('journal');"});
    }
  });
  // Search accounts
  state.accounts.forEach(function(a){
    if(a.code.indexOf(query)>=0||a.name.toUpperCase().indexOf(q)>=0){
      results.push({type:'cuenta',text:a.code+' '+a.name,action:"setTab('config');setView('accounts');"});
    }
  });
  // Search masters
  loadMasters();
  masters.client.forEach(function(m){if((m.name||'').toUpperCase().indexOf(q)>=0)results.push({type:'cliente',text:m.name,action:"setTab('maestros');setView('clients');"});});
  masters.supplier.forEach(function(m){if((m.name||'').toUpperCase().indexOf(q)>=0)results.push({type:'proveedor',text:m.name,action:"setTab('maestros');setView('suppliers');"});});
  // Show results in modal
  if(!results.length){toast('Sin resultados para "'+query+'"');return;}
  var bg=document.createElement('div');bg.className='modal-bg';bg.id='searchModal';
  bg.innerHTML='<div class="modal" style="max-width:600px"><div class="card-h"><span>🔍 Resultados: "'+h(query)+'" — '+results.length+'</span><button class="btn btn-d" onclick="$(\'searchModal\').remove()">✕</button></div><div class="scr" style="max-height:400px"><table><tbody>'+
  results.slice(0,20).map(function(r,i){return '<tr class="'+(i%2?'alt':'')+'" style="cursor:pointer" onclick="$(\'searchModal\').remove();'+r.action+'"><td><span class="badge '+(r.type==='asiento'?'badge-g':r.type==='cuenta'?'badge-b':r.type==='cliente'?'badge-a':'badge-v')+'">'+r.type+'</span></td><td style="font-size:11px">'+(r.date?fmtD(r.date)+' — ':'')+h(r.text)+'</td><td style="text-align:right;font-size:11px">'+(r.val?fmt(r.val)+'€':'')+'</td></tr>';}).join('')+
  '</tbody></table></div></div>';
  document.body.appendChild(bg);
}

// ═══ ANÁLISIS PROVEEDORES ═══
function renderAnalisisProveedores(c){
  // ═══ PROVEEDORES v10 — usa getInvoiceData() ═══
  var facturas=getInvoiceData({tipo:'recibida'});
  var provs={};
  facturas.forEach(function(f){
    var key=f.tercero||f.cif||'Desconocido';
    if(!provs[key])provs[key]={name:key,cuenta:f.cuenta||'',total:0,count:0,lastDate:''};
    provs[key].total+=f.isAbono?-f.totalFactura:f.totalFactura;
    provs[key].count++;
    if(f.fecha>provs[key].lastDate)provs[key].lastDate=f.fecha;
  });
  var lista=Object.values(provs).sort(function(a,b){return Math.abs(b.total)-Math.abs(a.total);});
  var grandTotal=lista.reduce(function(s,p){return s+Math.abs(p.total);},0);
  c.innerHTML='<div class="row"><div class="stat"><div class="stat-l">Proveedores</div><div class="stat-v">'+lista.length+'</div></div><div class="stat"><div class="stat-l">Total facturado</div><div class="stat-v" style="color:var(--rd)">'+fmt(grandTotal)+'€</div></div><div class="stat"><div class="stat-l">Media por proveedor</div><div class="stat-v" style="color:var(--rd)">'+fmt(lista.length?grandTotal/lista.length:0)+'€</div></div></div>'+
  '<div class="card"><div class="card-h"><span>Análisis de proveedores</span></div>'+
  '<table><thead><tr><th>Proveedor</th><th>Cuenta</th><th style="text-align:right">Total</th><th style="text-align:right">% del total</th><th style="text-align:right">Nº facturas</th><th style="text-align:right">Media/fra</th><th>Última fra</th></tr></thead><tbody>'+
  lista.map(function(p,i){var pct=grandTotal>0?Math.round(Math.abs(p.total)/grandTotal*100):0;return '<tr class="'+(i%2?'alt':'')+'"><td style="font-weight:600">'+h(p.name)+'</td><td style="font-size:10px;color:var(--pri)">'+h(p.cuenta)+'</td><td style="text-align:right;color:var(--rd);font-weight:600">'+fmt(p.total)+'€</td><td style="text-align:right"><div style="display:flex;align-items:center;justify-content:flex-end;gap:4px"><div style="width:60px;height:8px;background:#FEE2E2;border-radius:4px"><div style="width:'+pct+'%;height:100%;background:#EF4444;border-radius:4px"></div></div>'+pct+'%</div></td><td style="text-align:right">'+p.count+'</td><td style="text-align:right">'+fmt(p.count?p.total/p.count:0)+'€</td><td style="font-size:10px">'+fmtD(p.lastDate)+'</td></tr>';}).join('')+
  '</tbody></table></div>';
}
function exportAnalisisExcel(){
  var all=filteredEntries();var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  var provs={};
  all.forEach(function(e){
    var provAccts=[];var gastoNeto=0;
    e.lines.forEach(function(l){
      if(l.a&&(l.a.startsWith('400')||l.a.startsWith('410'))&&(l.h>0||l.d>0))provAccts.push(l);
      var g=parseInt((l.a||'')[0])||0;if(g===6){gastoNeto+=l.d-l.h;}
    });
    if(provAccts.length>0){
      provAccts.forEach(function(pl){
        var key=pl.a;var provName=am[pl.a]?am[pl.a].name:pl.a;var neto=pl.h-pl.d;
        if(!provs[key])provs[key]={name:provName,t:0,c:0};provs[key].t+=neto;provs[key].c++;
      });
    }else if(gastoNeto>0){
      var key='_'+((e.concept||'Otros').split(/\s+/)[0]);
      if(!provs[key])provs[key]={name:(e.concept||'Otros').split(/\s+/)[0],t:0,c:0};
      provs[key].t+=gastoNeto;provs[key].c++;
    }
  });
  var rows=Object.entries(provs).sort(function(a,b){return b[1].t-a[1].t;}).map(function(x){return [x[1].name,x[1].t,x[1].c,x[1].c>0?x[1].t/x[1].c:0];});
  exportExcel(rows,['Proveedor','Total','Nº Facturas','Media'],'analisis_proveedores');
}

function saveArticulo(idx){
  var code=$('artCode').value;var name=$('artName').value;

  var item={
    code:code,name:name,familia:$('artFamilia').value,
    coste:parseFloat($('artCoste').value)||0,pvp:parseFloat($('artPVP').value)||0,
    iva:$('artIva').value,stock:parseInt($('artStock').value)||0,
    unidad:$('artUnidad').value||'ud',stockMin:parseInt($('artStockMin').value)||0,
    cuentaV:$('artCuentaV').value||'70000000',cuentaC:$('artCuentaC').value||'60000000',
    proveedor:$('artProv').value,notas:$('artNotas').value
  };
  loadArticulos();

function deleteArticulo(idx){

}

function calcFactTotal(){
  var base=parseFloat(document.getElementById('fBase')?document.getElementById('fBase').value:0)||0;
  var pct=parseFloat(document.getElementById('fIvaPct')?document.getElementById('fIvaPct').value:21)||0;
  var iva=Math.round(base*pct)/100;
  if(document.getElementById('fIva'))document.getElementById('fIva').value=iva.toFixed(2);
  if(document.getElementById('fTotal'))document.getElementById('fTotal').value=(base+iva).toFixed(2);
}
function searchTercero(q,isClient){
  var list=$('fTerceroList');if(!list)return;
  var prefix=isClient?'430':'40';
  var matches=state.accounts.filter(function(a){
    return a.code.startsWith(prefix)&&(q.length<1||a.code.indexOf(q)>=0||a.name.toLowerCase().indexOf(q.toLowerCase())>=0);
  }).slice(0,15);
  if(!q&&matches.length===0){list.style.display='none';return;}
  list.style.display='block';
  var html=matches.map(function(a){
    return '<div style="padding:8px 12px;cursor:pointer;font-size:12px;border-bottom:1px solid #F3F4F6;display:flex;justify-content:space-between" onmouseover="this.style.background=\'#F0FDF4\'" onmouseout="this.style.background=\'#fff\'" onclick="selectTercero(\''+h(a.name)+'\',\''+a.code+'\')"><span><strong>'+a.code+'</strong> '+h(a.name)+'</span></div>';
  }).join('');
  if(q&&q.length>=2){
    html+='<div style="padding:8px 12px;cursor:pointer;font-size:12px;color:var(--pri);font-weight:600;background:#F0FDF4" onclick="createTerceroFromFactura(\''+h(q)+'\','+(isClient?'true':'false')+')">+ Crear '+(isClient?'cliente':'proveedor')+': '+h(q)+'</div>';
  }
  if(!html)html='<div style="padding:8px 12px;font-size:11px;color:var(--txM)">Escribe al menos 2 caracteres para crear nuevo</div>';
  list.innerHTML=html;
}
function createTerceroFromFactura(name,isClient){
  var prefix=isClient?'4300':'4000';
  var existing=state.accounts.filter(function(a){return a.code.startsWith(prefix);});
  var nextNum=existing.length+1;
  var newCode=prefix+String(nextNum).padStart(4,'0');
  var tipo=isClient?'A':'A';
  var grupo=4;
  api('/api/accounts/'+state.company.id,{method:'POST',body:{code:newCode,name:name,g:grupo,t:tipo}}).then(function(){
    state.accounts.push({code:newCode,name:name,g:grupo,t:tipo});
    selectTercero(name,newCode);
    toast('✓ '+(isClient?'Cliente':'Proveedor')+' creado: '+newCode+' — '+name);
  }).catch(function(e){toast('Error: '+e.message,'error');});
}
function selectTercero(name,code){
  var inp=$('fTercero');if(inp)inp.value=name;
  var list=$('fTerceroList');if(list)list.style.display='none';
  window._selectedTerceroCode=code;
}
function saveFactura(tipo){
  var tipoStr=(tipo===1||tipo==='emitida')?'emitida':'recibida';
  var num=document.getElementById('fNum').value;var date=document.getElementById('fDate').value;
  var tercero=document.getElementById('fTercero').value;var base=parseFloat(document.getElementById('fBase').value)||0;
  var iva=parseFloat(document.getElementById('fIva').value)||0;var total=parseFloat(document.getElementById('fTotal').value)||0;
  var estado=document.getElementById('fEstado').value;var concepto=document.getElementById('fConcepto').value;
  var cif=document.getElementById('fCif').value;
  if(!num||!tercero||!base){toast('Nº, tercero y base obligatorios','error');return;}
  loadFacturas();
  var arr=tipoStr==='emitida'?facturas.emitidas:facturas.recibidas;
  arr.push({id:'f_'+uid(),num:num,date:date,tercero:tercero,cif:cif,base:base,iva:iva,total:total,estado:estado,concepto:concepto});
  saveFacturas();$('factModal').remove();
  auditLog('nueva_factura_'+tipoStr,num+' '+tercero);
  
  // AUTO-CONTABILIZAR: crear asiento automáticamente
  var cuentaTercero=window._selectedTerceroCode||(tipoStr==='emitida'?'43000000':'40000000');
  var ivaPct=parseFloat(document.getElementById('fIvaPct')?document.getElementById('fIvaPct').value:21)||0;
  var lines=[];
  if(tipoStr==='emitida'){
    lines.push({a:cuentaTercero,d:Math.round(total*100)/100,h:0});
    lines.push({a:'70000000',d:0,h:Math.round(base*100)/100});
    if(iva>0)lines.push({a:'47700000',d:0,h:Math.round(iva*100)/100});
  }else{
    lines.push({a:'60000000',d:Math.round(base*100)/100,h:0});
    if(iva>0)lines.push({a:'47200000',d:Math.round(iva*100)/100,h:0});
    lines.push({a:cuentaTercero,d:0,h:Math.round(total*100)/100});
  }
  var entryId='fra_'+tipoStr+'_'+uid();
  api('/api/entries/'+state.company.id,{method:'POST',body:{
    id:entryId,date:date,concept:(tipoStr==='emitida'?'Fra. emitida':'Fra. recibida')+' ['+num+'] '+tercero,
    type:tipoStr==='emitida'?'fra_emitida':'fra_recibida',lines:lines,tags:''
  }}).then(function(){
    loadData().then(function(){render();});
    toast('✓ Factura guardada + asiento contabilizado');
  }).catch(function(e){
    toast('Factura guardada pero error al contabilizar: '+e.message,'error');
    render();
  });
}
function deleteFactura(tipo,idx){
  var tipoStr=(tipo===1)?'emitida':'recibida';
  if(!confirm('¿Eliminar factura?'))return;
  loadFacturas();
  if(tipoStr==='emitida')facturas.emitidas.splice(idx,1);else facturas.recibidas.splice(idx,1);
  saveFacturas();toast('Factura eliminada');render();
}

function toggleConciliado(entryId,checked){

// ═══ LIBRO DE IVA ═══
// Detect IVA rate from base and cuota amounts
function detectIvaRate(base,cuota){
  if(!base||base===0)return 0;
  var pct=Math.round(Math.abs(cuota/base)*10000)/100;
  if(pct>=20&&pct<=22)return 21;
  if(pct>=9&&pct<=11)return 10;
  if(pct>=3&&pct<=5)return 4;
  if(pct<1)return 0;
  return Math.round(pct); // fallback
}
// Detect IVA rate from a single cuota line when we have multiple IVA lines
// Try each standard rate and see which gives a clean base
function detectIvaRateFromCuota(cuota,totalBase,totalIva){
  if(Math.abs(cuota)<0.001)return 0;
  // Try standard rates: check which one gives a base that is a round number
  var rates=[0.21,0.10,0.04];
  for(var i=0;i<rates.length;i++){
    var testBase=cuota/rates[i];
    // Check if base × rate ≈ cuota (within rounding tolerance)
    var testCuota=Math.round(testBase*rates[i]*100)/100;
    if(Math.abs(testCuota-Math.round(cuota*100)/100)<0.02){
      return rates[i];
    }
  }
  // Fallback: if totalIva > 0, derive rate from total
  if(totalIva>0&&totalBase>0){
    var avgRate=totalIva/totalBase;
    if(avgRate>0.18)return 0.21;
    if(avgRate>0.08)return 0.10;
    if(avgRate>0.02)return 0.04;
  }
  return 0.21; // default
}
function renderLibroIVA(c){
  var all=filteredEntries();var am={};state.accounts.forEach(function(a){am[a.code]=a;});
  var repercutido=[],soportado=[];
  var resByRate={21:{baseRep:0,cuotaRep:0,baseSop:0,cuotaSop:0},10:{baseRep:0,cuotaRep:0,baseSop:0,cuotaSop:0},4:{baseRep:0,cuotaRep:0,baseSop:0,cuotaSop:0}};
  all.forEach(function(e){
    var concepto=e.concept||'';
    var totalIvaRep=0,totalIvaSop=0,totalBaseG6=0,totalBaseG7=0;
    var ivaSopLines=[],ivaRepLines=[];
    e.lines.forEach(function(l){
      if(l.a&&l.a.startsWith('477')){totalIvaRep+=l.h-l.d;ivaRepLines.push(l.h-l.d);}
      if(l.a==='47200000'){totalIvaSop+=l.d-l.h;ivaSopLines.push(l.d-l.h);}
      var g=parseInt((l.a||'')[0])||0;
      if(g===6){totalBaseG6+=l.d-l.h;}
      if(g===7){totalBaseG7+=l.h-l.d;}
    });
    // IVA Repercutido — one entry per invoice
    if(Math.abs(totalIvaRep)>0.001){
      var cliAcct='';e.lines.forEach(function(l){var g=parseInt((l.a||'')[0])||0;if(g===7)cliAcct=l.a;});
      var tipoIva=detectIvaRate(totalBaseG7,totalIvaRep);
      repercutido.push({date:e.date,concept:concepto,base:Math.round(totalBaseG7*100)/100,tipo:tipoIva,cuota:Math.round(totalIvaRep*100)/100,total:Math.round((totalBaseG7+totalIvaRep)*100)/100,cuenta:cliAcct});
      if(ivaRepLines.length<=1){var rk=resByRate[tipoIva]?tipoIva:21;resByRate[rk].baseRep+=totalBaseG7;resByRate[rk].cuotaRep+=totalIvaRep;}
      else{ivaRepLines.forEach(function(cuota){if(Math.abs(cuota)<0.001)return;var rate=detectIvaRateFromCuota(cuota,totalBaseG7,totalIvaRep);var base=rate>0?cuota/rate:0;var rk=resByRate[Math.round(rate*100)]?Math.round(rate*100):21;resByRate[rk].baseRep+=base;resByRate[rk].cuotaRep+=cuota;});}
    }
    // IVA Soportado — one entry per invoice
    if(Math.abs(totalIvaSop)>0.001){
      var provAcct='';e.lines.forEach(function(l){var g=parseInt((l.a||'')[0])||0;if(g===6)provAcct=l.a;});
      var tipoIvaS=detectIvaRate(Math.abs(totalIvaSop/0.21),Math.abs(totalIvaSop));
      // Calculate real base (only the part that generated IVA, excluding base0)
      var realBaseSop=totalIvaSop>0?(totalIvaSop/(tipoIvaS/100)):totalBaseG6;
      if(tipoIvaS===0)realBaseSop=totalBaseG6;
      soportado.push({date:e.date,concept:concepto,base:Math.round(realBaseSop*100)/100,tipo:tipoIvaS,cuota:Math.round(totalIvaSop*100)/100,total:Math.round((realBaseSop+totalIvaSop)*100)/100,cuenta:provAcct});
      if(ivaSopLines.length<=1){var rk2=resByRate[tipoIvaS]?tipoIvaS:21;resByRate[rk2].baseSop+=totalBaseG6;resByRate[rk2].cuotaSop+=totalIvaSop;}
      else{ivaSopLines.forEach(function(cuota){if(Math.abs(cuota)<0.001)return;var rate=detectIvaRateFromCuota(cuota,Math.abs(totalBaseG6),Math.abs(totalIvaSop));var base=rate>0?cuota/rate:0;var rk2=resByRate[Math.round(rate*100)]?Math.round(rate*100):21;resByRate[rk2].baseSop+=base;resByRate[rk2].cuotaSop+=cuota;});}
    }
  });
  var tBaseRep=repercutido.reduce(function(s,x){return s+x.base;},0);
  var tCuotaRep=repercutido.reduce(function(s,x){return s+x.cuota;},0);

function exportLibroIVA(tipo){
  var all=filteredEntries();var rows=[];
  all.forEach(function(e){
    var totalIva=0,base=0,esRep=tipo==='rep';
    e.lines.forEach(function(l){
      if(esRep&&l.a&&l.a.startsWith('477'))totalIva+=l.h-l.d;
      if(!esRep&&l.a==='47200000')totalIva+=l.d-l.h;
      var g=parseInt((l.a||'')[0])||0;
      if(esRep&&g===7){base+=l.h-l.d;}
      if(!esRep&&g===6){base+=l.d-l.h;}
    });
    if(Math.abs(totalIva)<0.001)return;
    var tipoIva=detectIvaRate(Math.abs(base),Math.abs(totalIva));
    rows.push([e.date,e.concept||'',Math.round(base*100)/100,tipoIva,Math.round(totalIva*100)/100,Math.round((base+totalIva)*100)/100]);
  });
  exportExcel(rows,['Fecha','Concepto','Base','% IVA','Cuota','Total'],tipo==='rep'?'iva_repercutido':'iva_soportado');
}

async function syncGestorDocumental(){
  var apiKey=$('gestorApiKey')?$('gestorApiKey').value.trim():'';
  if(!apiKey){toast('Introduce la API Key del gestor documental','error');return;}
  
  // Save key for next time
  localStorage.setItem('cf_gestor_apikey_'+(state.company?state.company.id:''),apiKey);
  
  var year=$('gestorYear')?$('gestorYear').value:'2026';
  var q=$('gestorQ')?$('gestorQ').value:'';
  var tipo=$('gestorTipo')?$('gestorTipo').value:'todas';
  
  var statusEl=$('gestorSyncStatus');
  if(statusEl)statusEl.innerHTML='<span style="color:var(--pri);font-weight:600">⟳ Conectando con gestor documental...</span>';
  
  try{
    var response=await fetch(API+'/api/gestor-sync',{
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':'Bearer '+sessionStorage.getItem('cf_token')},
      body:JSON.stringify({apiKey:apiKey,año:year,trimestre:q||undefined,tipo:tipo})
    });
    
    if(!response.ok){
      var err=await response.json().catch(function(){return {error:'Error desconocido'};});
      throw new Error(err.error||'Error '+response.status);
    }
    
    if(statusEl)statusEl.innerHTML='<span style="color:var(--pri);font-weight:600">⟳ Descargando Excel...</span>';
    
    var blob=await response.blob();
    if(statusEl)statusEl.innerHTML='<span style="color:var(--pri);font-weight:600">⟳ Procesando facturas...</span>';
    
    // Convert blob to File and process
    var file=new File([blob],'gestor_sync.xlsx',{type:'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet'});
    
    // Use the existing importFacturasExcel function with correct tipo
    var tipoProc=$('gestorTipo')?$('gestorTipo').value:'todas';
    if(tipoProc==='emitidas'){
      importFacturasExcel(file,'emitida');
    }else if(tipoProc==='recibidas'){
      importFacturasExcel(file,'recibida');
    }else{
      // "todas" — process both types, the Excel contains a column "Tipo Documento"
      importFacturasExcel(file,'auto');
    }
    
    if(statusEl)statusEl.innerHTML='<span style="color:var(--ok);font-weight:600">✓ Sincronización completada — procesando facturas...</span>';
    toast('✓ Excel descargado del gestor documental');
  }catch(e){
    if(statusEl)statusEl.innerHTML='<span style="color:var(--rd);font-weight:600">✗ Error: '+h(e.message)+'</span>';
    toast('Error al sincronizar: '+e.message,'error');
  }
}
